function submitFinanceInvoiceEmail(e) {
  e.preventDefault();

  const processKey = FINANCE_PROCESS_KEYS.INVOICE_EMAIL_SEND;

  if (financeIsProcessBusy(processKey)) {
    showToast('Proses kirim email sedang berjalan. Mohon tunggu sebentar.', 'info');
    return;
  }

  clearFinanceInvoiceEmailErrors();
  clearFinanceModalAlert('financeInvoiceEmailModal');

  const billingId = financeGetInputValue('finance_invoice_email_billing_id');
  const emailTo = financeGetInputValue('finance_invoice_email_to');
  const subject = financeGetInputValue('finance_invoice_email_subject');
  const message = financeGetInputValue('finance_invoice_email_message');

  const localErrors = {};

  if (!billingId) {
    showFinanceModalAlert(
      'financeInvoiceEmailModal',
      'Billing ID tidak ditemukan',
      'error'
    );
    showToast('Billing ID tidak ditemukan', 'error');
    return;
  }

  if (!emailTo) {
    localErrors.to = 'Email tujuan wajib diisi';
  } else if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(emailTo)) {
    localErrors.to = 'Format email tujuan tidak valid';
  }

  if (!subject) {
    localErrors.subject = 'Subject email wajib diisi';
  }

  if (Object.keys(localErrors).length) {
    applyFinanceInvoiceEmailErrors(localErrors);

    const messageText =
      localErrors.to ||
      localErrors.subject ||
      'Validasi gagal. Periksa kembali email tujuan dan subject invoice.';

    showFinanceModalAlert(
      'financeInvoiceEmailModal',
      messageText,
      'error'
    );

    const emailInput = financeGetEl('finance_invoice_email_to');

    if (localErrors.to && emailInput) {
      emailInput.disabled = false;
      emailInput.focus();
      emailInput.select();
    }

    showToast('Validasi email belum sesuai', 'error');
    return;
  }

  const payload = attachAuthContext({
    billing_id: billingId,
    email_to: emailTo,
    subject: subject,
    message: message
  });

  const submitBtn = document.getElementById('financeInvoiceEmailSubmitBtn');

  const loadingText = submitBtn && submitBtn.dataset.loadingText
    ? submitBtn.dataset.loadingText
    : 'Menyiapkan & Mengirim...';

  const idleText = submitBtn && submitBtn.dataset.idleText
    ? submitBtn.dataset.idleText
    : 'Kirim Email';

  const processOptions = {
    modalId: 'financeInvoiceEmailModal',
    primaryButtonId: 'financeInvoiceEmailSubmitBtn',
    loadingText: loadingText,
    idleText: idleText,
    clearModalAlertId: 'financeInvoiceEmailModal'
  };

  if (!financeStartProcess(processKey, processOptions)) {
    showToast('Proses kirim email sedang berjalan. Mohon tunggu sebentar.', 'info');
    return;
  }

  google.script.run
    .withSuccessHandler(function(sendRes) {
      financeEndProcess(processKey, processOptions);

      if (!sendRes || !sendRes.success) {
        const messageText = financeGetServerErrorMessage(
          sendRes,
          'Gagal mengirim invoice email'
        );

        applyFinanceInvoiceEmailErrors(sendRes && sendRes.errors ? sendRes.errors : null);
        showFinanceModalAlert('financeInvoiceEmailModal', messageText, 'error');
        showToast(messageText, 'error');
        return;
      }

      const pdfRegenerated = !!(
        sendRes &&
        sendRes.data &&
        sendRes.data.pdf_regenerated
      );

      const successMessage = pdfRegenerated
        ? 'PDF invoice terbaru berhasil dibuat dan email berhasil dikirim ke pasien.'
        : 'Invoice berhasil dikirim menggunakan PDF terbaru yang sudah tersedia.';

      closeFinanceInvoiceEmailModal();

      const localApplied = applyFinanceInvoiceMutationResultLocally_(sendRes, {
        billingId: billingId
      });

      if (!localApplied) {
        loadFinanceInvoiceDeliveryInfo(billingId, {
          silent: true
        });
      }

      showToast(successMessage, 'success');
    })
    .withFailureHandler(function(err) {
      financeEndProcess(processKey, processOptions);

      const messageText = financeGetFailureErrorMessage(
        err,
        'Gagal mengirim invoice email'
      );

      showFinanceModalAlert('financeInvoiceEmailModal', messageText, 'error');
      showToast('Error kirim email: ' + messageText, 'error');
    })
    .sendBillingInvoiceEmail(payload);
}

function financeParseYmdToDate(value) {
  const s = String(value || '').trim();

  if (!/^\d{4}-\d{2}-\d{2}$/.test(s)) {
    return null;
  }

  const parts = s.split('-');
  const d = new Date(Number(parts[0]), Number(parts[1]) - 1, Number(parts[2]));

  if (
    d.getFullYear() !== Number(parts[0]) ||
    d.getMonth() !== Number(parts[1]) - 1 ||
    d.getDate() !== Number(parts[2])
  ) {
    return null;
  }

  return d;
}

function financeDateToYmd(dateObj) {
  if (!dateObj || isNaN(dateObj.getTime())) return financeTodayYmd();

  const year = dateObj.getFullYear();
  const month = String(dateObj.getMonth() + 1).padStart(2, '0');
  const day = String(dateObj.getDate()).padStart(2, '0');

  return year + '-' + month + '-' + day;
}

function financeAddMonthsYmd(value, monthsToAdd) {
  const base = financeParseYmdToDate(value) || new Date();
  const d = new Date(base.getFullYear(), base.getMonth(), base.getDate());

  d.setMonth(d.getMonth() + Number(monthsToAdd || 0));

  return financeDateToYmd(d);
}

function financeBuildDefaultInstallmentRows(billing, count) {
  const total = Number((billing && billing.grand_total) || 0);
  const safeCount = Math.max(1, Number(count || 1));
  const baseDate = String((billing && billing.due_date) || (billing && billing.billing_date) || financeTodayYmd()).slice(0, 10);

  const baseAmount = Math.floor(total / safeCount);
  const rows = [];

  for (let i = 0; i < safeCount; i++) {
    const isLast = i === safeCount - 1;
    const previousTotal = baseAmount * i;
    const amount = isLast ? Math.max(total - previousTotal, 0) : baseAmount;

    rows.push({
      due_date: financeAddMonthsYmd(baseDate, i),
      amount_due: amount,
      notes: ''
    });
  }

  return rows;
}

function buildFinanceInstallmentPolicyFromCurrentDetail_() {
  const detail = currentFinanceBillingDetail || {};
  const billing = detail.billing || {};

  const billingId = String(billing.billing_id || '').trim();

  if (!billingId) {
    return null;
  }

  const payments = Array.isArray(detail.payments) ? detail.payments : [];
  const installments =
    currentFinanceInstallmentPlan &&
    Array.isArray(currentFinanceInstallmentPlan.installments)
      ? currentFinanceInstallmentPlan.installments
      : (Array.isArray(detail.installments) ? detail.installments : []);

  const billingStatus = String(billing.billing_status || '').trim().toLowerCase();
  const paidTotal = Number(billing.paid_total || 0);
  const outstandingTotal = Number(billing.outstanding_total || 0);

  const paymentCount = payments.filter(function(row) {
    return Number(row.amount || 0) > 0;
  }).length;

  let canEditPlan = true;
  let canClearPlan = true;
  let canCreatePlan = true;
  let reason = '';

  if (billingStatus === 'cancelled') {
    canEditPlan = false;
    canClearPlan = false;
    canCreatePlan = false;
    reason = 'Billing yang sudah cancelled tidak bisa diubah jadwal cicilannya';
  } else if (paymentCount > 0 || paidTotal > 0) {
    canEditPlan = false;
    canClearPlan = false;
    canCreatePlan = false;
    reason = 'Jadwal cicilan tidak bisa diubah karena billing sudah memiliki riwayat pembayaran';
  } else if (outstandingTotal <= 0) {
    canEditPlan = false;
    canClearPlan = false;
    canCreatePlan = false;
    reason = 'Billing sudah lunas';
  }

  return {
    billing_id: billingId,
    can_create_plan: canCreatePlan,
    can_edit_plan: canEditPlan,
    can_clear_plan: canClearPlan,
    has_installment_plan: installments.length > 0,
    payment_count: paymentCount,
    paid_total: paidTotal,
    outstanding_total: outstandingTotal,
    lock_reason: reason,
    installments: installments
  };
}

    .withSuccessHandler(function(res) {

function financeUpdateInstallmentAmount(index, value) {
  if (!financeInstallmentRowsState[index]) return;

  renderFinanceInstallmentEditorTotal();
}

function financeUpdateInstallmentNotes(index, value) {

function renderFinanceInstallmentEditorEmptyRowHtml() {

function renderFinanceInstallmentEditorRows() {
  const tbody = document.getElementById('financeInstallmentEditorBody');
  if (!tbody) return;

  if (!financeInstallmentRowsState.length) {
    tbody.innerHTML = renderFinanceInstallmentEditorEmptyRowHtml();
    renderFinanceInstallmentEditorTotal();
    return;
  }

  tbody.innerHTML = financeInstallmentRowsState
    .map(renderFinanceInstallmentEditorRowHtml)
    .join('');

  renderFinanceInstallmentEditorTotal();
}

function getFinanceInstallmentEditorTotalState() {
  const billing = financeGetCurrentBillingForInstallment();
  const grandTotal = Number(billing.grand_total || 0);

  const rowsTotal = financeInstallmentRowsState.reduce(function(sum, row) {
    return sum + Number(row.amount_due || 0);
  }, 0);

  const diff = rowsTotal - grandTotal;
  const isValid = Math.round(rowsTotal) === Math.round(grandTotal);

  return {
    grandTotal: grandTotal,
    rowsTotal: rowsTotal,
    diff: diff,
    isValid: isValid
  };
}

function renderFinanceInstallmentEditorTotalHtml(state) {
  const data = state || {};
  const className = data.isValid
    ? 'finance-installment-total-ok'
    : 'finance-installment-total-warning';

  return `
    <div class="${className}">
      Total termin: <strong>${financeFormatRupiah(data.rowsTotal || 0)}</strong>
      • Grand total: <strong>${financeFormatRupiah(data.grandTotal || 0)}</strong>
      ${
        data.isValid
          ? '• Sesuai'
          : '• Selisih: <strong>' + financeFormatRupiah(Math.abs(data.diff || 0)) + '</strong>'
      }
    </div>
  `;
}

function renderFinanceInstallmentEditorTotal() {
  const el = document.getElementById('financeInstallmentEditorTotal');
  if (!el) return;

  const state = getFinanceInstallmentEditorTotalState();
  el.innerHTML = renderFinanceInstallmentEditorTotalHtml(state);
}

function validateFinanceInstallmentRows() {
  const billing = financeGetCurrentBillingForInstallment();
  const grandTotal = Number(billing.grand_total || 0);
  const errors = [];

  if (!financeInstallmentRowsState.length) {
    errors.push('Minimal satu termin wajib dibuat');
  }

  financeInstallmentRowsState.forEach(function(row, index) {
    const no = index + 1;

    if (!row.due_date) {
      errors.push('Due date termin ke-' + no + ' wajib diisi');
    } else if (!/^\d{4}-\d{2}-\d{2}$/.test(String(row.due_date || ''))) {
      errors.push('Due date termin ke-' + no + ' tidak valid');
    }

    if (!Number(row.amount_due || 0) || Number(row.amount_due || 0) <= 0) {
      errors.push('Nominal termin ke-' + no + ' harus lebih dari 0');
    }
  });

  const rowsTotal = financeInstallmentRowsState.reduce(function(sum, row) {
    return sum + Number(row.amount_due || 0);
  }, 0);

  if (Math.round(rowsTotal) !== Math.round(grandTotal)) {
    errors.push('Total seluruh termin harus sama dengan grand total billing');
  }

  return errors;
}

function submitFinanceInstallmentPlan(e) {
  e.preventDefault();

  const processKey = FINANCE_PROCESS_KEYS.INSTALLMENT_SUBMIT;
  const processOptions = getFinanceInstallmentSubmitProcessOptions();

  if (financeIsProcessBusy(processKey)) {
    showToast('Proses simpan cicilan sedang berjalan. Mohon tunggu sebentar.', 'info');
    return;
  }

  financeSetText('error_finance_installments', '');
  clearFinanceModalAlert('financeInstallmentModal');

  const billingId = financeGetInputValue('finance_installment_billing_id');
  const validationErrors = validateFinanceInstallmentRows();

  if (!billingId) {
    financeSetText('error_finance_installments', 'Billing ID tidak ditemukan');

    showFinanceModalAlert(
      'financeInstallmentModal',
      'Billing ID tidak ditemukan. Tutup modal lalu buka ulang detail billing.',
      'error'
    );

    showToast('Billing ID tidak ditemukan', 'error');
    return;
  }

  if (validationErrors.length) {
    financeSetText('error_finance_installments', validationErrors[0]);

    showFinanceModalAlert(
      'financeInstallmentModal',
      validationErrors[0],
      'error'
    );

    showToast('Validasi gagal', 'error');
    return;
  }

  const payload = attachAuthContext({
    billing_id: billingId,
    actor_role: currentUser ? String(currentUser.role || '').toLowerCase() : '',
    installments: financeInstallmentRowsState.map(function(row) {
      return {
        due_date: String(row.due_date || '').trim(),
        amount_due: Number(row.amount_due || 0),
        notes: String(row.notes || '').trim()
      };
    })
  });

  if (!financeStartProcess(processKey, processOptions)) {
    showToast('Proses simpan cicilan sedang berjalan. Mohon tunggu sebentar.', 'info');
    return;
  }

  google.script.run
    .withSuccessHandler(function(res) {
      financeEndProcess(processKey, processOptions);

      if (!res || !res.success) {
        const message = financeGetServerErrorMessage(
          res,
          'Gagal menyimpan jadwal cicilan'
        );

        financeSetText('error_finance_installments', message);
        showFinanceModalAlert('financeInstallmentModal', message, 'error');
        showToast(message, 'error');
        return;
      }

      financeHideModalById('financeInstallmentModal');
      clearFinanceModalAlert('financeInstallmentModal');

      const invoiceMarkedStale = isFinanceInvoiceMarkedStaleFromMutationResult_(res);

      const localApplied = applyFinanceInstallmentPlanResultLocally_(res, {
        billingId: billingId
      });

      if (!localApplied) {
        currentFinanceInstallmentPlan = res.data || null;

        refreshFinanceAfterMutation({
          billingId: billingId,
          refreshDetail: true,
          refreshSummary: false,
          refreshBillingList: false,
          refreshReceivables: false,
          showDetailLoading: false
        });
      }

      showToast(
        'Jadwal cicilan berhasil disimpan' + (
          invoiceMarkedStale
            ? '. Invoice lama perlu diperbarui sebelum dikirim ulang.'
            : ''
        ),
        'success'
      );
    })
    .withFailureHandler(function(err) {
      financeEndProcess(processKey, processOptions);

      const message = financeGetFailureErrorMessage(
        err,
        'Gagal menyimpan jadwal cicilan'
      );

      financeSetText('error_finance_installments', message);
      showFinanceModalAlert('financeInstallmentModal', message, 'error');
      showToast('Error: ' + message, 'error');
    })
    .createOrReplaceBillingInstallmentPlan(payload);
}

let expenseDoctorCache = null;

function loadExpenseDoctors(selectId, selectedName) {
  const select = document.getElementById(selectId);
  if (!select) return;

  function populateSelect(doctors) {
    expenseDoctorCache = doctors;
    select.innerHTML = '<option value="">-- Pilih Dokter --</option>' +
      doctors.map(function(d) {
        const name = d.full_name || d.username || '';
        return '<option value="' + escapeAppHtml(name) + '"' +
          (name === selectedName ? ' selected' : '') + '>' +
          escapeAppHtml(name) + '</option>';
      }).join('');
    select.disabled = false;
  }

  // Coba cache dari treatment modal terlebih dahulu
  if (window.treatmentMasterCache &&
      Array.isArray(window.treatmentMasterCache.doctors) &&
      window.treatmentMasterCache.doctors.length > 0) {
    populateSelect(window.treatmentMasterCache.doctors);
    return;
  }

  // Coba cache lokal expense
  if (expenseDoctorCache && expenseDoctorCache.length > 0) {
    populateSelect(expenseDoctorCache);
    return;
  }

  // Fetch dari server
  select.innerHTML = '<option value="">Memuat dokter...</option>';
  select.disabled = true;

  google.script.run
    .withSuccessHandler(function(res) {
      if (res && res.success && Array.isArray(res.data)) {
        populateSelect(res.data);
      } else {
        select.innerHTML = '<option value="">Gagal memuat dokter</option>';
        select.disabled = false;
      }
    })
    .withFailureHandler(function() {
      select.innerHTML = '<option value="">Gagal memuat dokter</option>';
      select.disabled = false;
    })
    .getActiveDoctors({});
}

function submitEditExpense() {
  const el  = function(id) { return document.getElementById(id); };

  expClearAllFieldErrors('editExp');

  const expenseId   = (el('editExpId')          || {}).value || '';
  const date        = (el('editExpDate')         || {}).value || '';
  const category    = (el('editExpCategory')     || {}).value || '';
  const doctorName  = (el('editExpDoctorName')   || {}).value || '';
  const description = (el('editExpDescription')  || {}).value || '';
  const amount      = Number((el('editExpAmount') || {}).value || 0);
  const notes       = (el('editExpNotes')        || {}).value || '';

  let hasErr = false;
  function fieldErr(inputId, errId, msg) { expSetFieldErr(inputId, errId, msg); hasErr = true; }

  if (!expenseId)   { setEditExpenseAlert('ID pengeluaran tidak ditemukan.'); return; }
  if (!date)        fieldErr('editExpDate',        'editExpDateErr',        'Tanggal wajib diisi.');
  if (!category)    fieldErr('editExpCategory',    'editExpCategoryErr',    'Kategori wajib dipilih.');
  if (!description) fieldErr('editExpDescription', 'editExpDescriptionErr', 'Keterangan wajib diisi.');
  if (!amount || amount <= 0) fieldErr('editExpAmount', 'editExpAmountErr', 'Nominal harus lebih dari 0.');

  const doctorCats = ['doctor_salary','doctor_meal','doctor_standby'];
  if (doctorCats.indexOf(category) !== -1 && !doctorName) {
    fieldErr('editExpDoctorName', 'editExpDoctorNameErr', 'Nama dokter wajib dipilih untuk kategori ini.');
  }

  if (hasErr) return;

  expenseSetLoading_('editExpSubmitBtn', 'editExpCancelBtn', true);

  google.script.run
    .withSuccessHandler(function(res) {
      expenseSetLoading_('editExpSubmitBtn', 'editExpCancelBtn', false, 'Simpan Perubahan');
      if (!res || !res.success) {
        const msg = res && res.message ? res.message : 'Gagal menyimpan.';
        setEditExpenseAlert(msg);
        showToast('Gagal: ' + msg, 'error');
        return;
      }
      closeEditExpenseModal();
      showToast('Pengeluaran berhasil diperbarui.', 'success');
      if (typeof ownerPatchExpenseLocally === 'function') ownerPatchExpenseLocally(res.data, true);
      else if (typeof ownerLoadReport === 'function') ownerLoadReport();
    })
    .withFailureHandler(function(err) {
      expenseSetLoading_('editExpSubmitBtn', 'editExpCancelBtn', false, 'Simpan Perubahan');
      const msg = err && err.message ? err.message : String(err);
      setEditExpenseAlert('Error: ' + msg);
      showToast('Error: ' + msg, 'error');
    })
    .updateExpense(attachAuthContext({
      expense_id:   expenseId,
      expense_date: date,
      category:     category,
      doctor_name:  doctorName || null,
      description:  description,
      amount:       amount,
      notes:        notes || null
    }));
}

    })
    .withFailureHandler(function(err) {
      expenseSetLoading_('expSubmitBtn', 'expCancelBtn', false, 'Simpan');
      const msg = err && err.message ? err.message : String(err);
      setExpenseModalAlert('Error: ' + msg);
      showToast('Error: ' + msg, 'error');
    })
    .addExpense(attachAuthContext({
      expense_date: date,
      category:     category,
      doctor_name:  doctorName || null,
      description:  description,
      amount:       amount,
      notes:        notes || null
    }));
}

</script>
