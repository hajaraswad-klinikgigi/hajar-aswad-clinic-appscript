  BILLING_SEARCH: 'billing_search',
  RECEIVABLE_SEARCH: 'receivable_search'
};

function financeFormatRupiah(value) {
  return formatAppRupiah(value);
}

function financeFormatDateDmy(value) {
  return formatAppDateDmy(value);
}

function financeTodayYmd() {
  const now = new Date();
  const year = now.getFullYear();
  const month = String(now.getMonth() + 1).padStart(2, '0');
  const day = String(now.getDate()).padStart(2, '0');
  return year + '-' + month + '-' + day;
}

function escapeFinanceHtml(value) {
  return escapeAppHtml(value);
}

function escapeFinanceOnclickParam(value) {
  const jsSafe = String(value || '')
    .replace(/\\/g, '\\\\')
    .replace(/\r\n/g, '\\n')
    .replace(/\n/g, '\\n')
    .replace(/\r/g, '\\n')
    .replace(/'/g, "\\'");

  return escapeFinanceHtml(jsSafe);
}

function buildFinanceSearchText(row, fields) {
  const data = row || {};
  const list = Array.isArray(fields) ? fields : [];

  return list.map(function(field) {
    const value = data[field];

    return String(value === null || value === undefined ? '' : value);
  }).join(' ').trim().toLowerCase();
}

function paginateFinanceRows(rows, currentPage, pageSize) {
  const list = Array.isArray(rows) ? rows : [];
  const safePageSize = Math.max(1, Number(pageSize || 1));
  const totalRows = list.length;
  const totalPages = totalRows > 0
    ? Math.ceil(totalRows / safePageSize)
    : 0;

  let safeCurrentPage = Number(currentPage || 1);

  if (totalPages <= 0) {
    safeCurrentPage = 0;
  } else {
    safeCurrentPage = Math.max(1, Math.min(safeCurrentPage, totalPages));
  }

  const startIndex = safeCurrentPage > 0
    ? (safeCurrentPage - 1) * safePageSize
    : 0;

  const pageRows = totalRows > 0
    ? list.slice(startIndex, startIndex + safePageSize)
    : [];

  return {
    rows: pageRows,
    currentPage: safeCurrentPage,
    totalPages: totalPages,
    totalRows: totalRows,
    pageSize: safePageSize,
    startIndex: startIndex
  };
}

function renderFinancePaginationInfo(prefix, currentPage, totalPages, totalRows) {
  var get = function(id) { return document.getElementById(id); };
  var page  = Number(currentPage || 0);
  var pages = Number(totalPages  || 0);
  var count = Number(totalRows   || 0);
  var inp = get(prefix + 'CurrentPage');
  var tot = get(prefix + 'TotalPages');
  var cnt = get(prefix + 'PaginationInfo');
  var prv = get(prefix + 'PrevBtn');
  var nxt = get(prefix + 'NextBtn');
  if (inp) inp.textContent = page;
  if (tot) tot.textContent = pages;
  if (cnt) cnt.textContent = count + ' records';
  if (prv) prv.disabled = page <= 1;
  if (nxt) nxt.disabled = page >= pages;
}

function goToFinanceBillingPage(el) {
  var totalPages = Math.ceil(filteredFinanceBillings.length / financePageSize) || 1;
  var page = parseInt(el.textContent, 10);
  if (isNaN(page) || page < 1) page = 1;
  if (page > totalPages) page = totalPages;
  el.textContent = page;
  if (financeCurrentPage === page) return;
  financeCurrentPage = page;
  renderFinanceBillingTable();
}

function goToFinanceReceivablePage(el) {
  var totalPages = Math.ceil(filteredFinanceReceivables.length / financeReceivablePageSize) || 1;
  var page = parseInt(el.textContent, 10);
  if (isNaN(page) || page < 1) page = 1;
  if (page > totalPages) page = totalPages;
  el.textContent = page;
  if (financeReceivableCurrentPage === page) return;
  financeReceivableCurrentPage = page;
  renderFinanceReceivableTable();
}

function runFinanceDebounce(key, callback, delay) {
  const debounceKey = String(key || 'default').trim() || 'default';
  const wait = Math.max(0, Number(delay || FINANCE_SEARCH_DEBOUNCE_DELAY));

  if (financeDebounceTimers[debounceKey]) {
    clearTimeout(financeDebounceTimers[debounceKey]);
  }

  financeDebounceTimers[debounceKey] = setTimeout(function() {
    delete financeDebounceTimers[debounceKey];

    if (typeof callback === 'function') {
      callback();
    }
  }, wait);
}

function financeNormalizeAmountInput(value) {
  return String(value || '').replace(/[^\d]/g, '');
}

function financeParseAmountInput(value) {
  const digits = financeNormalizeAmountInput(value);
  return digits ? Number(digits) : 0;
}

function financeSetAmountInputValue(inputId, amount) {
  const num = Math.max(0, Math.round(Number(amount || 0)));
  financeSetInputValue(inputId, num ? String(num) : '');
}

function handleFinanceAmountInput(el) {
  if (!el) return;

  const normalized = financeNormalizeAmountInput(el.value);
  if (el.value !== normalized) {
    el.value = normalized;
  }
}

function financeGetEl(id) {
  return document.getElementById(id);

function financeSetHtml(id, html) {
  const el = financeGetEl(id);

  el.innerHTML = html;

}

function financeSetText(id, text) {
  const el = financeGetEl(id);

}

function financeSetInputValue(id, value) {
  const el = financeGetEl(id);

  el.value = value === null || value === undefined ? '' : String(value);
  return el;
}

function financeGetInputValue(id) {
  const el = financeGetEl(id);

}

function financeShowModalById(id) {
  const modal = financeGetEl(id);
  if (!modal) return null;

  modal.style.display = 'flex';
  modal.classList.remove('hidden');

}

function financeHideModalById(id) {

  if (!modal) return null;

  modal.classList.add('hidden');
  modal.style.display = 'none';

}

let financeUiProcessLocks = {};

function getFinanceProcessKey_(key) {
  return String(key || 'finance_process').trim() || 'finance_process';
}

function getFinanceSummaryLoadProcessOptions() {
  return {
    disableIds: ['financePeriodSelect']

function getFinanceBillingListLoadProcessOptions() {

function getFinanceReceivableLoadProcessOptions() {

function getFinanceBootstrapLoadProcessOptions() {

      'financeReceivableStatusFilter'
    ]
  };
}

function financeIsProcessBusy(processKey) {
  const key = getFinanceProcessKey_(processKey);
  return !!financeUiProcessLocks[key];
}

function financeLockProcess(processKey) {
  const key = getFinanceProcessKey_(processKey);

  if (financeUiProcessLocks[key]) {
    return false;
  }

  financeUiProcessLocks[key] = true;
  return true;
}

function financeUnlockProcess(processKey) {
  const key = getFinanceProcessKey_(processKey);

  if (financeUiProcessLocks[key]) {
    delete financeUiProcessLocks[key];
  }
}

function financeIsAnyProcessBusy(keys) {
  const list = Array.isArray(keys) ? keys : [];

  return list.some(function(key) {
    return financeIsProcessBusy(key);
  });
}

function financeGetActiveProcessMessage(checks) {
  const list = Array.isArray(checks) ? checks : [];

  for (let i = 0; i < list.length; i++) {
    const item = list[i] || {};

    if (financeIsProcessBusy(item.key)) {
      return item.message || 'Masih ada proses Finance yang berjalan. Mohon tunggu sebentar.';
    }
  }

  return '';
}

function financeGetServerErrorMessage(res, fallbackMessage) {
  const messages = [];
  const fallback = fallbackMessage || FINANCE_DEFAULT_ERROR_MESSAGE;

  if (res && res.message) {
    messages.push(String(res.message));
  }

  if (res && res.errors && typeof res.errors === 'object') {
    Object.keys(res.errors).forEach(function(key) {
      const value = res.errors[key];

      if (Array.isArray(value)) {
        value.forEach(function(item) {
          if (item) messages.push(String(item));
        });
        return;
      }

      if (value && typeof value === 'object') {
        Object.keys(value).forEach(function(childKey) {
          if (value[childKey]) messages.push(String(value[childKey]));
        });
        return;
      }

      if (value) {
        messages.push(String(value));
      }
    });
  }

  const uniqueMessages = [];
  const seen = {};

  messages.forEach(function(message) {
    const text = String(message || '').trim();
    if (!text || seen[text]) return;

    seen[text] = true;
    uniqueMessages.push(text);
  });

  return uniqueMessages.length
    ? uniqueMessages.join(' • ')
    : fallback;
}

function financeGetFailureErrorMessage(err, fallbackMessage) {
  const fallback = fallbackMessage || FINANCE_DEFAULT_ERROR_MESSAGE;

  if (!err) return fallback;

  if (err.message) {
    return String(err.message);
  }

  return String(err || fallback);
}

function financeRenderInlineStateHtml(type, title, message) {
  const stateType = String(type || 'info').trim().toLowerCase();

  const spinnerHtml = stateType === 'loading'
    ? '<span class="finance-loading-spinner" aria-hidden="true"></span>'
    : '';

  return `
    <div class="finance-ui-state finance-ui-state-${escapeFinanceHtml(stateType)}">
      <div class="finance-ui-state-head">
        ${spinnerHtml}
        <div class="finance-ui-state-title">${escapeFinanceHtml(title || '')}</div>
      </div>
      ${
        message
          ? `<div class="finance-ui-state-message">${escapeFinanceHtml(message)}</div>`
          : ''
      }
    </div>
  `;
}

function financeRenderTableStateRow(colspan, type, title, message) {
  return `
    <tr>
      <td colspan="${Number(colspan || 1)}">
        ${financeRenderInlineStateHtml(type, title, message)}
      </td>
    </tr>
  `;
}

function renderFinanceSectionLoading(elementId, message) {
  const el = document.getElementById(elementId);
  if (!el) return;

  el.innerHTML = financeRenderInlineStateHtml(
    'loading',
    'Memuat data...',
    message || 'Mohon tunggu sebentar.'
  );
}

function renderFinanceSectionError(elementId, title, message) {
  const el = document.getElementById(elementId);
  if (!el) return;

  el.innerHTML = financeRenderInlineStateHtml(
    'error',
    title || 'Gagal memuat data',
    message || FINANCE_DEFAULT_ERROR_MESSAGE
  );
}

function renderFinanceSectionInfo(elementId, title, message) {
  const el = document.getElementById(elementId);
  if (!el) return;

  el.innerHTML = financeRenderInlineStateHtml(
    'info',
    title || 'Informasi',
    message || ''
  );
}

function setFinanceButtonProcessingState(buttonId, isLoading, options) {
  const btn = document.getElementById(buttonId);
  if (!btn) return;

  const opts = options || {};

  if (isLoading) {
    if (!btn.hasAttribute('data-finance-idle-html')) {
      btn.setAttribute('data-finance-idle-html', btn.innerHTML);
    }

    if (!btn.hasAttribute('data-finance-prev-disabled')) {
      btn.setAttribute('data-finance-prev-disabled', btn.disabled ? '1' : '0');
    }

    btn.disabled = true;
    btn.classList.add('finance-is-loading');
    btn.setAttribute('aria-busy', 'true');
    btn.textContent = opts.loadingText || 'Memproses...';
    return;
  }

  const previousDisabled = btn.getAttribute('data-finance-prev-disabled');
  const previousHtml = btn.getAttribute('data-finance-idle-html');

  if (opts.idleText) {
    btn.textContent = opts.idleText;
  } else if (previousHtml !== null) {
    btn.innerHTML = previousHtml;
  }

  if (previousDisabled !== null) {
    btn.disabled = previousDisabled === '1';
  } else {
    btn.disabled = false;
  }

  btn.classList.remove('finance-is-loading');
  btn.removeAttribute('aria-busy');
  btn.removeAttribute('data-finance-idle-html');
  btn.removeAttribute('data-finance-prev-disabled');
}

function setFinanceControlsDisabled(elementIds, isDisabled) {
  const ids = Array.isArray(elementIds) ? elementIds : [];

  ids.forEach(function(id) {
    const el = document.getElementById(id);
    if (!el) return;

    if (isDisabled) {
      if (!el.hasAttribute('data-finance-prev-disabled')) {
        el.setAttribute('data-finance-prev-disabled', el.disabled ? '1' : '0');
      }

      el.disabled = true;
      el.classList.add('finance-is-disabled');
      return;
    }

    const previousDisabled = el.getAttribute('data-finance-prev-disabled');

    if (previousDisabled !== null) {
      el.disabled = previousDisabled === '1';
    } else {
      el.disabled = false;
    }

    el.classList.remove('finance-is-disabled');
    el.removeAttribute('data-finance-prev-disabled');
  });
}

function ensureFinanceModalAlert(modalId) {
  const modal = document.getElementById(modalId);
  if (!modal) return null;

  let alertEl = modal.querySelector('.finance-modal-server-alert');

  if (alertEl) {
    return alertEl;
  }

  const host =
    modal.querySelector('.modal-form-scroll') ||
    modal.querySelector('.detail-modal-content-scroll') ||
    modal.querySelector('.modal-box');

  if (!host) return null;

  alertEl = document.createElement('div');
  alertEl.className = 'finance-modal-server-alert hidden';

  if (host.firstChild) {
    host.insertBefore(alertEl, host.firstChild);
  } else {
    host.appendChild(alertEl);
  }

  return alertEl;
}

function showFinanceModalAlert(modalId, message, type) {
  const alertEl = ensureFinanceModalAlert(modalId);
  if (!alertEl) return;

  const alertType = String(type || 'error').trim().toLowerCase();

  alertEl.className = 'finance-modal-server-alert finance-modal-server-alert-' + alertType;
  alertEl.innerHTML = `
    <div class="finance-modal-server-alert-title">
      ${
        alertType === 'success'
          ? 'Berhasil'
          : alertType === 'info'
            ? 'Informasi'
            : 'Terjadi Kesalahan'
      }
    </div>
    <div class="finance-modal-server-alert-message">
      ${escapeFinanceHtml(message || FINANCE_DEFAULT_ERROR_MESSAGE)}
    </div>
  `;
}

function clearFinanceModalAlert(modalId) {
  const modal = document.getElementById(modalId);
  if (!modal) return;

  const alertEl = modal.querySelector('.finance-modal-server-alert');
  if (!alertEl) return;

  alertEl.className = 'finance-modal-server-alert hidden';
  alertEl.innerHTML = '';
}

function financeStartProcess(processKey, options) {
  const key = getFinanceProcessKey_(processKey);
  const opts = options || {};

  if (!financeLockProcess(key)) {
    return false;
  }

  if (opts.clearModalAlertId) {
    clearFinanceModalAlert(opts.clearModalAlertId);
  }

  if (opts.modalId && opts.primaryButtonId && typeof setModalProcessingState === 'function') {
    setModalProcessingState(opts.modalId, true, {
      primaryButtonId: opts.primaryButtonId,
      loadingText: opts.loadingText || 'Memproses...'
    });
  } else if (opts.buttonId) {
    setFinanceButtonProcessingState(opts.buttonId, true, {
      loadingText: opts.loadingText || 'Memproses...'
    });
  }

  if (opts.disableIds) {
    setFinanceControlsDisabled(opts.disableIds, true);
  }

  if (opts.sectionId && opts.sectionLoadingMessage) {
    renderFinanceSectionLoading(opts.sectionId, opts.sectionLoadingMessage);
  }

  return true;
}

function financeEndProcess(processKey, options) {
  const key = getFinanceProcessKey_(processKey);
  const opts = options || {};

  financeUnlockProcess(key);

  if (opts.modalId && opts.primaryButtonId && typeof setModalProcessingState === 'function') {
    setModalProcessingState(opts.modalId, false, {
      primaryButtonId: opts.primaryButtonId,
      idleText: opts.idleText || ''
    });
  } else if (opts.buttonId) {
    setFinanceButtonProcessingState(opts.buttonId, false, {
      idleText: opts.idleText || ''
    });
  }

  if (opts.disableIds) {
    setFinanceControlsDisabled(opts.disableIds, false);
  }
}

function financeShowProcessError(processKey, options, resOrErr, fallbackMessage) {
  const opts = options || {};
  const message = resOrErr && resOrErr.errors !== undefined || resOrErr && resOrErr.success !== undefined
    ? financeGetServerErrorMessage(resOrErr, fallbackMessage)
    : financeGetFailureErrorMessage(resOrErr, fallbackMessage);

  financeEndProcess(processKey, opts);

  if (opts.modalId) {
    showFinanceModalAlert(opts.modalId, message, 'error');
  }

  if (opts.sectionId) {
    renderFinanceSectionError(opts.sectionId, 'Gagal memproses data', message);
  }

  showToast(message, 'error');
}

function getFinancePaymentStatusBadge(status) {
  const value = String(status || '').trim().toLowerCase();

  if (value === 'paid') {
    return '<span class="status-badge completed">Paid</span>';
  }

  if (value === 'partial') {
    return '<span class="status-badge scheduled">Partial</span>';
  }

  if (value === 'unpaid') {
    return '<span class="status-badge cancelled">Unpaid</span>';
  }

  return '<span class="status-badge default">Unknown</span>';
}

function getFinanceBillingStatusBadge(status) {
  const value = String(status || '').trim().toLowerCase();

  if (value === 'draft') {
    return '<span class="status-badge default">Draft</span>';
  }

  if (value === 'issued') {
    return '<span class="status-badge scheduled">Issued</span>';
  }

  if (value === 'cancelled') {
    return '<span class="status-badge cancelled">Cancelled</span>';
  }

  return '<span class="status-badge default">' + escapeFinanceHtml(value || 'Unknown') + '</span>';
}

function changeFinancePeriod(el) {
  if (financeIsProcessBusy(FINANCE_PROCESS_KEYS.BOOTSTRAP_LOAD)) {
    if (el) {
      el.value = financePeriod;
    }
    return;
  }

  financePeriod = el && el.value ? el.value : 'today';
  reloadFinancePageData();
}

function reloadFinancePageData() {
  loadFinancePageBootstrap();
}

function loadFinancePageBootstrap() {
  const processKey = FINANCE_PROCESS_KEYS.BOOTSTRAP_LOAD;
  const processOptions = getFinanceBootstrapLoadProcessOptions();

  if (!financeStartProcess(processKey, processOptions)) {
    return;
  }

  const cached = financeBootstrapCache[financePeriod];
  if (cached) {
    // Stale-while-revalidate: tampilkan cache dulu, skip skeleton
    renderFinanceBootstrap(cached);
  } else {
    renderFinancePageBootstrapLoadingState();
  }

  google.script.run
    .withSuccessHandler(function(res) {
      financeEndProcess(processKey, processOptions);
      if (res && res.success) {
        financeBootstrapCache[financePeriod] = res;
      }
      renderFinanceBootstrap(res);
    })
    .withFailureHandler(function(err) {
      financeEndProcess(processKey, processOptions);

      const message = financeGetFailureErrorMessage(
        err,
        'Gagal memuat halaman Finance'
      );

      if (!financeBootstrapCache[financePeriod]) {
        renderFinancePageBootstrapErrorState(message);
      }
      showToast('Error finance bootstrap: ' + message, 'error');
    })
    .getFinancePageBootstrap(attachAuthContext({
      period: financePeriod
    }));
}

function renderFinanceBootstrap(res) {
  if (!res || !res.success) {
    const message = financeGetServerErrorMessage(
      res,
      'Gagal memuat halaman Finance'
    );

    renderFinancePageBootstrapErrorState(message);
    showToast(message, 'error');
    return;
  }

  const data = res.data || {};

  const summaryOk = renderFinanceBootstrapSummary_(data.summary);
  const billingsOk = applyFinanceBillingListResponse_(data.billings);
  const receivablesOk = applyFinanceReceivablesResponse_(data.receivables);

  if (!summaryOk || !billingsOk || !receivablesOk) {
    showToast('Sebagian data Finance gagal dimuat.', 'error');
  }
}

function renderFinanceBootstrapSummary_(summaryRes) {
  if (!summaryRes || !summaryRes.success) {
    const message = financeGetServerErrorMessage(
      summaryRes,
      'Gagal memuat summary finance'
    );

    renderFinanceSummaryErrorState(message);
    return false;
  }

  renderFinanceSummary(summaryRes);
  return true;
}

function refreshFinanceAfterMutation(options) {
  const opts = options || {};
  const billingId = String(opts.billingId || opts.billing_id || '').trim();

  const shouldRefreshDetail = opts.refreshDetail !== false && !!billingId;
  const shouldRefreshSummary = opts.refreshSummary !== false;
  const shouldRefreshBillingList = opts.refreshBillingList !== false;
  const shouldRefreshReceivables = opts.refreshReceivables !== false;

  if (opts.showDetailLoading && shouldRefreshDetail) {
    renderFinanceBillingDetailLoadingState();
  }

  if (shouldRefreshDetail) {
    loadFinanceBillingDetail(billingId);
  }

  if (shouldRefreshSummary) {
    loadFinanceSummary();
  }

  if (shouldRefreshBillingList) {
    loadFinanceBillings();
  }

  if (shouldRefreshReceivables) {
    loadFinanceReceivables();
  }
}

function attachFinanceBillingSearchText_(row) {
  const data = row || {};

  data._search_text = buildFinanceSearchText(data, [
    'billing_id',

    'treatment_id',
    'appointment_id',
    'patient_id',

  ]);

  return data;
}

function upsertFinanceBillingListRow_(billing) {
  const data = billing || {};
  const billingId = String(data.billing_id || '').trim();

  if (!billingId) return false;

  const normalized = attachFinanceBillingSearchText_(Object.assign({}, data));
  let found = false;

  allFinanceBillings = (allFinanceBillings || []).map(function(row) {
    if (String(row.billing_id || '').trim() !== billingId) {
      return row;
    }

    found = true;
    return attachFinanceBillingSearchText_(Object.assign({}, row, normalized));
  });

  if (!found) {
    allFinanceBillings.unshift(normalized);
  }

  applyFinanceBillingFilters(true);
  return true;
}

function getFinanceNextReceivableInstallmentFromPlan_(installmentPlan) {
  const plan = installmentPlan || {};
  const rows = Array.isArray(plan.installments) ? plan.installments : [];

  return rows.find(function(row) {
    const status = String(row.status || '').trim().toLowerCase();

    const amountDue = Number(row.amount_due || 0);
    const paidAmount = Number(row.paid_amount || 0);
    const outstandingAmount = Number(row.outstanding_amount || 0);

    const calculatedOutstanding = outstandingAmount > 0
      ? outstandingAmount
      : Math.max(0, amountDue - paidAmount);

    return status !== 'paid' && calculatedOutstanding > 0;
  }) || null;
}

function buildFinanceReceivableRowFromBillingAndPlan_(billing, installmentPlan) {
  const data = Object.assign({}, billing || {});
  const paymentType = String(data.payment_type || '').trim().toLowerCase();
  const paymentTerms = String(data.payment_terms || '').trim().toLowerCase();
  const isInstallmentBilling = paymentType === 'installment' || paymentTerms === 'installment';

  if (isInstallmentBilling && installmentPlan) {
    const nextInstallment = getFinanceNextReceivableInstallmentFromPlan_(installmentPlan);

    if (nextInstallment && nextInstallment.due_date) {
      const amountDue = Number(nextInstallment.amount_due || 0);
      const paidAmount = Number(nextInstallment.paid_amount || 0);
      const outstandingAmount = Number(nextInstallment.outstanding_amount || 0);

      data.billing_due_date = String(data.due_date || '');
      data.receivable_due_date = String(nextInstallment.due_date || '');
      data.due_date = String(nextInstallment.due_date || '');

      data.is_installment_receivable = true;
      data.receivable_installment_id = String(nextInstallment.installment_id || '');
      data.receivable_installment_no = Number(nextInstallment.installment_no || 0);
      data.receivable_installment_amount_due = amountDue;
      data.receivable_installment_paid_amount = paidAmount;
      data.receivable_installment_outstanding = outstandingAmount > 0
        ? outstandingAmount
        : Math.max(0, amountDue - paidAmount);
    }
  }

  return normalizeFinanceReceivableRow(data);
}

function upsertFinanceReceivableRowFromBilling_(billing, options) {
  const opts = options || {};
  const data = billing || {};
  const billingId = String(data.billing_id || '').trim();

  if (!billingId) return false;

  const outstanding = Number(data.outstanding_total || 0);
  let found = false;

  if (outstanding <= 0 || String(data.billing_status || '').trim().toLowerCase() === 'cancelled') {
    allFinanceReceivables = (allFinanceReceivables || []).filter(function(row) {
      return String(row.billing_id || '').trim() !== billingId;
    });

    applyFinanceReceivableFilters(true);
    renderFinanceReceivableSummary(
      buildFinanceReceivableSummary(allFinanceReceivables)
    );

    return true;
  }

  const normalized = buildFinanceReceivableRowFromBillingAndPlan_(
    data,
    opts.installmentPlan || opts.installment_plan || null
  );

  allFinanceReceivables = (allFinanceReceivables || []).map(function(row) {
    if (String(row.billing_id || '').trim() !== billingId) {
      return row;
    }

    found = true;
    return Object.assign({}, row, normalized);
  });

  if (!found) {
    allFinanceReceivables.unshift(normalized);
  }

  renderFinanceReceivableSummary(
    buildFinanceReceivableSummary(allFinanceReceivables)
  );

  applyFinanceReceivableFilters(true);
  return true;
}

function getFinanceInstallmentPlanFromMutationResult_(res) {
  const data = (res && res.data) || {};

  let plan = data.installment_plan || null;

  if (plan && plan.success && plan.data) {
    plan = plan.data;
  }

  if (plan && Array.isArray(plan.installments)) {
    return plan;
  }

  if (Array.isArray(data.installments)) {
    return {
      billing: data.billing || null,
      installments: data.installments,
      summary: data.summary || {}
    };
  }

  const sync = data.installment_sync || null;

  if (sync && Array.isArray(sync.installments)) {
    return {
      billing: data.billing || null,
      installments: sync.installments,
      summary: sync.summary || {}
    };
  }

  return null;
}

function getFinanceBillingFromMutationResult_(res) {
  const data = (res && res.data) || {};

  if (data.billing && data.billing.billing_id) {
    return data.billing;
  }

  const installmentPlan = getFinanceInstallmentPlanFromMutationResult_(res);

  if (installmentPlan && installmentPlan.billing && installmentPlan.billing.billing_id) {
    return installmentPlan.billing;
  }

  return null;
}

function mergeFinanceMutationDetailFromResult_(res, options) {
  const opts = options || {};
  const data = (res && res.data) || {};
  const billing = getFinanceBillingFromMutationResult_(res);
  const installmentPlan = getFinanceInstallmentPlanFromMutationResult_(res);

  const billingId = String(
    opts.billingId ||
    opts.billing_id ||
    (billing && billing.billing_id) ||
    ''
  ).trim();

  if (!billingId || !currentFinanceBillingDetail) {
    return false;
  }

  const detail = currentFinanceBillingDetail;
  const currentBilling = detail.billing || {};

  if (billing && String(billing.billing_id || '').trim() === billingId) {
    detail.billing = Object.assign({}, currentBilling, billing);
  }

  if (data.adjustment && data.adjustment.adjustment_id) {
    const adjustmentId = String(data.adjustment.adjustment_id || '').trim();
    const adjustments = Array.isArray(detail.adjustments)
      ? detail.adjustments.slice()
      : [];

    const exists = adjustments.some(function(row) {
      return String(row.adjustment_id || '').trim() === adjustmentId;
    });

    if (!exists) {
      adjustments.unshift(data.adjustment);
    }

    detail.adjustments = adjustments;
  }

  if (data.payment && data.payment.payment_id) {
    const paymentId = String(data.payment.payment_id || '').trim();
    const payments = Array.isArray(detail.payments)
      ? detail.payments.slice()
      : [];

    const exists = payments.some(function(row) {
      return String(row.payment_id || '').trim() === paymentId;
    });

    if (!exists) {
      payments.unshift(data.payment);
    }

    detail.payments = payments;
  }

  if (installmentPlan && Array.isArray(installmentPlan.installments)) {
    const planBilling = installmentPlan.billing || null;

    if (planBilling && String(planBilling.billing_id || '').trim() === billingId) {
      detail.billing = Object.assign({}, detail.billing || {}, planBilling);
    }

    currentFinanceInstallmentPlan = installmentPlan;
    detail.installments = installmentPlan.installments;
  }

  currentFinanceBillingDetail = detail;
  renderFinanceBillingDetail(currentFinanceBillingDetail);

  return true;
}

function applyFinanceMutationResultLocally_(res, options) {
  const opts = options || {};
  const billing = getFinanceBillingFromMutationResult_(res);
  const installmentPlan = getFinanceInstallmentPlanFromMutationResult_(res);

  const detailApplied = mergeFinanceMutationDetailFromResult_(res, opts);

  let billingListApplied = false;
  let receivableApplied = false;

  if (billing && billing.billing_id) {
    billingListApplied = upsertFinanceBillingListRow_(billing);

    receivableApplied = upsertFinanceReceivableRowFromBilling_(billing, {
      installmentPlan: installmentPlan
    });
  }

  if (opts.refreshSummary !== false) {
    setTimeout(function() {
      loadFinanceSummary();
    }, 80);
  }

  return !!(detailApplied || billingListApplied || receivableApplied);
}

function applyFinanceInstallmentPlanResultLocally_(res, options) {
  const opts = options || {};
  const installmentPlan = getFinanceInstallmentPlanFromMutationResult_(res);

  const billingId = String(
    opts.billingId ||
    opts.billing_id ||
    (
      installmentPlan &&
      installmentPlan.billing &&
      installmentPlan.billing.billing_id
    ) ||
    ''
  ).trim();

  if (!billingId) {
    return false;
  }

  if (!installmentPlan || !Array.isArray(installmentPlan.installments)) {
    return false;
  }

  if (!currentFinanceBillingDetail || !currentFinanceBillingDetail.billing) {
    return false;
  }

  const currentBilling = currentFinanceBillingDetail.billing || {};
  const currentBillingId = String(currentBilling.billing_id || '').trim();

  if (currentBillingId && currentBillingId !== billingId) {
    return false;
  }

  const planBilling = installmentPlan.billing || {};
  const mergedBilling = Object.assign({}, currentBilling, planBilling);

  mergedBilling.billing_id = String(mergedBilling.billing_id || billingId);

  if (!String(mergedBilling.payment_type || '').trim()) {
    mergedBilling.payment_type = 'installment';
  }

  if (!String(mergedBilling.payment_terms || '').trim()) {
    mergedBilling.payment_terms = 'installment';
  }

  if (isFinanceInvoiceMarkedStaleFromMutationResult_(res)) {
    mergedBilling.invoice_delivery_status = 'stale';
  }

  const normalizedPlan = Object.assign({}, installmentPlan, {
    billing: mergedBilling,
    installments: installmentPlan.installments || []
  });

  currentFinanceBillingDetail = Object.assign({}, currentFinanceBillingDetail, {
    billing: mergedBilling,
    installments: normalizedPlan.installments
  });

  currentFinanceInstallmentPlan = normalizedPlan;
  financeInstallmentRowsState = [];

  renderFinanceBillingDetail(currentFinanceBillingDetail, {
    skipInvoiceBackgroundRefresh: true
  });

  if (typeof upsertFinanceBillingListRow_ === 'function') {
    upsertFinanceBillingListRow_(mergedBilling);
  }

  if (typeof upsertFinanceReceivableRowFromBilling_ === 'function') {
    upsertFinanceReceivableRowFromBilling_(mergedBilling);
  }

  return true;
}

function applyFinanceInvoiceMutationResultLocally_(res, options) {
  const opts = options || {};
  const data = (res && res.data) || {};
  const billingUpdate = data.billing || {};
  const billingId = String(
    opts.billingId ||
    opts.billing_id ||
    billingUpdate.billing_id ||
    ''
  ).trim();

  if (!billingId) return false;

  const detail = currentFinanceBillingDetail || {};
  const currentBilling = detail.billing || {};

  const mergedBilling = Object.assign({}, currentBilling, billingUpdate);

  if (data.file_id) {
    mergedBilling.invoice_pdf_file_id = String(data.file_id || '');
  }

  if (data.file_url) {
    mergedBilling.invoice_pdf_url = String(data.file_url || '');
  }

  if (data.email_to) {
    mergedBilling.invoice_sent_to = String(data.email_to || '');
  }

  if (currentFinanceBillingDetail) {
    currentFinanceBillingDetail.billing = mergedBilling;
  }

  const previousInfo = currentFinanceInvoiceDeliveryInfo || {};

  const invoiceStatus = String(
    mergedBilling.invoice_delivery_status ||
    previousInfo.invoice_delivery_status ||
    ''
  ).trim().toLowerCase();

  const hasPdf = !!String(
    mergedBilling.invoice_pdf_url ||
    previousInfo.invoice_pdf_url ||
    data.file_url ||
    ''
  ).trim();

  const sentTo = String(
    mergedBilling.invoice_sent_to ||
    data.email_to ||
    previousInfo.invoice_sent_to ||
    previousInfo.suggested_email ||
    ''
  ).trim();

  const sentAt = String(
    mergedBilling.invoice_sent_at ||
    previousInfo.invoice_sent_at ||
    ''
  ).trim();

  let pdfStatus = hasPdf ? 'fresh' : 'not_generated';
  let pdfStatusLabel = hasPdf ? 'PDF fresh' : 'PDF belum dibuat';
  let pdfStatusMessage = hasPdf
    ? 'PDF invoice masih sesuai dengan data billing terbaru.'
    : 'PDF invoice belum dibuat. Generate PDF sebelum mengirim email.';

  if (invoiceStatus === 'sent') {
    pdfStatus = hasPdf ? 'fresh' : pdfStatus;
    pdfStatusLabel = hasPdf ? 'PDF fresh' : pdfStatusLabel;
    pdfStatusMessage = hasPdf
      ? 'PDF invoice sudah terbaru dan invoice sudah dikirim ke email pasien.'
      : pdfStatusMessage;
  }

  currentFinanceInvoiceDeliveryInfo = Object.assign({}, previousInfo, {
    billing_id: billingId,
    billing_number: String(
      mergedBilling.billing_number ||
      previousInfo.billing_number ||
      ''
    ),
    patient_id: String(
      mergedBilling.patient_id ||
      previousInfo.patient_id ||
      ''
    ),
    patient_name: String(
      mergedBilling.patient_name ||
      previousInfo.patient_name ||
      ''
    ),
    suggested_email: String(previousInfo.suggested_email || sentTo || ''),

    invoice_pdf_file_id: String(
      mergedBilling.invoice_pdf_file_id ||
      previousInfo.invoice_pdf_file_id ||
      data.file_id ||
      ''
    ),
    invoice_pdf_url: String(
      mergedBilling.invoice_pdf_url ||
      previousInfo.invoice_pdf_url ||
      data.file_url ||
      ''
    ),
    invoice_sent_to: sentTo,
    invoice_sent_at: sentAt,
    invoice_delivery_status: String(
      mergedBilling.invoice_delivery_status ||
      previousInfo.invoice_delivery_status ||
      ''
    ),

    invoice_pdf_signature: String(
      mergedBilling.invoice_pdf_signature ||
      previousInfo.invoice_pdf_signature ||
      ''
    ),
    invoice_pdf_signature_at: String(
      mergedBilling.invoice_pdf_signature_at ||
      previousInfo.invoice_pdf_signature_at ||
      ''
    ),

    invoice_pdf_status: pdfStatus,
    invoice_pdf_status_label: pdfStatusLabel,
    invoice_pdf_status_message: pdfStatusMessage,
    invoice_pdf_is_fresh: hasPdf,
    invoice_pdf_needs_regenerate: false,
    invoice_pdf_current_signature: String(
      mergedBilling.invoice_pdf_signature ||
      previousInfo.invoice_pdf_current_signature ||
      ''
    )
  });

  renderFinanceInvoiceDeliverySection(currentFinanceInvoiceDeliveryInfo);

  return true;
}

function applyFinanceClearInstallmentPlanResultLocally_(res, options) {
  const opts = options || {};
  const data = (res && res.data) || {};

  const billingFromResponse = data.billing || null;

  const billingId = String(
    opts.billingId ||
    opts.billing_id ||
    (billingFromResponse && billingFromResponse.billing_id) ||
    financeGetInputValue('finance_clear_installment_billing_id') ||
    ''
  ).trim();

  if (!billingId) {
    return false;
  }

  if (!currentFinanceBillingDetail || !currentFinanceBillingDetail.billing) {
    return false;
  }

  const currentBilling = currentFinanceBillingDetail.billing || {};
  const currentBillingId = String(currentBilling.billing_id || '').trim();

  if (currentBillingId && currentBillingId !== billingId) {
    return false;
  }

  const invoiceStaleUpdate = data.invoice_stale_update || null;
  const invoiceStaleData = invoiceStaleUpdate && invoiceStaleUpdate.data
    ? invoiceStaleUpdate.data
    : null;

  const mergedBilling = Object.assign(
    {},
    currentBilling,
    billingFromResponse || {}
  );

  mergedBilling.billing_id = String(mergedBilling.billing_id || billingId);
  mergedBilling.payment_type = 'full';
  mergedBilling.payment_terms = 'full';

  if (!String(mergedBilling.due_date || '').trim()) {
    mergedBilling.due_date = String(
      mergedBilling.billing_date ||
      currentBilling.billing_date ||
      ''
    );
  }

  if (
    invoiceStaleData &&
    Object.prototype.hasOwnProperty.call(invoiceStaleData, 'invoice_delivery_status')
  ) {
    mergedBilling.invoice_delivery_status = String(
      invoiceStaleData.invoice_delivery_status || ''
    );
  }

  currentFinanceBillingDetail = Object.assign({}, currentFinanceBillingDetail, {
    billing: mergedBilling,
    installments: []
  });

  currentFinanceInstallmentPlan = {
    billing: mergedBilling,
    installments: [],
    summary: {
      grand_total: Number(mergedBilling.grand_total || 0),
      paid_total: Number(mergedBilling.paid_total || 0),
      outstanding_total: Number(mergedBilling.outstanding_total || 0),
      installment_count: 0,
      next_due_date: '',
      next_due_amount: 0
    }
  };

  financeInstallmentRowsState = [];

  renderFinanceBillingDetail(currentFinanceBillingDetail);

  if (typeof upsertFinanceBillingListRow_ === 'function') {
    upsertFinanceBillingListRow_(mergedBilling);
  }

  if (typeof upsertFinanceReceivableRowFromBilling_ === 'function') {
    upsertFinanceReceivableRowFromBilling_(mergedBilling);
  }

  return true;
}

function loadFinanceSummary() {
  const processKey = FINANCE_PROCESS_KEYS.SUMMARY_LOAD;
  const processOptions = getFinanceSummaryLoadProcessOptions();

  if (!financeStartProcess(processKey, processOptions)) {
    return;
  }

  renderFinanceSummaryLoadingState();

  google.script.run
    .withSuccessHandler(function(res) {
      financeEndProcess(processKey, processOptions);

      if (!res || !res.success) {
        const message = financeGetServerErrorMessage(
          res,
          'Gagal memuat summary finance'
        );

        renderFinanceSummaryErrorState(message);
        showToast(message, 'error');

      }

      renderFinanceSummary(res);
    })
    .withFailureHandler(function(err) {
      financeEndProcess(processKey, processOptions);

      const message = financeGetFailureErrorMessage(
        err,
        'Gagal memuat summary finance'
      );

      renderFinanceSummaryErrorState(message);
      showToast('Error finance summary: ' + message, 'error');
    })

      period: financePeriod

function renderFinanceSummary(res) {

      res,
      'Gagal memuat periode finance'

      'patient_name',

function applyFinanceReceivablesResponse_(res) {
  if (!res || !res.success) {
    const message = financeGetServerErrorMessage(
      res,
      'Gagal memuat laporan piutang'
    );

    allFinanceReceivables = [];
    filteredFinanceReceivables = [];
    financeReceivableCurrentPage = 1;

    financeSetHtml(
      'financeReceivableTableBody',
      financeRenderTableStateRow(
        6,
        'error',
        'Gagal memuat data piutang',
        message
      )
    );

    financeSetHtml(
      'financeReceivableSummary',
      financeRenderInlineStateHtml(
        'error',
        'Gagal memuat ringkasan piutang',
        message
      )
    );

    renderFinancePaginationInfo('financeReceivable', 0, 0, 0);
    return false;
  }

  const payload = res.data || {};
  const rows = Array.isArray(payload)
    ? payload
    : (Array.isArray(payload.rows) ? payload.rows : []);

  allFinanceReceivables = rows
    .map(normalizeFinanceReceivableRow)
    .filter(function(row) {
      return Number(row.outstanding_total || 0) > 0;
    });

  const summaryData = payload.summary ||
    buildFinanceReceivableSummary(allFinanceReceivables);

  renderFinanceReceivableSummary(summaryData);
  applyFinanceReceivableFilters(false);

  return true;
}

function getFinanceBillingFilterState() {
  const searchInput = financeGetEl('financeBillingSearchInput');
  const statusFilter = financeGetEl('financePaymentStatusFilter');

  return {
    keyword: String(searchInput ? searchInput.value : '').trim().toLowerCase(),
    paymentStatus: String(statusFilter ? statusFilter.value : '').trim().toLowerCase()
  };
}

function doesFinanceBillingMatchFilters(row, filters) {
  const data = row || {};
  const state = filters || {};

  const matchKeyword = !state.keyword ||
    String(data._search_text || '').includes(state.keyword);

  const matchPaymentStatus = !state.paymentStatus ||
    String(data.payment_status || '').trim().toLowerCase() === state.paymentStatus;

  return matchKeyword && matchPaymentStatus;
}

function hasActiveFinanceBillingFilters() {
  const filters = getFinanceBillingFilterState();

  return !!filters.keyword || !!filters.paymentStatus;
}

function getFinanceBillingEmptyStateText() {
  if (hasActiveFinanceBillingFilters()) {

function openFinanceBillingDetail(billingId) {
  const normalizedBillingId = String(billingId || '').trim();

  if (!normalizedBillingId) {
    showToast('Billing ID tidak ditemukan', 'error');
    return;
  }

  if (!financeShowModalById('financeBillingDetailModal')) return;

  const token = ++financeBillingDetailLoadToken;

  renderFinanceBillingDetailFastPreview_(normalizedBillingId);

  loadFinanceBillingDetail(normalizedBillingId, {
    token: token,
    showLoading: false
  });
}

function loadFinanceBillingDetail(billingId, options) {
  const opts = options || {};
  const normalizedBillingId = String(billingId || '').trim();

  if (!normalizedBillingId) {
    renderFinanceBillingDetailErrorState('Billing ID tidak ditemukan');
    showToast('Billing ID tidak ditemukan', 'error');
    return;
  }

  if (opts.showLoading !== false) {
    renderFinanceBillingDetailLoadingState();
  }

  google.script.run
    .withSuccessHandler(function(res) {
      if (opts.token && opts.token !== financeBillingDetailLoadToken) {
        return;
      }

      if (!res || !res.success) {
        const message = financeGetServerErrorMessage(
          res,
          'Gagal memuat detail billing'
        );

        renderFinanceBillingDetailErrorState(message);
        showToast(message, 'error');
        return;
      }

      currentFinanceBillingDetail = res.data || null;
      renderFinanceBillingDetail(currentFinanceBillingDetail);
    })
    .withFailureHandler(function(err) {
      if (opts.token && opts.token !== financeBillingDetailLoadToken) {
        return;
      }

      const message = financeGetFailureErrorMessage(
        err,
        'Gagal memuat detail billing'
      );

      renderFinanceBillingDetailErrorState(message);
      showToast(message, 'error');
    })
    .getBillingById(attachAuthContext({
      billing_id: normalizedBillingId
    }));
}

function financeBillingHasPaymentHistory(data) {
  const billing = (data && data.billing) || {};
  const payments = Array.isArray(data && data.payments) ? data.payments : [];

  return payments.some(function(row) {
    return Number(row.amount || 0) > 0;
  }) || Number(billing.paid_total || 0) > 0;
}

function financeCanChangeInstallmentPlan(data) {
  const billing = (data && data.billing) || {};
  const isCancelled = String(billing.billing_status || '').trim().toLowerCase() === 'cancelled';
  const outstanding = Number(billing.outstanding_total || 0);

  if (isCancelled) return false;
  if (outstanding <= 0) return false;
  if (financeBillingHasPaymentHistory(data)) return false;

  return true;
}

function getFinanceInstallmentPlanLockMessage(data) {
  const billing = (data && data.billing) || {};

  if (String(billing.billing_status || '').trim().toLowerCase() === 'cancelled') {
    return 'Jadwal cicilan tidak bisa diubah karena billing sudah cancelled.';
  }

  if (Number(billing.outstanding_total || 0) <= 0) {
    return 'Jadwal cicilan tidak bisa diubah karena billing sudah lunas.';
  }

  if (financeBillingHasPaymentHistory(data)) {
    return 'Jadwal cicilan tidak bisa diubah karena billing sudah memiliki riwayat pembayaran.';
  }

  return '';
}

function buildFinanceInstallmentPlanFromDetail_(detail) {
  const data = detail || {};
  const billing = data.billing || {};
  const rows = Array.isArray(data.installments) ? data.installments : [];

  const installments = rows.map(function(row) {
    const amountDue = Number(row.amount_due || 0);
    const paidAmount = Number(row.paid_amount || 0);
    const outstandingAmount = Number(row.outstanding_amount || 0);

    return Object.assign({}, row, {
      installment_no: Number(row.installment_no || 0),
      amount_due: amountDue,
      paid_amount: paidAmount,
      outstanding_amount: outstandingAmount > 0
        ? outstandingAmount
        : Math.max(0, amountDue - paidAmount)
    });
  });

  const grandTotal = Number(billing.grand_total || 0);
  const paidTotal = Number(billing.paid_total || 0);
  const outstandingTotal = Math.max(0, grandTotal - paidTotal);

  const nextInstallment = installments.find(function(row) {
    return String(row.status || '').trim().toLowerCase() !== 'paid';
  }) || null;

  return {
    billing: billing,
    installments: installments,
    summary: {
      grand_total: grandTotal,
      paid_total: paidTotal,
      outstanding_total: outstandingTotal,
      installment_count: installments.length,
      next_due_date: nextInstallment ? nextInstallment.due_date : '',
      next_due_amount: nextInstallment
        ? Math.max(
            0,
            Number(nextInstallment.amount_due || 0) -
              Number(nextInstallment.paid_amount || 0)
          )
        : 0
    }
  };
}

function financeBillingHasInvoiceArtifact_(billing) {
  const data = billing || {};

  return !!(
    String(data.invoice_pdf_file_id || '').trim() ||
    String(data.invoice_pdf_url || '').trim() ||
    String(data.invoice_pdf_signature || '').trim() ||
    String(data.invoice_sent_to || '').trim() ||
    String(data.invoice_sent_at || '').trim()
  );
}

function buildFinanceInvoiceDeliveryInfoFromDetail_(detail) {
  const data = detail || {};
  const billing = data.billing || {};
  const suggestedEmail = String(
    data.suggested_email ||
    billing.suggested_email ||
    ''
  ).trim();

  const hasPdf = !!String(billing.invoice_pdf_url || '').trim();
  const deliveryStatus = String(billing.invoice_delivery_status || '').trim().toLowerCase();

  let pdfStatus = 'not_generated';
  let pdfStatusLabel = 'PDF belum dibuat';
  let pdfStatusMessage = 'PDF invoice belum dibuat. Generate PDF sebelum mengirim email.';
  let pdfNeedsRegenerate = false;

  if (hasPdf) {
    if (deliveryStatus === 'stale') {
      pdfStatus = 'stale';
      pdfStatusLabel = 'PDF perlu diperbarui';
      pdfStatusMessage = 'Data billing berubah setelah PDF terakhir dibuat. Generate PDF terbaru sebelum mengirim email.';
      pdfNeedsRegenerate = true;
    } else {
      pdfStatus = 'unknown';
      pdfStatusLabel = 'Status PDF sedang dicek';
      pdfStatusMessage = 'PDF invoice tersedia. Sistem akan memeriksa kesesuaian data terbaru di background.';
      pdfNeedsRegenerate = true;
    }
  }

  return {
    billing_id: String(billing.billing_id || ''),
    billing_number: String(billing.billing_number || ''),
    patient_id: String(billing.patient_id || ''),
    patient_name: String(billing.patient_name || ''),
    suggested_email: suggestedEmail,

    invoice_pdf_file_id: String(billing.invoice_pdf_file_id || ''),
    invoice_pdf_url: String(billing.invoice_pdf_url || ''),
    invoice_sent_to: String(billing.invoice_sent_to || ''),
    invoice_sent_at: String(billing.invoice_sent_at || ''),
    invoice_delivery_status: String(billing.invoice_delivery_status || ''),

    invoice_pdf_signature: String(billing.invoice_pdf_signature || ''),
    invoice_pdf_signature_at: String(billing.invoice_pdf_signature_at || ''),

    invoice_pdf_status: pdfStatus,
    invoice_pdf_status_label: pdfStatusLabel,
    invoice_pdf_status_message: pdfStatusMessage,
    invoice_pdf_is_fresh: false,
    invoice_pdf_needs_regenerate: pdfNeedsRegenerate,
    invoice_pdf_current_signature: '',
    invoice_pdf_signature: String(billing.invoice_pdf_signature || '')
  };
}

function isFinanceInvoiceMarkedStaleFromMutationResult_(res) {

    (staleUpdate && staleUpdate.data && staleUpdate.data.invoice_delivery_status) ||
    (data.billing && data.billing.invoice_delivery_status) ||
    (data.installment_plan && data.installment_plan.billing && data.installment_plan.billing.invoice_delivery_status) ||
    '';

  return String(staleStatus || '').trim().toLowerCase() === 'stale';
}

  const previousInfo = currentFinanceInvoiceDeliveryInfo || {};

  const localInfo = Object.assign({}, previousInfo, {

    invoice_delivery_status: 'stale',
    invoice_pdf_status: 'stale',
    invoice_pdf_status_label: 'PDF perlu diperbarui',

      : 'Data billing baru saja berubah. Generate PDF terbaru sebelum mengirim ulang invoice.',
    invoice_pdf_is_fresh: false,
    invoice_pdf_needs_regenerate: true
  });

  currentFinanceInvoiceDeliveryInfo = localInfo;

  if (typeof renderFinanceInvoiceDeliverySection === 'function') {
    renderFinanceInvoiceDeliverySection(localInfo);
    return;
  }

  const wrap = document.getElementById('financeInvoiceDeliveryWrap');
  if (!wrap) return;

function submitFinanceDiscount(e) {
  e.preventDefault();

  const processKey = FINANCE_PROCESS_KEYS.DISCOUNT_SUBMIT;
  const processOptions = getFinanceDiscountProcessOptions();

  if (financeIsProcessBusy(processKey)) {
    return;
  }

  clearFinanceDiscountErrors();
  clearFinanceModalAlert('financeDiscountModal');

  const detail = currentFinanceBillingDetail || {};
  const billing = detail.billing || {};
  const outstanding = Math.max(0, Math.round(Number(billing.outstanding_total || 0)));

  const billingId = financeGetInputValue('finance_discount_billing_id');
  const amount = financeParseAmountInput(financeGetInputValue('finance_discount_amount'));

  const payload = attachAuthContext({
    billing_id: billingId,
    label: financeGetInputValue('finance_discount_label'),
    amount: amount,
    reason: financeGetInputValue('finance_discount_reason'),
    created_by: currentUser ? String(currentUser.user_id || currentUser.username || currentUser.role || '') : ''
  });

  const localErrors = {};

  if (!payload.billing_id) {
    localErrors.label = 'Billing ID tidak ditemukan';
  }

  if (!payload.label) {
    localErrors.label = 'Label diskon wajib diisi';
  }

  if (!payload.amount || payload.amount <= 0) {
    localErrors.amount = 'Nominal diskon harus lebih dari 0';
  }

  if (outstanding <= 0) {
    localErrors.amount = 'Billing ini sudah lunas';
  }

  if (payload.amount > outstanding) {
    localErrors.amount =
      'Nominal diskon tidak boleh melebihi sisa tagihan: ' +
      financeFormatRupiah(outstanding);
  }

  if (Object.keys(localErrors).length) {
    applyFinanceDiscountErrors(localErrors);
    setFinanceControlsDisabled(getFinanceDiscountControlIds(), false);

    const amountEl = financeGetEl('finance_discount_amount');
    if (localErrors.amount && amountEl) {
      amountEl.disabled = false;
      amountEl.focus();
      amountEl.select();
    }

    showFinanceModalAlert(
      'financeDiscountModal',
      'Periksa kembali input diskon yang masih belum sesuai.',
      'error'
    );

    showToast('Validasi gagal', 'error');
    return;
  }

  if (!financeStartProcess(processKey, processOptions)) {
    return;
  }

  google.script.run
    .withSuccessHandler(function(res) {

      if (!res || !res.success) {
        financeEndProcess(processKey, processOptions);

        applyFinanceDiscountErrors(res && res.errors ? res.errors : null);

        const message = financeGetServerErrorMessage(
          res,
          'Gagal menambahkan diskon'
        );

        showFinanceModalAlert('financeDiscountModal', message, 'error');
        showToast(message, 'error');
        return;
      }

      const invoiceMarkedStale = isFinanceInvoiceMarkedStaleFromMutationResult_(res);

      financeEndProcess(processKey, processOptions);
      closeFinanceDiscountModal();

      const localApplied = applyFinanceMutationResultLocally_(res, {
        billingId: billingId,
        refreshSummary: false
      });

      if (invoiceMarkedStale && localApplied) {
        renderFinanceInvoiceStaleAfterMutation_(billingId, 'diskon baru');
      }

      if (!localApplied) {
        refreshFinanceAfterMutation({
          billingId: billingId,
          refreshDetail: true,
          refreshSummary: true,
          refreshBillingList: true,
          refreshReceivables: true,
          showDetailLoading: false
        });
      }

      showToast(
        'Diskon berhasil ditambahkan' + (
          invoiceMarkedStale
            ? '. Invoice lama perlu diperbarui sebelum dikirim ulang.'
            : ''
        ),
        'success'
      );
    })
    .withFailureHandler(function(err) {

      financeEndProcess(processKey, processOptions);

      const message = financeGetFailureErrorMessage(
        err,
        'Gagal menambahkan diskon'
      );

      showFinanceModalAlert('financeDiscountModal', message, 'error');
      showToast(message, 'error');
    })
    .addBillingDiscount(payload);
}

function getCurrentFinanceInstallments() {
  const data = currentFinanceBillingDetail || {};
  const rows = Array.isArray(data.installments) ? data.installments : [];
  return rows;
}

function getFinanceInstallmentOutstanding(row) {
  const amountDue = Number((row && row.amount_due) || 0);
  const paidAmount = Number((row && row.paid_amount) || 0);
  const outstanding = Number((row && row.outstanding_amount) || 0);

  if (outstanding > 0) return outstanding;

  return Math.max(0, amountDue - paidAmount);
}

function getPayableFinanceInstallments() {
  return getCurrentFinanceInstallments().filter(function(row) {
    const status = String(row.status || '').trim().toLowerCase();
    return status !== 'paid' && getFinanceInstallmentOutstanding(row) > 0;
  });
}

function buildFinancePaymentInstallmentOptions() {
  const select = document.getElementById('finance_payment_installment_id');
  if (!select) return;

  const rows = getPayableFinanceInstallments();

  if (!rows.length) {
    select.innerHTML = '<option value="">Tidak ada cicilan aktif</option>';
    return;
  }

  select.innerHTML = rows.map(function(row) {
    const outstanding = getFinanceInstallmentOutstanding(row);
    const label =
      'Termin ' + Number(row.installment_no || 0) +
      ' • Due ' + financeFormatDateDmy(row.due_date || '') +
      ' • Sisa ' + financeFormatRupiah(outstanding);

    return `
      <option value="${escapeFinanceHtml(row.installment_id || '')}">
        ${escapeFinanceHtml(label)}
      </option>
    `;
  }).join('');
}

function findFinanceInstallmentById(installmentId) {
  const normalizedId = String(installmentId || '').trim();

  return getCurrentFinanceInstallments().find(function(row) {
    return String(row.installment_id || '').trim() === normalizedId;
  }) || null;
}

function getFinancePaymentInstallmentValidationState_() {
  const paymentScope = financeGetInputValue('finance_payment_scope');
  const installmentId = financeGetInputValue('finance_payment_installment_id');

  const isInstallmentPayment =
    String(paymentScope || '').trim().toLowerCase() === 'installment' ||
    !!String(installmentId || '').trim();

  if (!isInstallmentPayment) {
    return {
      is_installment_payment: false,
      installment_id: '',
      installment: null,
      outstanding_amount: 0
    };
  }

  const row = findFinanceInstallmentById(installmentId);
  const outstanding = row ? getFinanceInstallmentOutstanding(row) : 0;

  return {
    is_installment_payment: true,
    installment_id: String(installmentId || '').trim(),
    installment: row,
    outstanding_amount: financeRoundClientAmount_(outstanding)
  };
}

function financeRoundClientAmount_(value) {
  const num = Number(value || 0);

  if (isNaN(num)) return 0;

  return Math.round(num);
}

function handleFinancePaymentInstallmentChange() {
  const amountEl = document.getElementById('finance_payment_amount');
  const infoEl = document.getElementById('finance_payment_installment_info');

  const installmentId = financeGetInputValue('finance_payment_installment_id');
  const row = findFinanceInstallmentById(installmentId);

  if (!row) {
    if (infoEl) infoEl.textContent = '';
    return;
  }

  const outstanding = getFinanceInstallmentOutstanding(row);

  if (amountEl && outstanding > 0) {
    financeSetAmountInputValue('finance_payment_amount', outstanding);
  }

  if (infoEl) {
    infoEl.textContent =
      'Pembayaran akan diarahkan ke Termin ' +
      Number(row.installment_no || 0) +
      '. Jika nominal lebih besar dari sisa termin ini, sistem akan mengalokasikan berurutan ke termin berikutnya.';
  }

  clearFinancePaymentErrors();

function submitFinancePayment(e) {
  e.preventDefault();

  const processKey = FINANCE_PROCESS_KEYS.PAYMENT_SUBMIT;

  if (financeIsProcessBusy(processKey)) {
    return;
  }

  clearFinancePaymentErrors();
  clearFinanceModalAlert('financePaymentModal');

  const detail = currentFinanceBillingDetail || {};
  const billing = detail.billing || {};
  const billingOutstanding = Math.max(0, Math.round(Number(billing.outstanding_total || 0)));

  const billingId = financeGetInputValue('finance_payment_billing_id');
  const paymentScope = financeGetInputValue('finance_payment_scope');
  const installmentId = financeGetInputValue('finance_payment_installment_id');
  const amountText = financeGetInputValue('finance_payment_amount');
  const amountEl = document.getElementById('finance_payment_amount');

  const payload = attachAuthContext({
    billing_id: billingId,
    payment_scope: paymentScope || 'full',
    installment_id: installmentId,
    payment_date: financeGetInputValue('finance_payment_date'),
    payment_method: financeGetInputValue('finance_payment_method'),
    amount: financeParseAmountInput(amountText),
    reference_no: financeGetInputValue('finance_payment_reference_no'),
    notes: financeGetInputValue('finance_payment_notes'),
    received_by: currentUser ? String(currentUser.user_id || currentUser.username || currentUser.role || '') : ''
  });

  const localErrors = {};
  const installmentValidation = getFinancePaymentInstallmentValidationState_();

  if (!payload.payment_date) {
    localErrors.payment_date = 'Tanggal pembayaran wajib diisi';
  }

  if (!payload.payment_method) {
    localErrors.payment_method = 'Metode pembayaran wajib dipilih';
  }

  if (!payload.amount || payload.amount <= 0) {
    localErrors.amount = 'Nominal pembayaran harus lebih dari 0';
  }

  if (billingOutstanding <= 0) {
    localErrors.amount = 'Billing ini sudah lunas';
  }

  if (payload.amount > billingOutstanding) {
    localErrors.amount =
      'Nominal pembayaran tidak boleh melebihi sisa tagihan: ' +
      financeFormatRupiah(billingOutstanding);
  }

  if (installmentValidation.is_installment_payment) {
    if (!payload.installment_id) {
      localErrors.installment_id = 'Target cicilan wajib dipilih';
    } else if (!installmentValidation.installment) {
      localErrors.installment_id = 'Target cicilan tidak ditemukan. Tutup modal lalu buka ulang detail billing.';
    } else if (
      payload.amount > 0 &&
      payload.amount > installmentValidation.outstanding_amount
    ) {
      localErrors.amount =
        'Nominal pembayaran cicilan tidak boleh melebihi sisa termin yang dipilih: ' +
        financeFormatRupiah(installmentValidation.outstanding_amount);
    }
  }

  if (Object.keys(localErrors).length) {
    applyFinancePaymentErrors(localErrors);

    setFinanceControlsDisabled(getFinancePaymentControlIds(), false);

    const installmentEl = financeGetEl('finance_payment_installment_id');

    if (localErrors.installment_id && installmentEl) {
      installmentEl.disabled = false;
      installmentEl.focus();
    } else if (localErrors.amount && amountEl) {
      amountEl.disabled = false;
      amountEl.focus();
      amountEl.select();
    }

    showFinanceModalAlert(
      'financePaymentModal',
      localErrors.amount ||
        localErrors.installment_id ||
        'Validasi gagal. Periksa kembali field yang wajib diisi.',
      'error'
    );

    showToast('Validasi gagal', 'error');
    return;
  }

  const processOptions = {
    modalId: 'financePaymentModal',
    primaryButtonId: 'financePaymentSubmitBtn',
    loadingText: getFinancePaymentLoadingText(),
    idleText: getFinancePaymentIdleText(),
    disableIds: getFinancePaymentControlIds(),
    clearModalAlertId: 'financePaymentModal'
  };

  if (!financeStartProcess(processKey, processOptions)) {
    setFinanceControlsDisabled(getFinancePaymentControlIds(), false);
    return;
  }

  google.script.run
    .withSuccessHandler(function(res) {

      if (!res || !res.success) {
        financeEndProcess(processKey, processOptions);

        const message = financeGetServerErrorMessage(
          res,
          'Gagal mencatat pembayaran'
        );

        applyFinancePaymentErrors(res && res.errors ? res.errors : null);
        showFinanceModalAlert('financePaymentModal', message, 'error');
        showToast(message, 'error');
        return;
      }

      const invoiceMarkedStale = isFinanceInvoiceMarkedStaleFromMutationResult_(res);

      financeEndProcess(processKey, processOptions);
      financeHideModalById('financePaymentModal');
      clearFinancePaymentErrors();
      clearFinanceModalAlert('financePaymentModal');

      const localApplied = applyFinanceMutationResultLocally_(res, {
        billingId: billingId,
        refreshSummary: true
      });

      if (invoiceMarkedStale && localApplied) {
        renderFinanceInvoiceStaleAfterMutation_(billingId, 'pembayaran baru');
      }

      if (!localApplied) {
        refreshFinanceAfterMutation({
          billingId: billingId,
          refreshDetail: true,
          refreshSummary: true,
          refreshBillingList: true,
          refreshReceivables: true,
          showDetailLoading: false
        });
      }

      showToast(
        'Pembayaran berhasil dicatat' + (
          invoiceMarkedStale
            ? '. Invoice lama perlu diperbarui sebelum dikirim ulang.'
            : ''
        ),
        'success'
      );
    })
    .withFailureHandler(function(err) {
      financeEndProcess(processKey, processOptions);

      const message = financeGetFailureErrorMessage(
        err,
        'Gagal mencatat pembayaran'
      );

      showFinanceModalAlert('financePaymentModal', message, 'error');
      showToast('Error: ' + message, 'error');
    })
    .recordBillingPayment(payload);
}

function normalizeFinanceReceivableRow(row) {
  const outstanding = Number(
    row.outstanding_total ||
    row.outstanding ||
    row.remaining_balance ||
    0
  );

  const dueDate = String(row.due_date || '').slice(0, 10);
  const today = financeTodayYmd();

  let receivableStatus = String(row.receivable_status || '').trim().toLowerCase();

  if (!receivableStatus) {
    if (dueDate && dueDate < today) {
      receivableStatus = 'overdue';
    } else if (dueDate && dueDate === today) {
      receivableStatus = 'due_today';
    } else {
      receivableStatus = 'not_due';
    }
  }

  let agingDays = Number(row.aging_days || row.days_overdue || 0);

  if (!agingDays && dueDate && dueDate < today) {
    const due = new Date(dueDate + 'T00:00:00');
    const now = new Date(today + 'T00:00:00');
    agingDays = Math.floor((now.getTime() - due.getTime()) / (24 * 60 * 60 * 1000));
  }

  const normalized = Object.assign({}, row, {
    outstanding_total: outstanding,
    receivable_status: receivableStatus,
    aging_days: agingDays
  });

  normalized._search_text = buildFinanceSearchText(normalized, [
    'billing_id',
    'billing_number',
    'invoice_number',
    'treatment_id',
    'appointment_id',
    'patient_id',
    'patient_name',
    'payment_status',
    'billing_status',
    'receivable_status'
  ]);

  return normalized;
}

function buildFinanceReceivableSummary(rows) {
  const list = Array.isArray(rows) ? rows : [];

  let totalOutstanding = 0;
  let overdueTotal = 0;
  let dueTodayTotal = 0;
  let notDueTotal = 0;

  let overdueCount = 0;
  let dueTodayCount = 0;
  let notDueCount = 0;

  list.forEach(function(row) {
    const outstanding = Number(row.outstanding_total || 0);
    const status = String(row.receivable_status || '').trim().toLowerCase();

    totalOutstanding += outstanding;

    if (status === 'overdue') {
      overdueTotal += outstanding;
      overdueCount++;
    } else if (status === 'due_today') {
      dueTodayTotal += outstanding;
      dueTodayCount++;
    } else {
      notDueTotal += outstanding;
      notDueCount++;
    }
  });

  return {
    receivable_count: list.length,
    total_outstanding: totalOutstanding,
    overdue_count: overdueCount,
    overdue_total: overdueTotal,
    due_today_count: dueTodayCount,
    due_today_total: dueTodayTotal,
    not_due_count: notDueCount,
    not_due_total: notDueTotal
  };
}

      );

          6,

        );

function getFinanceReceivableFilterState() {
  const searchInput = financeGetEl('financeReceivableSearchInput');
  const statusFilter = financeGetEl('financeReceivableStatusFilter');

  return {
    keyword: String(searchInput ? searchInput.value : '').trim().toLowerCase(),
    status: String(statusFilter ? statusFilter.value : '').trim().toLowerCase()
  };
}

function doesFinanceReceivableMatchFilters(row, filters) {
  const data = row || {};
  const state = filters || {};

  const matchKeyword = !state.keyword ||
    String(data._search_text || '').includes(state.keyword);

  const matchStatus = !state.status ||
    String(data.receivable_status || '').trim().toLowerCase() === state.status;

  return matchKeyword && matchStatus;
}

function compareFinanceReceivableRows(a, b) {
  const statusRank = {
    overdue: 1,
    due_today: 2,
    not_due: 3
  };

  const aStatus = String((a && a.receivable_status) || '').trim().toLowerCase();
  const bStatus = String((b && b.receivable_status) || '').trim().toLowerCase();

  const rankCompare = (statusRank[aStatus] || 9) - (statusRank[bStatus] || 9);
  if (rankCompare !== 0) return rankCompare;

  const dueCompare = String((a && a.due_date) || '').localeCompare(
    String((b && b.due_date) || '')
  );

  if (dueCompare !== 0) return dueCompare;

  return Number((b && b.outstanding_total) || 0) - Number((a && a.outstanding_total) || 0);
}

function hasActiveFinanceReceivableFilters() {
  const filters = getFinanceReceivableFilterState();

  return !!filters.keyword || !!filters.status;
}

  if (status === 'fresh') {
    return '<span class="finance-pdf-freshness-badge fresh">PDF Fresh</span>';
  }

  if (status === 'stale') {
    return '<span class="finance-pdf-freshness-badge stale">PDF Perlu Diperbarui</span>';
  }

  if (status === 'unknown') {
    return '<span class="finance-pdf-freshness-badge unknown">Status PDF sedang dicek</span>';
  }

  return '<span class="finance-pdf-freshness-badge not-generated">PDF Belum Dibuat</span>';
}

function getFinanceInvoiceDeliveryRenderState(info) {
  const data = info || {};
  const hasPdf = !!String(data.invoice_pdf_url || '').trim();
  const hasSent = String(data.invoice_delivery_status || '').trim().toLowerCase() === 'sent';

  const rawPdfStatus = String(
    data.invoice_pdf_status || (hasPdf ? 'unknown' : 'not_generated')
  ).trim().toLowerCase();

  const allowedStatusClasses = ['fresh', 'stale', 'unknown', 'not_generated'];
  const pdfStatusClass = allowedStatusClasses.indexOf(rawPdfStatus) !== -1
    ? rawPdfStatus
    : 'unknown';

  const pdfNeedsRegenerate =
    !!data.invoice_pdf_needs_regenerate ||
    rawPdfStatus === 'stale' ||
    rawPdfStatus === 'unknown';

  const pdfStatusMessage = String(data.invoice_pdf_status_message || '').trim();

  const pdfButtonText = !hasPdf
    ? 'Generate PDF'
    : (pdfNeedsRegenerate ? 'Generate PDF Terbaru' : 'Generate Ulang PDF');

  const pdfOpenText = pdfNeedsRegenerate
    ? 'Buka PDF Lama'
    : 'Buka PDF Invoice';

  const emailButtonText = hasSent
    ? 'Kirim Ulang Email'
    : 'Kirim Email';

  const emailSafetyNote = pdfNeedsRegenerate
    ? 'Saat email dikirim, sistem akan generate PDF terbaru terlebih dahulu agar lampiran invoice tetap sesuai data billing terbaru.'
    : 'Email akan menggunakan PDF invoice yang masih sesuai dengan data billing terbaru.';

  return {
    data: data,
    hasPdf: hasPdf,
    hasSent: hasSent,
    rawPdfStatus: rawPdfStatus,
    pdfStatusClass: pdfStatusClass,
    pdfNeedsRegenerate: pdfNeedsRegenerate,
    pdfStatusMessage: pdfStatusMessage,
    pdfButtonText: pdfButtonText,
    pdfOpenText: pdfOpenText,
    emailButtonText: emailButtonText,
    emailSafetyNote: emailSafetyNote
  };
}

function generateFinanceInvoicePdf() {
  const processKey = FINANCE_PROCESS_KEYS.INVOICE_GENERATE;

  if (financeIsProcessBusy(processKey)) {
    showToast('Proses generate PDF sedang berjalan. Mohon tunggu sebentar.', 'info');
    return;
  }

  const data = currentFinanceBillingDetail || {};
  const billing = data.billing || {};
  const billingId = String(billing.billing_id || '').trim();

  if (!billingId) {
    showFinanceModalAlert(
      'financeBillingDetailModal',
      'Billing ID tidak ditemukan',
      'error'
    );
    showToast('Billing ID tidak ditemukan', 'error');
    return;
  }

  const processOptions = {
    buttonId: 'financeGenerateInvoicePdfBtn',
    loadingText: 'Generating...',
    disableIds: ['financeSendInvoiceEmailBtn'],
    clearModalAlertId: 'financeBillingDetailModal'
  };

  if (!financeStartProcess(processKey, processOptions)) {
    showToast('Proses generate PDF sedang berjalan. Mohon tunggu sebentar.', 'info');
    return;
  }

  google.script.run
    .withSuccessHandler(function(res) {
      financeEndProcess(processKey, processOptions);

      if (!res || !res.success) {
        const message = financeGetServerErrorMessage(
          res,
          'Gagal generate invoice PDF'
        );

        showFinanceModalAlert('financeBillingDetailModal', message, 'error');
        showToast(message, 'error');
        return;
      }

      applyFinanceInvoiceMutationResultLocally_(res, {
        billingId: billingId
      });

      showToast('Invoice PDF berhasil dibuat', 'success');
    })
    .withFailureHandler(function(err) {
      financeEndProcess(processKey, processOptions);

      const message = financeGetFailureErrorMessage(
        err,
        'Gagal generate invoice PDF'
      );

      showFinanceModalAlert('financeBillingDetailModal', message, 'error');
      showToast('Error generate PDF: ' + message, 'error');
    })
    .generateBillingInvoicePdf(attachAuthContext({
      billing_id: billingId
    }));
}

function getFinanceInvoiceEmailUiState(info) {
  const data = info || {};
  const pdfStatus = String(data.invoice_pdf_status || '').trim().toLowerCase();
  const needsRegenerate = data.invoice_pdf_needs_regenerate === true;
  const hasPdf = !!String(data.invoice_pdf_url || data.invoice_pdf_file_id || '').trim();

  if (pdfStatus === 'fresh' && !needsRegenerate && hasPdf) {
    return {
      mode: 'fresh',
      title: 'Kirim Invoice Email',
      buttonText: 'Kirim Email',
      loadingText: 'Mengirim Email...',
      subjectPrefix: 'Invoice Billing ',
      message: 'Berikut kami kirimkan invoice billing digital Anda.',
      note: 'PDF invoice sudah terbaru. Sistem akan mengirim email menggunakan PDF yang sudah tersedia tanpa generate ulang.'
    };
  }

  if (pdfStatus === 'stale' || needsRegenerate) {
    return {
      mode: 'stale',
      title: 'Generate & Kirim Invoice Email',
      buttonText: 'Generate & Kirim Email',
      loadingText: 'Generate PDF & Kirim...',
      subjectPrefix: 'Invoice Billing Terbaru ',
      message: 'Berikut kami kirimkan invoice billing digital terbaru Anda.',
      note: 'Data billing berubah setelah PDF terakhir dibuat. Saat email dikirim, sistem akan membuat PDF terbaru terlebih dahulu, lalu mengirimkannya ke pasien.'
    };
  }

  if (pdfStatus === 'not_generated' || !hasPdf) {
    return {
      mode: 'not-generated',
      title: 'Generate & Kirim Invoice Email',
      buttonText: 'Generate & Kirim Email',
      loadingText: 'Generate PDF & Kirim...',
      subjectPrefix: 'Invoice Billing ',
      message: 'Berikut kami kirimkan invoice billing digital Anda.',
      note: 'PDF invoice belum dibuat. Saat email dikirim, sistem akan membuat PDF invoice terlebih dahulu, lalu melampirkannya pada email.'
    };
  }

  return {
    mode: 'unknown',
    title: 'Siapkan & Kirim Invoice Email',
    buttonText: 'Siapkan & Kirim Email',
    loadingText: 'Menyiapkan PDF & Mengirim...',
    subjectPrefix: 'Invoice Billing ',
    message: 'Berikut kami kirimkan invoice billing digital Anda.',
    note: 'Status PDF invoice belum bisa dipastikan. Sistem akan menyiapkan PDF terbaru bila diperlukan sebelum email dikirim.'
  };
}

function getFinanceInvoiceEmailToFromInfo_(info) {
  const data = info || {};

  return String(
    data.invoice_sent_to ||
    data.suggested_email ||
    ''
  ).trim();
}

function shouldFetchFinanceInvoiceEmailInfoBeforeOpen_(info) {
  const data = info || {};

  if (getFinanceInvoiceEmailToFromInfo_(data)) {
    return false;
  }

  return data.email_lookup_done !== true;
}

function renderAndOpenFinanceInvoiceEmailModal_(billing, info) {
  ensureFinanceInvoiceEmailModal();

  const data = info || {};
  const emailUiState = getFinanceInvoiceEmailUiState(data);
  const billingNumber = billing.billing_number || billing.billing_id || '';
  const emailTo = getFinanceInvoiceEmailToFromInfo_(data);

  clearFinanceInvoiceEmailErrors();
  clearFinanceModalAlert('financeInvoiceEmailModal');

  financeSetInputValue('finance_invoice_email_billing_id', billing.billing_id || '');
  financeSetInputValue('finance_invoice_email_billing_number', billingNumber);
  financeSetInputValue('finance_invoice_email_to', emailTo);
  financeSetInputValue('finance_invoice_email_subject', emailUiState.subjectPrefix + billingNumber);
  financeSetInputValue('finance_invoice_email_message', emailUiState.message);

  const noteEl = financeSetText('finance_invoice_email_note', emailUiState.note);
  if (noteEl) {
    noteEl.className = 'finance-modal-note invoice-email-' + emailUiState.mode;
  }

  financeSetText('financeInvoiceEmailModalTitle', emailUiState.title);

  const submitBtn = financeGetEl('financeInvoiceEmailSubmitBtn');
  if (submitBtn) {
    submitBtn.dataset.idleText = emailUiState.buttonText;
    submitBtn.dataset.loadingText = emailUiState.loadingText;
  }

  setModalProcessingState('financeInvoiceEmailModal', false, {
    primaryButtonId: 'financeInvoiceEmailSubmitBtn',
    idleText: emailUiState.buttonText
  });

  financeShowModalById('financeInvoiceEmailModal');

  if (!emailTo) {
    showFinanceModalAlert(
      'financeInvoiceEmailModal',
      'Email pasien belum tersedia. Isi email tujuan secara manual sebelum mengirim invoice.',
      'info'
    );
  }
}

function openFinanceInvoiceEmailModal() {
  ensureFinanceInvoiceEmailModal();

  if (financeIsProcessBusy(FINANCE_PROCESS_KEYS.INVOICE_GENERATE)) {
    showToast('PDF invoice sedang dibuat. Mohon tunggu sampai proses selesai.', 'info');
    return;
  }

  if (financeIsProcessBusy(FINANCE_PROCESS_KEYS.INVOICE_EMAIL_SEND)) {
    showToast('Proses kirim email sedang berjalan. Mohon tunggu sebentar.', 'info');
    return;
  }

  const detail = currentFinanceBillingDetail || {};
  const billing = detail.billing || {};
  const info = currentFinanceInvoiceDeliveryInfo || {};

  if (!billing.billing_id) {
    showFinanceModalAlert(
      'financeBillingDetailModal',
      'Data billing belum siap',
      'error'
    );
    showToast('Data billing belum siap', 'error');
    return;
  }

  if (!shouldFetchFinanceInvoiceEmailInfoBeforeOpen_(info)) {
    renderAndOpenFinanceInvoiceEmailModal_(billing, info);
    return;
  }

  setFinanceButtonProcessingState('financeSendInvoiceEmailBtn', true, {
    loadingText: 'Memuat email...'
  });

  google.script.run
    .withSuccessHandler(function(res) {
      setFinanceButtonProcessingState('financeSendInvoiceEmailBtn', false, {});

      if (!res || !res.success) {
        const fallbackInfo = Object.assign({}, info, {
          email_lookup_done: true
        });

        currentFinanceInvoiceDeliveryInfo = fallbackInfo;

        showFinanceModalAlert(
          'financeBillingDetailModal',
          (res && res.message) ||
            'Email pasien belum dapat dimuat otomatis. Silakan isi manual.',
          'info'
        );

        renderAndOpenFinanceInvoiceEmailModal_(billing, fallbackInfo);
        return;
      }

      currentFinanceInvoiceDeliveryInfo = Object.assign({}, res.data || {}, {
        email_lookup_done: true
      });

      renderFinanceInvoiceDeliverySection(currentFinanceInvoiceDeliveryInfo);
      renderAndOpenFinanceInvoiceEmailModal_(billing, currentFinanceInvoiceDeliveryInfo);
    })
    .withFailureHandler(function(err) {
      setFinanceButtonProcessingState('financeSendInvoiceEmailBtn', false, {});

      const fallbackInfo = Object.assign({}, info, {
        email_lookup_done: true
      });

      currentFinanceInvoiceDeliveryInfo = fallbackInfo;

      showFinanceModalAlert(
        'financeBillingDetailModal',
        'Email pasien belum dapat dimuat otomatis: ' +
          escapeFinanceHtml(err && err.message ? err.message : err) +
          '. Silakan isi manual.',
        'info'
      );

      renderAndOpenFinanceInvoiceEmailModal_(billing, fallbackInfo);
    })
    .getBillingInvoiceDeliveryInfo(attachAuthContext({
      billing_id: billing.billing_id
    }));
}
