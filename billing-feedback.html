  <script>
    (function markFeedbackDevice() {
      function getViewportWidth() {
        var widths = [];

        if (window.visualViewport && window.visualViewport.width) {
          widths.push(window.visualViewport.width);
        }

        if (window.innerWidth) {
          widths.push(window.innerWidth);
        }

        if (document.documentElement && document.documentElement.clientWidth) {
          widths.push(document.documentElement.clientWidth);
        }

        widths = widths
          .map(function(value) {
            return Number(value || 0);
          })
          .filter(function(value) {
            return value > 0;
          });

        return widths.length ? Math.min.apply(Math, widths) : 1024;
      }

      function applyFeedbackDeviceClass() {
        var ua = String(navigator.userAgent || '').toLowerCase();
        var width = getViewportWidth();

        var isMobileUa = /android|iphone|ipod|mobile|blackberry|iemobile|opera mini/i.test(ua);

        var isCoarsePointer = false;
        try {
          isCoarsePointer = window.matchMedia && window.matchMedia('(pointer: coarse)').matches;
        } catch (err) {
          isCoarsePointer = false;
        }

        var root = document.documentElement;

        root.classList.remove('fb-device-phone', 'fb-device-desktop');

        if (width <= 820 || (isMobileUa && width <= 960) || (isCoarsePointer && width <= 900)) {
          root.classList.add('fb-device-phone');
        } else {
          root.classList.add('fb-device-desktop');
        }

        root.setAttribute('data-feedback-width', Math.round(width || 0));
      }

      applyFeedbackDeviceClass();

      window.addEventListener('resize', applyFeedbackDeviceClass);
      window.addEventListener('orientationchange', function() {
        setTimeout(applyFeedbackDeviceClass, 250);
      });

      if (window.visualViewport) {
        window.visualViewport.addEventListener('resize', applyFeedbackDeviceClass);
      }
    })();
  </script>

<body class="feedback-public-page">
  <div class="feedback-scale">
    <div class="feedback-page">
      <div class="feedback-card">
        <div class="feedback-header">
          <div class="feedback-eyebrow">Hajar Aswad Dental Clinic</div>
          <h1 class="feedback-title">Feedback Kepuasan Layanan</h1>
          <p class="feedback-subtitle">
            Terima kasih telah mempercayakan layanan klinik kepada kami. Mohon luangkan waktu sebentar untuk memberikan penilaian.
          </p>
        </div>

        <div class="feedback-body">
          <div id="feedbackContent">
            <div class="state-box">Memuat formulir feedback...</div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const FEEDBACK_TOKEN = '<?= feedbackToken ?>';
    let selectedRating = 0;

    function escapeHtml(value) {
      return String(value || '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    function formatRupiah(value) {
      const num = Number(value || 0);
      return 'Rp ' + num.toLocaleString('id-ID');
    }

    function formatDateDmy(value) {
      const s = String(value || '').trim();

      if (!s) return '-';

      if (/^\d{4}-\d{2}-\d{2}/.test(s)) {
        const parts = s.slice(0, 10).split('-');
        return parts[2] + '-' + parts[1] + '-' + parts[0];
      }

      return s;
    }

    function renderError(message) {
      const content = document.getElementById('feedbackContent');
      if (!content) return;

      content.innerHTML =
        '<div class="state-box error">' +
          escapeHtml(message || 'Terjadi kesalahan') +
        '</div>';
    }

    function renderSuccess(message) {
      const content = document.getElementById('feedbackContent');
      if (!content) return;

      content.innerHTML =
        '<div class="state-box success">' +
          escapeHtml(message || 'Terima kasih, feedback Anda berhasil dikirim.') +
        '</div>';
    }

    function showFormAlert(message, type) {
      const alertEl = document.getElementById('feedbackFormAlert');
      if (!alertEl) return;

      alertEl.className = 'feedback-alert show ' + (type || 'error');
      alertEl.textContent = message || 'Terjadi kesalahan.';
    }

    function clearFormAlert() {
      const alertEl = document.getElementById('feedbackFormAlert');
      if (!alertEl) return;

      alertEl.className = 'feedback-alert';
      alertEl.textContent = '';
    }

    function getOptionHtml() {
      return `
        <option value="">Pilih penilaian</option>
        <option value="very_satisfied">Sangat Puas</option>
        <option value="satisfied">Puas</option>
        <option value="neutral">Cukup</option>
        <option value="not_satisfied">Kurang Puas</option>
      `;
    }

    function renderFeedbackForm(data) {
      const content = document.getElementById('feedbackContent');
      if (!content) return;

      const billing = data.billing || {};
      const alreadySubmitted = !!data.already_submitted;

      selectedRating = 0;

      if (alreadySubmitted) {
        renderSuccess('Feedback untuk invoice ini sudah pernah dikirim. Terima kasih.');
        return;
      }

      content.innerHTML = `
        <div id="feedbackFormAlert" class="feedback-alert"></div>

        <div class="feedback-invoice-box">
          <div class="feedback-invoice-top">
            <div>
              <div class="feedback-invoice-label">Invoice</div>
              <div class="feedback-invoice-number">
                ${escapeHtml(billing.billing_number || billing.billing_id || '-')}
              </div>
            </div>

            <div class="feedback-invoice-total">
              <div class="feedback-invoice-label">Total</div>
              <div class="feedback-invoice-total-value">
                ${formatRupiah(billing.grand_total || 0)}
              </div>
            </div>
          </div>

          <div class="feedback-invoice-grid">
            <div class="feedback-invoice-item">
              <div class="feedback-invoice-label">Pasien</div>
              <div class="feedback-invoice-value">
                ${escapeHtml(billing.patient_name || '-')}
              </div>
            </div>

            <div class="feedback-invoice-item">
              <div class="feedback-invoice-label">Tanggal Billing</div>
              <div class="feedback-invoice-value">
                ${formatDateDmy(billing.billing_date || '')}
              </div>
            </div>
          </div>
        </div>

        <form onsubmit="submitFeedback(event)" novalidate>
          <div class="feedback-section">
            <div class="feedback-section-title">Rating keseluruhan</div>

            <div class="rating-row" role="radiogroup" aria-label="Rating keseluruhan">
              ${[1, 2, 3, 4, 5].map(function(num) {
                return `
                  <button
                    type="button"
                    class="rating-btn"
                    id="ratingBtn${num}"
                    onclick="setRating(${num})"
                    aria-pressed="false"
                    aria-label="Rating ${num}"
                  >
                    ${num}
                  </button>
                `;
              }).join('')}
            </div>

            <div class="rating-help">Pilih angka 1 sampai 5. Semakin besar angkanya, semakin puas penilaian Anda.</div>
            <div id="error_rating" class="field-error"></div>
          </div>

          <div class="feedback-section">
            <div class="feedback-section-title">Penilaian layanan</div>

            <div class="feedback-field-grid">
              <div class="feedback-field">
                <label for="service_quality">Kualitas layanan</label>
                <select id="service_quality" onchange="clearFieldError('service_quality')">${getOptionHtml()}</select>
                <div id="error_service_quality" class="field-error"></div>
              </div>

              <div class="feedback-field">
                <label for="staff_friendliness">Keramahan staf</label>
                <select id="staff_friendliness" onchange="clearFieldError('staff_friendliness')">${getOptionHtml()}</select>
                <div id="error_staff_friendliness" class="field-error"></div>
              </div>

              <div class="feedback-field">
                <label for="clinic_cleanliness">Kebersihan klinik</label>
                <select id="clinic_cleanliness" onchange="clearFieldError('clinic_cleanliness')">${getOptionHtml()}</select>
                <div id="error_clinic_cleanliness" class="field-error"></div>
              </div>

              <div class="feedback-field">
                <label for="waiting_time">Waktu tunggu</label>
                <select id="waiting_time" onchange="clearFieldError('waiting_time')">${getOptionHtml()}</select>
                <div id="error_waiting_time" class="field-error"></div>
              </div>
            </div>
          </div>

          <div class="feedback-section">
            <label for="comment" class="feedback-comment-label">Komentar / saran</label>
            <textarea
              id="comment"
              class="feedback-comment-textarea"
              maxlength="1000"
              oninput="clearFieldError('comment')"
              placeholder="Tulis pengalaman, kritik, atau saran Anda..."
            ></textarea>
            <div id="error_comment" class="field-error"></div>
          </div>

          <div class="feedback-actions">
            <button type="submit" class="submit-btn" id="feedbackSubmitBtn">
              Kirim Feedback
            </button>
          </div>
        </form>
      `;
    }

    function setRating(value) {
      selectedRating = Number(value || 0);
      clearFormAlert();

      [1, 2, 3, 4, 5].forEach(function(num) {
        const btn = document.getElementById('ratingBtn' + num);
        if (!btn) return;

        const active = num === selectedRating;
        btn.classList.toggle('active', active);
        btn.setAttribute('aria-pressed', active ? 'true' : 'false');
      });

      clearFieldError('rating');
    }

    function clearFieldError(key) {
      const el = document.getElementById('error_' + key);
      if (el) el.textContent = '';
      clearFormAlert();
    }

    function clearErrors() {
      [
        'rating',
        'service_quality',
        'staff_friendliness',
        'clinic_cleanliness',
        'waiting_time',
        'comment'
      ].forEach(function(key) {
        const el = document.getElementById('error_' + key);
        if (el) el.textContent = '';
      });

      clearFormAlert();
    }

    function applyErrors(errors) {
      if (!errors) return;

      Object.keys(errors).forEach(function(key) {
        const el = document.getElementById('error_' + key);
        if (el) el.textContent = errors[key];
      });
    }

    function setSubmitButtonLoading(isLoading) {
      const btn = document.getElementById('feedbackSubmitBtn');
      if (!btn) return;

      btn.disabled = !!isLoading;
      btn.textContent = isLoading ? 'Mengirim...' : 'Kirim Feedback';
    }

    function submitFeedback(e) {
      e.preventDefault();

      clearErrors();

      const serviceQualityEl = document.getElementById('service_quality');
      const staffFriendlinessEl = document.getElementById('staff_friendliness');
      const clinicCleanlinessEl = document.getElementById('clinic_cleanliness');
      const waitingTimeEl = document.getElementById('waiting_time');
      const commentEl = document.getElementById('comment');

      const payload = {
        feedback_token: FEEDBACK_TOKEN,
        rating: selectedRating,
        service_quality: serviceQualityEl ? serviceQualityEl.value : '',
        staff_friendliness: staffFriendlinessEl ? staffFriendlinessEl.value : '',
        clinic_cleanliness: clinicCleanlinessEl ? clinicCleanlinessEl.value : '',
        waiting_time: waitingTimeEl ? waitingTimeEl.value : '',
        comment: commentEl ? commentEl.value.trim() : ''
      };

      const localErrors = {};

      if (!payload.rating) localErrors.rating = 'Rating wajib dipilih';
      if (!payload.service_quality) localErrors.service_quality = 'Kualitas layanan wajib dipilih';
      if (!payload.staff_friendliness) localErrors.staff_friendliness = 'Keramahan staf wajib dipilih';
      if (!payload.clinic_cleanliness) localErrors.clinic_cleanliness = 'Kebersihan klinik wajib dipilih';
      if (!payload.waiting_time) localErrors.waiting_time = 'Waktu tunggu wajib dipilih';

      if (Object.keys(localErrors).length) {
        applyErrors(localErrors);
        showFormAlert('Mohon lengkapi penilaian yang masih kosong.', 'error');
        return;
      }

      setSubmitButtonLoading(true);

      google.script.run
        .withSuccessHandler(function(res) {
          setSubmitButtonLoading(false);

          if (!res || !res.success) {
            applyErrors(res && res.errors ? res.errors : null);
            showFormAlert((res && res.message) || 'Gagal mengirim feedback', 'error');
            return;
          }

          renderSuccess(res.message || 'Terima kasih, feedback Anda berhasil dikirim.');
        })
        .withFailureHandler(function(err) {
          setSubmitButtonLoading(false);
          showFormAlert('Error: ' + (err && err.message ? err.message : err), 'error');
        })
        .submitBillingFeedback(payload);
    }

    function loadFeedbackPage() {
      if (!FEEDBACK_TOKEN) {
        renderError('Token feedback tidak ditemukan.');
        return;
      }

      google.script.run
        .withSuccessHandler(function(res) {
          if (!res || !res.success) {
            renderError((res && res.message) || 'Gagal memuat feedback');
            return;
          }

          renderFeedbackForm(res.data || {});
        })
        .withFailureHandler(function(err) {
          renderError('Error: ' + (err && err.message ? err.message : err));
        })
        .getBillingFeedbackPageData(FEEDBACK_TOKEN);
    }

    loadFeedbackPage();
  </script>
</body>
</html>
