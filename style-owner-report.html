<style>
  /* =========================================================
     OWNER REPORT — SHELL & HEADER
     ========================================================= */
  .owner-shell {
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  .owner-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    gap: 16px;
    flex-wrap: wrap;
  }

  .owner-eyebrow {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: .08em;
    text-transform: uppercase;
    color: #6b7280;
    margin-bottom: 4px;
  }

  .owner-title {
    margin: 0 0 3px 0;
    font-size: 18px;
    font-weight: 700;
    line-height: 1.1;
    letter-spacing: -0.02em;
    color: #f1f5f9;
  }

  .owner-subtitle {
    color: #64748b;
    font-size: 13px;
  }


  /* =========================================================
     KPI CARDS
     ========================================================= */
  .owner-kpi-grid {
    display: grid;
    grid-template-columns: repeat(3, minmax(0, 1fr));
    gap: 12px;
  }

  .owner-kpi-card {
    background: #1e2235;
    border-radius: 18px;
    padding: 16px 16px 14px 20px;
    box-shadow: 0 4px 20px rgba(0, 0, 0, 0.25);
    border: 1px solid rgba(255, 255, 255, 0.07);
    position: relative;
    overflow: hidden;
  }

  .owner-kpi-card::before {
    content: '';
    position: absolute;
    inset: 0 auto 0 0;
    width: 4px;
    background: #475569;
  }

  .owner-kpi-label {
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: .07em;
    color: #6b7280;
    margin-bottom: 8px;
  }

  .owner-kpi-value {
    font-size: 22px;
    font-weight: 700;
    color: #f1f5f9;
    line-height: 1.1;
    word-break: break-word;
    margin-bottom: 5px;
  }

  .owner-kpi-sub {
    font-size: 12px;
    color: #64748b;
    line-height: 1.4;
  }

  .owner-kpi-diff {
    margin-top: 4px;
    font-size: 12px;
    font-weight: 700;
  }

  .owner-kpi-diff.up   { color: #86efac; }
  .owner-kpi-diff.down { color: #fca5a5; }
  .owner-kpi-diff.flat { color: #6b7280; }

  .owner-kpi-green {
    background: rgba(34, 197, 94, 0.06);
    border-color: rgba(34, 197, 94, 0.18);
  }
  .owner-kpi-green::before { background: #22c55e; }
  .owner-kpi-green .owner-kpi-value { color: #86efac; }

  .owner-kpi-red {
    background: rgba(249, 115, 22, 0.07);
    border-color: rgba(249, 115, 22, 0.20);
  }
  .owner-kpi-red::before { background: #f97316; }
  .owner-kpi-red .owner-kpi-value { color: #fdba74; }

  .owner-kpi-blue {
    background: rgba(79, 110, 247, 0.08);
    border-color: rgba(79, 110, 247, 0.20);
  }
  .owner-kpi-blue::before { background: #4f6ef7; }
  .owner-kpi-blue .owner-kpi-value { color: #93c5fd; }

  .owner-kpi-teal {
    background: rgba(79, 110, 247, 0.08);
    border-color: rgba(79, 110, 247, 0.20);
  }
  .owner-kpi-teal::before { background: #4f6ef7; }
  .owner-kpi-teal .owner-kpi-value { color: #93c5fd; }

  /* =========================================================
     SECTIONS
     ========================================================= */
  .owner-section-title {
    font-size: 16px;
    font-weight: 800;
    color: #f1f5f9;
    margin: 0 0 4px 0;
  }

  .owner-section-subtitle {
    font-size: 13px;
    color: #6b7280;
    margin-bottom: 14px;
  }

  .owner-section-head {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 12px;
    margin-bottom: 14px;
    flex-wrap: wrap;
  }

  /* =========================================================
     EXPENSE KATEGORI CHIPS
     ========================================================= */
  .owner-cat-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap: 10px;
    margin-bottom: 16px;
  }

  .owner-cat-chip {
    background: #0d1117;
    border: 1px solid rgba(255, 255, 255, 0.07);
    border-radius: 12px;
    padding: 12px 14px;
  }

  .owner-cat-chip-label {
    font-size: 11px;
    font-weight: 700;
    color: #6b7280;
    text-transform: uppercase;
    letter-spacing: .05em;
    margin-bottom: 4px;
  }

  .owner-cat-chip-value {
    font-size: 16px;
    font-weight: 800;
    color: #f1f5f9;
  }

  /* =========================================================
     TREND TABLE (monthly/yearly breakdown)
     ========================================================= */
  .owner-trend-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
  }

  .owner-trend-table th {
    text-align: left;
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: .06em;
    color: #6b7280;
    padding: 8px 12px;
    border-bottom: 2px solid rgba(255,255,255,0.10);
  }

  .owner-trend-table td {
    padding: 10px 12px;
    border-bottom: 1px solid rgba(255,255,255,0.06);
    color: #e2e8f0;
  }

  .owner-trend-table tr:last-child td { border-bottom: none; }

  .owner-net-pos { color: #86efac; font-weight: 700; }
  .owner-net-neg { color: #fca5a5; font-weight: 700; }

  /* =========================================================
     DOCTOR EXPAND / PATIENT ROWS
     ========================================================= */
  .owner-doc-row {
    background: #0d1117;
    cursor: pointer;
    user-select: none;
  }

  .owner-doc-row:hover { background: #1e2235; }

  .owner-doc-arrow {
    display: inline-block;
    margin-right: 6px;
    font-size: 16px;
    font-weight: 700;
    color: #4f6ef7;
    transition: transform 0.2s ease;
    line-height: 1;
  }

  .owner-patient-row td { background: #161b2e; }

  .owner-patient-name {
    padding-left: 28px !important;
    color: #94a3b8;
    font-size: 13px;
  }

  .owner-patient-services {
    color: #6b7280;
    font-size: 13px;
  }

  .owner-tag-gratis {
    color: #86efac;
    font-weight: 700;
    font-size: 13px;
  }

  .owner-tag-diskon {
    color: #fbbf24;
    font-weight: 700;
    font-size: 13px;
  }

  .owner-price-strike {
    text-decoration: line-through;
    color: #94a3b8;
    font-size: 12px;
    margin-left: 4px;
  }

  .owner-discount-note {
    font-size: 11px;
    color: #6b7280;
    margin-top: 2px;
  }

  /* =========================================================
     EXPENSE MODAL
     ========================================================= */
  .owner-modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(5, 8, 20, 0.70);
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
    z-index: 1100;
    align-items: center;
    justify-content: center;
  }

  .owner-modal-overlay.open {
    display: flex;
  }

  .owner-modal-box {
    background: #161b2e;
    border-radius: 20px;
    width: 100%;
    max-width: 480px;
    max-height: 90vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    box-shadow: 0 24px 60px rgba(15,23,42,0.18);
    margin: 16px;
  }

  .owner-modal-title {
    font-size: 17px;
    font-weight: 800;
    color: #f1f5f9;
    margin: 0 0 16px 0;
  }

  .owner-form-group {
    margin-bottom: 14px;
  }

  .owner-form-label {
    display: block;
    font-size: 12px;
    font-weight: 700;
    color: #94a3b8;
    margin-bottom: 6px;
    text-transform: uppercase;
    letter-spacing: .04em;
  }

  .owner-form-input,
  .owner-form-select,
  .owner-form-textarea {
    width: 100%;
    padding: 10px 12px;
    border-radius: 10px;
    border: 1.5px solid rgba(255,255,255,0.10);
    font-size: 14px;
    color: #f1f5f9;
    outline: none;
    background: #161b2e;
    box-sizing: border-box;
    font-family: inherit;
  }

  .owner-form-input:focus,
  .owner-form-select:focus,
  .owner-form-textarea:focus {
    border-color: #4f6ef7;
  }

  .owner-form-textarea { resize: vertical; min-height: 60px; }

  .owner-modal-actions {
    display: flex;
    gap: 10px;
    justify-content: flex-end;
    margin-top: 20px;
  }

  .owner-modal-alert {
    padding: 10px 14px;
    border-radius: 10px;
    font-size: 13px;
    font-weight: 600;
    margin-bottom: 14px;
    display: none;
  }

  .owner-modal-alert.error   { background: rgba(239, 68, 68, 0.10); color: #fca5a5; display: block; }
  .owner-modal-alert.success { background: rgba(34, 197, 94, 0.10); color: #86efac; display: block; }

  .owner-field-error {
    font-size: 12px;
    color: #fca5a5;
    font-weight: 600;
    margin-top: 4px;
    display: none;
  }

  .owner-form-input.error,
  .owner-form-select.error,
  .owner-form-textarea.error {
    border-color: #fca5a5;
  }

  /* =========================================================
     LOADING & EMPTY STATE
     ========================================================= */
  .owner-loading {
    text-align: center;
    padding: 40px 20px;
    color: #6b7280;
    font-size: 14px;
  }

  .owner-empty {
    text-align: center;
    padding: 24px;
    color: #94a3b8;
    font-size: 13px;
  }

  .owner-muted {
    color: #6b7280;
  }

  /* =========================================================
     RESPONSIVE
     ========================================================= */
  @media (max-width: 640px) {
    .owner-kpi-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    .owner-kpi-value { font-size: 20px; }
    .owner-title { font-size: 24px; }
  }

  @media (max-width: 400px) {
    .owner-kpi-grid { grid-template-columns: 1fr; }
  }

  /* =========================================================
     PDF PRINT BUTTON
     ========================================================= */
  .owner-pdf-btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 38px;
    height: 38px;
    flex-shrink: 0;
    border-radius: 14px;
    border: 1px solid rgba(255, 255, 255, 0.08);
    background: #161b2e;
    color: #94a3b8;
    text-decoration: none;
    transition: background 0.18s ease, color 0.18s ease, border-color 0.18s ease;
  }

  .owner-pdf-btn:hover {
    background: rgba(79, 110, 247, 0.12);
    color: #4f6ef7;
    border-color: rgba(79, 110, 247, 0.25);
    text-decoration: none;
  }

  .owner-pdf-btn svg {
    width: 18px;
    height: 18px;
    stroke: currentColor;
    fill: none;
  }

</style>
