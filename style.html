<style>
  /* ===== Base ===== */
  * {
    box-sizing: border-box;
    font-family: 'Inter', system-ui, -apple-system, sans-serif;
  }

  html,
  body {
    margin: 0;
    padding: 0;
    background: #0d1117;
    color: #e2e8f0;
  }

  body {
    min-height: 100vh;
  }

  body.sidebar-open,
  body.appointments-page-fullscreen {
    overflow: hidden;
  }

  h1 {
    margin: 0 0 8px;
    font-size: 24px;
    line-height: 1.2;
  }

  p {
    margin: 0 0 16px;
    color: #94a3b8;
    line-height: 1.5;
  }

  label {
    display: block;
    margin-bottom: 6px;
    font-size: 14px;
    color: #94a3b8;
    font-weight: 600;
  }

  input,
  select,
  textarea {
    width: 100%;
    padding: 10px 12px;
    border-radius: 12px;
    border: 1px solid rgba(255, 255, 255, 0.10);
    margin-bottom: 12px;
    font-size: 14px;
    background: #1e2235;
    color: #f1f5f9;
  }

  input:focus,
  select:focus,
  textarea:focus {
    outline: none;
    border-color: #4f6ef7;
    box-shadow: 0 0 0 4px rgba(79, 110, 247, 0.15);
  }

  textarea {
    min-height: 90px;
    resize: vertical;
  }

  button {
    cursor: pointer;
    font: inherit;
  }

  .message {
    margin-top: 8px;
    font-size: 14px;
    color: #b91c1c;
    white-space: pre-line;
  }

  /* ===== Login ===== */
  .login-wrap {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    background:
      radial-gradient(circle at top left, rgba(79, 110, 247, 0.12), transparent 40%),
      radial-gradient(circle at bottom right, rgba(124, 58, 237, 0.10), transparent 40%),
      #0d1117;
  }

  .login-card {
    width: 100%;
    max-width: 380px;
    background: #161b2e;
    padding: 28px;
    border-radius: 22px;
    box-shadow: 0 24px 60px rgba(0, 0, 0, 0.40);
    border: 1px solid rgba(255, 255, 255, 0.08);
  }

  .login-logo {
    width: 90px;
    margin-bottom: 12px;
  }

  /* ===== App shell ===== */
  .app-shell {
    display: flex;
    min-height: 100vh;
    width: 100%;
    position: relative;
    align-items: flex-start;
    background: #0d1117;
  }

  .sidebar {
    width: 248px;
    flex-shrink: 0;
    background: linear-gradient(180deg, #1a2035 0%, #1e2a4a 100%);
    color: #fff;
    padding: 20px 16px;
    transition: transform 0.25s ease;
    z-index: 1002;
    position: sticky;
    top: 0;
    height: 100vh;
    overflow-y: auto;
    border-right: 1px solid rgba(255, 255, 255, 0.05);
    box-shadow: 8px 0 32px rgba(15, 23, 42, 0.12);
    display: flex;
    flex-direction: column;
  }

  .sidebar-brand {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 28px;
    padding: 4px 2px;
  }

  .sidebar-brand-icon {
    width: 40px;
    height: 40px;
    border-radius: 12px;
    background: linear-gradient(135deg, #4f6ef7, #7c3aed);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    box-shadow: 0 4px 12px rgba(79, 110, 247, 0.35);
  }

  .sidebar-brand-name {
    font-size: 16px;
    font-weight: 800;
    letter-spacing: -0.02em;
    color: #fff;
    line-height: 1.2;
  }

  .sidebar-brand-sub {
    font-size: 11px;
    color: #64748b;
    margin-top: 2px;
    font-weight: 500;
    letter-spacing: 0.01em;
  }

  .sidebar-nav {
    flex: 1;
  }

  .sidebar button {
    display: flex;
    align-items: center;
    gap: 10px;
    width: 100%;
    background: transparent;
    color: #94a3b8;
    text-align: left;
    padding: 11px 14px;
    border-radius: 12px;
    margin-bottom: 4px;
    border: none;
    cursor: pointer;
    font-weight: 600;
    font-size: 14px;
    box-shadow: none;
    transition: all 0.2s ease;
  }

  .sidebar button:hover {
    background: rgba(255, 255, 255, 0.07);
    color: #fff;
    transform: none;
  }

  .sidebar-menu {
    position: relative;
    display: flex;
    align-items: center;
    gap: 10px;
    width: 100%;
    background: transparent;
    color: #94a3b8;
    text-align: left;
    padding: 11px 14px;
    border-radius: 12px;
    margin-bottom: 4px;
    border: none;
    cursor: pointer;
    font-weight: 600;
    font-size: 14px;
    transition: all 0.2s ease;
  }

  .sidebar-menu svg {
    flex-shrink: 0;
    opacity: 0.65;
    transition: opacity 0.2s ease;
  }

  .sidebar-menu:hover {
    background: rgba(255, 255, 255, 0.07);
    color: #e2e8f0;
  }

  .sidebar-menu:hover svg {
    opacity: 0.9;
  }

  .sidebar-menu.active {
    background: rgba(79, 110, 247, 0.18);
    color: #fff;
  }

  .sidebar-menu.active svg {
    opacity: 1;
  }

  .sidebar-menu.active::before {
    content: "";
    position: absolute;
    left: 0;
    top: 8px;
    bottom: 8px;
    width: 3px;
    border-radius: 4px;
    background: #4f6ef7;
  }

  .sidebar-footer {
    padding-top: 12px;
    border-top: 1px solid rgba(255, 255, 255, 0.06);
    margin-top: 8px;
  }

  .sidebar-logout {
    display: flex;
    align-items: center;
    gap: 10px;
    width: 100%;
    background: transparent;
    color: #64748b;
    text-align: left;
    padding: 11px 14px;
    border-radius: 12px;
    border: none;
    cursor: pointer;
    font-weight: 600;
    font-size: 14px;
    transition: all 0.2s ease;
  }

  .sidebar-logout svg {
    flex-shrink: 0;
    opacity: 0.6;
    transition: opacity 0.2s ease;
  }

  .sidebar-logout:hover {
    background: rgba(239, 68, 68, 0.12);
    color: #fca5a5;
  }

  .sidebar-logout:hover svg {
    opacity: 1;
  }

  .sidebar-overlay {
    display: none;
  }

  .main-content {
    flex: 1;
    min-width: 0;
    padding: 28px 28px 24px;
    background: #0d1117;
  }

  .topbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 12px;
    margin-bottom: 24px;
    flex-wrap: wrap;
    padding-bottom: 20px;
    border-bottom: 1px solid rgba(255, 255, 255, 0.06);
  }

  .topbar-left {
    display: flex;
    align-items: center;
    gap: 12px;
    min-width: 0;
  }

  .topbar-user-block {
    display: flex;
    flex-direction: column;
    min-width: 0;
  }

  .topbar-title {
    font-size: 22px;
    font-weight: 800;
    color: #f1f5f9;
    letter-spacing: -0.03em;
    line-height: 1.1;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .topbar-subtitle {
    font-size: 13px;
    color: #94a3b8;
    margin-top: 3px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    font-weight: 500;
  }

  .mobile-menu-btn {
    display: none;
    width: auto;
    min-width: 0;
    margin-bottom: 0;
    padding: 10px 14px;
    color: #fff;
    background: linear-gradient(135deg, #1a2035 0%, #1e2a4a 100%);
    border: none;
    border-radius: 12px;
    box-shadow: 0 8px 20px rgba(30, 42, 74, 0.22);
  }

  .role-badge {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-width: 82px;
    padding: 8px 14px;
    border-radius: 999px;
    background: rgba(79, 110, 247, 0.15);
    color: #a5b4fc;
    font-size: 13px;
    font-weight: 800;
    text-transform: capitalize;
    border: 1px solid rgba(79, 110, 247, 0.25);
    white-space: nowrap;
  }

  /* ===== Generic cards ===== */
  .content-card {
    background: #161b2e;
    border-radius: 20px;
    padding: 24px;
    box-shadow: 0 4px 24px rgba(0, 0, 0, 0.30);
    border: 1px solid rgba(255, 255, 255, 0.07);
    overflow: hidden;
  }

  .page-title {
    margin: 0 0 16px;
    font-size: 22px;
    color: #f1f5f9;
    line-height: 1.3;
    font-weight: 600;
  }

  .page-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
  }

  .toolbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
    margin-top: 12px;
    margin-bottom: 8px;
  }

  .search-box {
    width: 320px;
    max-width: 100%;
    margin-bottom: 0;
  }

  /* ===== Tables ===== */
  .table-wrapper {
    width: 100%;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    border-radius: 14px;
  }

  .table {
    width: 100%;
    min-width: 100%;
    border-collapse: collapse;
    margin-top: 12px;
    table-layout: fixed;
  }

  .table th,
  .table td {
    border-bottom: 1px solid rgba(255, 255, 255, 0.06);
    padding: 12px;
    text-align: left;
    vertical-align: top;
    font-size: 14px;
    color: #e2e8f0;
  }

  .table th {
    white-space: nowrap;
    color: #94a3b8;
    background: #161b2e;
    font-weight: 700;
  }

  .table tbody tr:hover {
    background: rgba(255, 255, 255, 0.03);
  }

  /* ===== Pagination ===== */
  .pagination {
    display: flex;
    align-items: center;
    justify-content: flex-end;
    gap: 10px;
    margin-top: 16px;
    flex-wrap: wrap;
  }

  .pagination-nav {
    display: flex;
    align-items: center;
    gap: 6px;
    background: #1e2235;
    border: 1px solid rgba(255, 255, 255, 0.08);
    border-radius: 10px;
    padding: 5px 8px;
  }

  .pagination-arrow {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 24px;
    height: 24px;
    flex-shrink: 0;
    border-radius: 6px;
    border: none;
    background: transparent;
    color: #94a3b8;
    cursor: pointer;
    padding: 0;
    transition: background 0.15s, color 0.15s;
  }

  .pagination-arrow:hover:not(:disabled) { background: rgba(255,255,255,0.08); color: #f1f5f9; }
  .pagination-arrow:disabled { color: #475569; cursor: default; }

  .pagination-label,
  .pagination-sep,
  .pagination-total {
    font-size: 13px;
    font-weight: 600;
    color: #64748b;
    line-height: 1;
  }

  .pagination-total {
    font-weight: 700;
    color: #94a3b8;
  }

  .pagination-current {
    font-size: 13px;
    font-weight: 800;
    color: #f1f5f9;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.10);
    border-radius: 6px;
    padding: 2px 8px;
    min-width: 28px;
    text-align: center;
    display: inline-block;
    cursor: text;
    outline: none;
    white-space: nowrap;
    overflow: hidden;
  }
  .pagination-current:focus { border-color: #4f6ef7; box-shadow: 0 0 0 2px rgba(79,110,247,0.15); }

  .pagination-sep {
    font-weight: 400;
  }

  .pagination-total {
    font-weight: 700;
    color: #94a3b8;
  }

  .pagination-meta {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .pagination-rows-chip {
    font-size: 12px;
    font-weight: 700;
    color: #94a3b8;
    background: #1e2235;
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 8px;
    padding: 3px 10px;
  }

  .pagination-count {
    font-size: 13px;
    color: #64748b;
    font-weight: 600;
  }

  .pagination-info {
    font-size: 14px;
    color: #94a3b8;
  }

  /* ===== Button system ===== */
  .btn,
  .action-btn,
  .secondary-btn,
  .mini-btn,
  .treatment-btn-primary,
  .treatment-remove-btn,
  .appointments-fullscreen-btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    min-height: 44px;
    padding: 10px 18px;
    border-radius: 14px;
    font-size: 14px;
    font-weight: 700;
    line-height: 1.2;
    text-decoration: none;
    border: none;
    transition:
      transform 0.18s ease,
      box-shadow 0.18s ease,
      opacity 0.18s ease,
      background 0.18s ease,
      border-color 0.18s ease,
      color 0.18s ease;
    margin-bottom: 0;
  }

  .btn:hover,
  .action-btn:hover,
  .secondary-btn:hover,
  .mini-btn:hover,
  .treatment-btn-primary:hover,
  .treatment-remove-btn:hover,
  .appointments-fullscreen-btn:hover {
    transform: translateY(-1px);
  }

  .btn:active,
  .action-btn:active,
  .secondary-btn:active,
  .mini-btn:active,
  .treatment-btn-primary:active,
  .treatment-remove-btn:active,
  .appointments-fullscreen-btn:active {
    transform: translateY(0);
  }

  .btn:disabled,
  .action-btn:disabled,
  .secondary-btn:disabled,
  .mini-btn:disabled,
  .treatment-btn-primary:disabled,
  .treatment-remove-btn:disabled,
  .appointments-fullscreen-btn:disabled {
    opacity: 0.6;
    cursor: not-allowed;
    transform: none;
    box-shadow: none;
  }

  /* primary */
  .btn-primary,
  .action-btn,
  .treatment-btn-primary,
  .mini-btn.treatment,
  button[type="submit"] {
    color: #ffffff;
    background: linear-gradient(135deg, #4f6ef7 0%, #3b5ce0 100%);
    box-shadow: 0 10px 24px rgba(79, 110, 247, 0.22);
  }

  .btn-primary:hover,
  .action-btn:hover,
  .treatment-btn-primary:hover,
  .mini-btn.treatment:hover,
  button[type="submit"]:hover {
    box-shadow: 0 14px 30px rgba(79, 110, 247, 0.32);
  }

  /* secondary */
  .btn-secondary,
  .secondary-btn {
    color: #cbd5e1;
    background: linear-gradient(135deg, #1e2235 0%, #1a2035 100%);
    border: 1px solid rgba(255, 255, 255, 0.12);
    box-shadow: 0 8px 20px rgba(0, 0, 0, 0.20);
  }

  .btn-secondary:hover,
  .secondary-btn:hover {
    background: linear-gradient(135deg, #252d47 0%, #1e2a4a 100%);
    box-shadow: 0 12px 24px rgba(0, 0, 0, 0.25);
    color: #f1f5f9;
  }

  /* danger */
  .btn-danger,
  .mini-btn.cancel,
  .treatment-remove-btn {
    color: #ffffff;
    background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%);
    box-shadow: 0 10px 24px rgba(220, 38, 38, 0.22);
  }

  .btn-danger:hover,
  .mini-btn.cancel:hover,
  .treatment-remove-btn:hover {
    box-shadow: 0 14px 30px rgba(220, 38, 38, 0.28);
  }

  /* success */
  .btn-success,
  .mini-btn.restore {
    color: #ffffff;
    background: linear-gradient(135deg, #22c55e 0%, #16a34a 100%);
    box-shadow: 0 10px 24px rgba(22, 163, 74, 0.22);
  }

  .btn-success:hover,
  .mini-btn.restore:hover {
    box-shadow: 0 14px 30px rgba(22, 163, 74, 0.28);
  }

  /* ghost utility */
  .appointments-fullscreen-btn {
    width: auto;
    min-width: 0;
    color: #cbd5e1;
    background: linear-gradient(135deg, #1e2235 0%, #1a2035 100%);
    border: 1px solid rgba(255, 255, 255, 0.10);
    box-shadow: 0 8px 18px rgba(0, 0, 0, 0.20);
  }

  .appointments-fullscreen-btn:hover {
    box-shadow: 0 12px 24px rgba(0, 0, 0, 0.28);
    color: #f1f5f9;
  }

  .appointments-fullscreen-btn svg {
    width: 16px;
    height: 16px;
  }

  /* sizing helpers */
  .action-btn {
    width: auto;
    min-width: 160px;
  }

  .mini-btn,
  .treatment-remove-btn {
    width: auto;
    min-height: 38px;
    padding: 8px 14px;
    font-size: 12px;
  }

  .modal-actions .btn,
  .modal-actions .secondary-btn,
  .modal-actions .action-btn {
    min-width: 120px;
  }

  /* ===== Confirm modal buttons ===== */
  .confirm-modal-actions {
    margin-top: 18px;
    display: flex;
    justify-content: flex-end;
    gap: 12px;
    flex-wrap: wrap;
  }

  .confirm-modal-actions .btn {
    min-width: 160px;
  }

  .confirm-modal-actions .btn-secondary {
    min-width: 140px;
  }

  /* ===== Detail close buttons ===== */
  .detail-close-x {
    width: 36px;
    height: 36px;
    min-width: 36px;
    padding: 0;
    margin-bottom: 0;
    border-radius: 12px;
    border: 1px solid rgba(239, 68, 68, 0.25);
    background: rgba(239, 68, 68, 0.10);
    color: #fca5a5;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    font-weight: 800;
    line-height: 1;
    box-shadow: none;
    transition: transform 0.18s ease, box-shadow 0.18s ease, background 0.18s ease;
  }

  .detail-close-x:hover {
    transform: translateY(-1px);
    background: rgba(239, 68, 68, 0.18);
    box-shadow: 0 8px 18px rgba(239, 68, 68, 0.15);
  }

  .detail-close-x:active {
    transform: translateY(0);
  }

  /* ===== Login button ===== */
  .login-card button[type="submit"] {
    width: 100%;
    min-height: 46px;
    border-radius: 14px;
    font-size: 15px;
    font-weight: 800;
    letter-spacing: 0.01em;
    background: linear-gradient(135deg, #4f6ef7 0%, #3b5ce0 100%);
    box-shadow: 0 12px 26px rgba(79, 110, 247, 0.25);
  }

  .login-card button[type="submit"]:hover {
    box-shadow: 0 16px 30px rgba(79, 110, 247, 0.32);
  }

  /* ===== Detail modal action alignment ===== */
  .detail-modal-actions {
    margin-top: 18px;
    display: flex;
    justify-content: flex-end;
    gap: 10px;
    flex-wrap: wrap;
  }

  /* ===== Inline actions ===== */
  .inline-actions {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }

  /* ===== Icon buttons - line style ===== */
  .icon-btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 38px;
    height: 38px;
    min-width: 38px;
    padding: 0;
    margin-bottom: 0;
    border-radius: 12px;
    border: 1px solid currentColor;
    background: transparent;
    line-height: 1;
    box-shadow: none;
    transition:
      transform 0.18s ease,
      opacity 0.18s ease,
      border-color 0.18s ease,
      color 0.18s ease;
  }

  .icon-btn:hover {
    opacity: 0.92;
    transform: translateY(-1px);
    background: transparent;
    box-shadow: none;
  }

  .icon-btn:active {
    transform: translateY(0);
  }

  .icon-btn:disabled {
    opacity: 0.55;
    cursor: not-allowed;
    transform: none;
    box-shadow: none;
  }

  .icon-btn svg {
    width: 18px;
    height: 18px;
    stroke: currentColor;
    flex-shrink: 0;
  }

  .icon-btn.detail {
    color: #93c5fd;
    border-color: rgba(147, 197, 253, 0.25);
  }

  .icon-btn.edit {
    color: #fbbf24;
    border-color: rgba(251, 191, 36, 0.25);
  }

  .icon-btn.expand {
    color: #94a3b8;
    border-color: rgba(255, 255, 255, 0.12);
  }

  .icon-btn.phone {
    color: #a5b4fc;
    border-color: rgba(165, 180, 252, 0.25);
  }

  .icon-btn.danger {
    color: #fca5a5;
    border-color: rgba(252, 165, 165, 0.25);
  }

  .icon-btn.refresh {
    color: #64748b;
    border: none;
  }

  .icon-btn.refresh:hover {
    color: #94a3b8;
    background: rgba(255, 255, 255, 0.06);
  }

  /* ===== Toast ===== */
  .toast-container {
    position: fixed;
    top: 20px;
    right: 20px;
    z-index: 1200;
    display: flex;
    flex-direction: column;
    gap: 10px;
    max-width: calc(100vw - 24px);
  }

  .toast {
    min-width: 280px;
    max-width: 360px;
    background: #1e2235;
    border-left: 5px solid #4f6ef7;
    border-radius: 14px;
    padding: 14px 16px;
    box-shadow: 0 10px 30px rgba(0, 0, 0, .40);
    color: #e2e8f0;
    font-size: 14px;
    line-height: 1.4;
    border: 1px solid rgba(255,255,255,0.08);
    border-left-width: 5px;
  }

  .toast.error {
    border-left-color: #dc2626;
  }

  .toast.success {
    border-left-color: #16a34a;
  }

  .toast.info {
    border-left-color: #2563eb;
  }

  /* ===== Status badge ===== */
  .status-badge {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    padding: 6px 12px;
    border-radius: 999px;
    font-size: 12px;
    font-weight: 800;
    letter-spacing: 0.01em;
    border: 1px solid transparent;
    text-transform: capitalize;
    white-space: nowrap;
  }

  .status-badge.scheduled {
