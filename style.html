<style>
  /* ===== Base ===== */
  * {
    box-sizing: border-box;
    font-family: 'Inter', system-ui, -apple-system, sans-serif;
  }

  :root {
    color-scheme: dark;
  }

  html,
  body {
    margin: 0;
    padding: 0;
    background: #0d1117;
    color: #e2e8f0;
  }

  body {
    min-height: 100vh;
  }

  body.sidebar-open,
  body.appointments-page-fullscreen {
    overflow: hidden;
  }

  h1 {
    margin: 0 0 8px;
    font-size: 20px;
    line-height: 1.2;
  }

  p {
    margin: 0 0 16px;
    color: #94a3b8;
    line-height: 1.5;
  }

  label {
    display: block;
    margin-bottom: 6px;
    font-size: 11px;
    font-weight: 700;
    color: #94a3b8;
    text-transform: uppercase;
    letter-spacing: 0.07em;
  }

  input,
  select,
  textarea {
    width: 100%;
    padding: 10px 12px;
    border-radius: 12px;
    border: 1px solid rgba(255, 255, 255, 0.10);
    margin-bottom: 12px;
    font-size: 13px;
    background: #1e2235;
    color: #f1f5f9;
  }

  input:focus,
  select:focus,
  textarea:focus {
    outline: none;
    border-color: #4f6ef7;
    box-shadow: 0 0 0 4px rgba(79, 110, 247, 0.15);
  }

  input:-webkit-autofill,
  input:-webkit-autofill:hover,
  input:-webkit-autofill:focus,
  input:-webkit-autofill:active {
    -webkit-box-shadow: 0 0 0 40px #1e2235 inset !important;
    -webkit-text-fill-color: #f1f5f9 !important;
    caret-color: #f1f5f9;
    transition: background-color 9999s ease-in-out 0s;
  }

  input[type="date"]::-webkit-calendar-picker-indicator,
  input[type="time"]::-webkit-calendar-picker-indicator,
  input[type="datetime-local"]::-webkit-calendar-picker-indicator,
  input[type="month"]::-webkit-calendar-picker-indicator,
  input[type="week"]::-webkit-calendar-picker-indicator {
    cursor: pointer;
    opacity: 0.75;
    filter: brightness(10);
  }

  input[type="date"]::-webkit-calendar-picker-indicator:hover,
  input[type="time"]::-webkit-calendar-picker-indicator:hover,
  input[type="datetime-local"]::-webkit-calendar-picker-indicator:hover {
    opacity: 1;
  }

  /* ===== Custom scrollbar ===== */
  ::-webkit-scrollbar {
    width: 5px;
    height: 5px;
  }

  ::-webkit-scrollbar-track {
    background: transparent;
  }

  ::-webkit-scrollbar-thumb {
    background: rgba(255, 255, 255, 0.15);
    border-radius: 10px;
  }

  ::-webkit-scrollbar-thumb:hover {
    background: rgba(255, 255, 255, 0.28);
  }

  ::-webkit-scrollbar-corner {
    background: transparent;
  }

  textarea {
    min-height: 90px;
    resize: vertical;
  }

  button {
    cursor: pointer;
    font: inherit;
  }

  .message {
    margin-top: 8px;
    font-size: 14px;
    color: #b91c1c;
    white-space: pre-line;
  }

  /* ===== Login ===== */
  .login-wrap {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    background:
      radial-gradient(circle at top left, rgba(79, 110, 247, 0.12), transparent 40%),
      radial-gradient(circle at bottom right, rgba(124, 58, 237, 0.10), transparent 40%),
      #0d1117;
  }

  .login-card {
    width: 100%;
    max-width: 380px;
    background: #161b2e;
    padding: 28px;
    border-radius: 22px;
    box-shadow: 0 24px 60px rgba(0, 0, 0, 0.40);
    border: 1px solid rgba(255, 255, 255, 0.08);
  }

  .login-logo {
    width: 90px;
    margin-bottom: 12px;
  }

  /* ===== App shell ===== */
  .app-shell {
    display: flex;
    min-height: 100vh;
    width: 100%;
    position: relative;
    align-items: flex-start;
    background: #0d1117;
  }

  .sidebar {
    width: 248px;
    flex-shrink: 0;
    background: linear-gradient(180deg, #1a2035 0%, #1e2a4a 100%);
    color: #fff;
    padding: 20px 16px;
    transition: transform 0.25s ease;
    z-index: 1002;
    position: fixed;
    top: 0;
    left: 0;
    height: 100vh;
    overflow-y: auto;
    border-right: 1px solid rgba(255, 255, 255, 0.05);
    box-shadow: 8px 0 32px rgba(15, 23, 42, 0.12);
    display: flex;
    flex-direction: column;
  }

  .sidebar-brand {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 28px;
    padding: 4px 2px;
  }

  .sidebar-brand-icon {
    width: 40px;
    height: 40px;
    border-radius: 10px;
    background: #fff;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    overflow: hidden;
    box-shadow: 0 2px 8px rgba(0, 0, 0, 0.25);
  }

  .sidebar-brand-name {
    font-size: 16px;
    font-weight: 800;
    letter-spacing: -0.02em;
    color: #fff;
    line-height: 1.2;
  }

  .sidebar-brand-sub {
    font-size: 11px;
    color: #64748b;
    margin-top: 2px;
    font-weight: 500;
    letter-spacing: 0.01em;
  }

  .sidebar-nav {
    flex: 1;
  }

  .sidebar button {
    display: flex;
    align-items: center;
    gap: 10px;
    width: 100%;
    background: transparent;
    color: #94a3b8;
    text-align: left;
    padding: 11px 14px;
    border-radius: 12px;
    margin-bottom: 4px;
    border: none;
    cursor: pointer;
    font-weight: 600;
    font-size: 13px;
    box-shadow: none;
    transition: all 0.2s ease;
  }

  .sidebar button:hover {
    background: rgba(255, 255, 255, 0.07);
    color: #fff;
    transform: none;
  }

  .sidebar-menu {
    position: relative;
    display: flex;
    align-items: center;
    gap: 10px;
    width: 100%;
    background: transparent;
    color: #94a3b8;
    text-align: left;
    padding: 11px 14px;
    border-radius: 12px;
    margin-bottom: 4px;
    border: none;
    cursor: pointer;
    font-weight: 600;
    font-size: 13px;
    transition: all 0.2s ease;
  }

  .sidebar-menu svg {
    flex-shrink: 0;
    opacity: 0.65;
    transition: opacity 0.2s ease;
  }

  .sidebar-menu:hover {
    background: rgba(255, 255, 255, 0.07);
    color: #e2e8f0;
  }

  .sidebar-menu:hover svg {
    opacity: 0.9;
  }

  .sidebar-menu.active {
    background: rgba(79, 110, 247, 0.18);
    color: #fff;
  }

  .sidebar-menu.active svg {
    opacity: 1;
  }

  .sidebar-menu.active::before {
    content: "";
    position: absolute;
    left: 0;
    top: 8px;
    bottom: 8px;
    width: 3px;
    border-radius: 4px;
    background: #4f6ef7;
  }

  .sidebar-footer {
    padding-top: 12px;
    border-top: 1px solid rgba(255, 255, 255, 0.06);
    margin-top: 8px;
  }

  .sidebar-logout {
    display: flex;
    align-items: center;
    gap: 10px;
    width: 100%;
    background: transparent;
    color: #64748b;
    text-align: left;
    padding: 11px 14px;
    border-radius: 12px;
    border: none;
    cursor: pointer;
    font-weight: 600;
    font-size: 13px;
    transition: all 0.2s ease;
  }

  .sidebar-logout svg {
    flex-shrink: 0;
    opacity: 0.6;
    transition: opacity 0.2s ease;
  }

  .sidebar-logout:hover {
    background: rgba(239, 68, 68, 0.12);
    color: #fca5a5;
  }

  .sidebar-logout:hover svg {
    opacity: 1;
  }

  .sidebar-overlay {
    display: none;
  }

  .main-content {
    margin-left: 248px;
    width: calc(100% - 248px);
    min-width: 0;
    padding: 28px 28px 24px;
    background: #0d1117;
    min-height: 100vh;
  }

  .topbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 12px;
    margin-bottom: 24px;
    flex-wrap: wrap;
    padding-bottom: 20px;
    border-bottom: 1px solid rgba(255, 255, 255, 0.06);
  }

  .topbar-left {
    display: flex;
    align-items: center;
    gap: 12px;
    min-width: 0;
  }

  .topbar-user-block {
    display: flex;
    flex-direction: column;
    min-width: 0;
  }

  .topbar-title {
    font-size: 18px;
    font-weight: 800;
    color: #f1f5f9;
    letter-spacing: -0.03em;
    line-height: 1.1;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .topbar-subtitle {
    font-size: 13px;
    color: #94a3b8;
    margin-top: 3px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    font-weight: 500;
  }

  .mobile-menu-btn {
    display: none;
    width: auto;
    min-width: 0;
    margin-bottom: 0;
    padding: 10px 14px;
    color: #fff;
    background: linear-gradient(135deg, #1a2035 0%, #1e2a4a 100%);
    border: none;
    border-radius: 12px;
    box-shadow: 0 8px 20px rgba(30, 42, 74, 0.22);
  }

  .role-badge {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-width: 82px;
    padding: 8px 14px;
    border-radius: 999px;
    background: rgba(79, 110, 247, 0.15);
    color: #a5b4fc;
    font-size: 13px;
    font-weight: 800;
    text-transform: capitalize;
    border: 1px solid rgba(79, 110, 247, 0.25);
    white-space: nowrap;
  }

  /* ===== Generic cards ===== */
  .content-card {
    background: #161b2e;
    border-radius: 20px;
    padding: 20px;
    box-shadow: 0 4px 24px rgba(0, 0, 0, 0.30);
    border: 1px solid rgba(255, 255, 255, 0.07);
    overflow: hidden;
  }

  .page-title {
    margin: 0 0 14px;
    font-size: 18px;
    color: #f1f5f9;
    line-height: 1.3;
    font-weight: 600;
  }

  .page-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
  }

  .toolbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
    margin-top: 12px;
    margin-bottom: 8px;
  }

  .search-box {
    width: 320px;
    max-width: 100%;
    margin-bottom: 0;
  }

  /* ===== Tables ===== */
  .table-wrapper {
    width: 100%;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    border-radius: 14px;
  }

  .table {
    width: 100%;
    min-width: 100%;
    border-collapse: collapse;
    margin-top: 12px;
    table-layout: fixed;
  }

  .table th,
  .table td {
    border-bottom: 1px solid rgba(255, 255, 255, 0.06);
    padding: 10px 12px;
    text-align: left;
    vertical-align: top;
    font-size: 13px;
    color: #e2e8f0;
  }

  .table th {
    white-space: nowrap;
    color: #94a3b8;
    background: #161b2e;
    font-weight: 700;
  }

  .table tbody tr:hover {
    background: rgba(255, 255, 255, 0.03);
  }

  /* ===== Pagination ===== */
  .pagination {
    display: flex;
    align-items: center;
    justify-content: flex-end;
    gap: 10px;
    margin-top: 16px;
    flex-wrap: wrap;
  }

  .pagination-nav {
    display: flex;
    align-items: center;
    gap: 6px;
    background: #1e2235;
    border: 1px solid rgba(255, 255, 255, 0.08);
    border-radius: 10px;
    padding: 5px 8px;
  }

  .pagination-arrow {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 24px;
    height: 24px;
    flex-shrink: 0;
    border-radius: 6px;
    border: none;
    background: transparent;
    color: #94a3b8;
    cursor: pointer;
    padding: 0;
    transition: background 0.15s, color 0.15s;
  }

  .pagination-arrow:hover:not(:disabled) { background: rgba(255,255,255,0.08); color: #f1f5f9; }
  .pagination-arrow:disabled { color: #475569; cursor: default; }

  .pagination-label,
  .pagination-sep,
  .pagination-total {
    font-size: 13px;
    font-weight: 600;
    color: #64748b;
    line-height: 1;
  }

  .pagination-total {
    font-weight: 700;
    color: #94a3b8;
  }

  .pagination-current {
    font-size: 13px;
    font-weight: 800;
    color: #f1f5f9;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.10);
    border-radius: 6px;
    padding: 2px 8px;
    min-width: 28px;
    text-align: center;
    display: inline-block;
    cursor: text;
    outline: none;
    white-space: nowrap;
    overflow: hidden;
  }
  .pagination-current:focus { border-color: #4f6ef7; box-shadow: 0 0 0 2px rgba(79,110,247,0.15); }

  .pagination-sep {
    font-weight: 400;
  }

  .pagination-total {
    font-weight: 700;
    color: #94a3b8;
  }

  .pagination-meta {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .pagination-rows-chip {
    font-size: 12px;
    font-weight: 700;
    color: #94a3b8;
    background: #1e2235;
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 8px;
    padding: 3px 10px;
  }

  .pagination-count {
    font-size: 13px;
    color: #64748b;
    font-weight: 600;
  }

  .pagination-info {
    font-size: 14px;
    color: #94a3b8;
  }

  /* ===== Button system ===== */
  .btn,
  .action-btn,
  .secondary-btn,
  .mini-btn,
  .treatment-btn-primary,
  .treatment-remove-btn,
  .appointments-fullscreen-btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 7px;
    min-height: 40px;
    padding: 9px 16px;
    border-radius: 10px;
    font-size: 14px;
    font-weight: 600;
    line-height: 1.2;
    text-decoration: none;
    border: 1.5px solid transparent;
    transition:
      filter 0.15s ease,
      box-shadow 0.15s ease,
      background 0.15s ease,
      opacity 0.15s ease;
    margin-bottom: 0;
  }

  .btn:hover,
  .action-btn:hover,
  .secondary-btn:hover,
  .mini-btn:hover,
  .treatment-btn-primary:hover,
  .treatment-remove-btn:hover,
  .appointments-fullscreen-btn:hover {
    filter: brightness(1.1);
  }

  .btn:active,
  .action-btn:active,
  .secondary-btn:active,
  .mini-btn:active,
  .treatment-btn-primary:active,
  .treatment-remove-btn:active,
  .appointments-fullscreen-btn:active {
    filter: brightness(0.93);
  }

  .btn:disabled,
  .action-btn:disabled,
  .secondary-btn:disabled,
  .mini-btn:disabled,
  .treatment-btn-primary:disabled,
  .treatment-remove-btn:disabled,
  .appointments-fullscreen-btn:disabled {
    opacity: 0.5;
    cursor: not-allowed;
    filter: none;
    box-shadow: none;
  }

  /* primary — sky → biru → lavender */
  .btn-primary,
  .action-btn,
  .treatment-btn-primary,
  .mini-btn.treatment,
  button[type="submit"] {
    color: #bfdbfe;
    background:
      rgba(79, 110, 247, 0.08) padding-box,
      linear-gradient(135deg, #38bdf8 0%, #4f6ef7 50%, #a78bfa 100%) border-box;
    box-shadow: 0 0 16px rgba(79, 110, 247, 0.14);
  }

  /* secondary */
  .btn-secondary,
  .secondary-btn {
    color: #94a3b8;
    background:
      rgba(255, 255, 255, 0.03) padding-box,
      linear-gradient(135deg, rgba(255,255,255,0.22) 0%, rgba(148,163,184,0.10) 50%, rgba(255,255,255,0.05) 100%) border-box;
    box-shadow: none;
  }

  .btn-secondary:hover,
  .secondary-btn:hover {
    color: #e2e8f0;
  }

  /* danger — oranye → merah → rose */
  .btn-danger,
  .mini-btn.cancel,
  .treatment-remove-btn {
    color: #fda4af;
    background:
      rgba(239, 68, 68, 0.08) padding-box,
      linear-gradient(135deg, #fb923c 0%, #ef4444 50%, #f43f5e 100%) border-box;
    box-shadow: none;
  }

  /* success — hijau → emerald → teal */
  .btn-success,
  .mini-btn.restore {
    color: #86efac;
    background:
      rgba(34, 197, 94, 0.08) padding-box,
      linear-gradient(135deg, #4ade80 0%, #22c55e 50%, #2dd4bf 100%) border-box;
    box-shadow: none;
  }

  /* ghost utility */
  .appointments-fullscreen-btn {
    width: auto;
    min-width: 0;
    color: #94a3b8;
    background:
      rgba(255, 255, 255, 0.03) padding-box,
      linear-gradient(135deg, rgba(255,255,255,0.22) 0%, rgba(148,163,184,0.10) 50%, rgba(255,255,255,0.05) 100%) border-box;
  }

  .appointments-fullscreen-btn:hover {
    color: #e2e8f0;
  }

  .appointments-fullscreen-btn svg {
    width: 16px;
    height: 16px;
  }

  /* sizing helpers */
  .action-btn {
    width: auto;
    min-width: 160px;
  }

  .mini-btn,
  .treatment-remove-btn {
    width: auto;
    min-height: 32px;
    padding: 5px 12px;
    font-size: 12px;
  }

  .modal-actions .btn,
  .modal-actions .secondary-btn,
  .modal-actions .action-btn {
    min-width: 120px;
  }

  /* ===== Confirm modal buttons ===== */
  .confirm-modal-actions {
    margin-top: 18px;
    display: flex;
    justify-content: flex-end;
    gap: 12px;
    flex-wrap: wrap;
  }

  .confirm-modal-actions .btn {
    min-width: 160px;
  }

  .confirm-modal-actions .btn-secondary {
    min-width: 140px;
  }

  /* ===== Detail close buttons ===== */
  .detail-close-x {
    width: 36px;
    height: 36px;
    min-width: 36px;
    padding: 0;
    margin-bottom: 0;
    border-radius: 8px;
    border: none;
    background: rgba(239, 68, 68, 0.10);
    color: #fca5a5;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    font-weight: 700;
    line-height: 1;
    box-shadow: none;
    transition: filter 0.15s ease, background 0.15s ease;
  }

  .detail-close-x:hover {
    filter: brightness(1.18);
    background: rgba(239, 68, 68, 0.18);
  }

  .detail-close-x:active {
    filter: brightness(0.9);
  }

  /* ===== Login button ===== */
  .login-card button[type="submit"] {
    width: 100%;
    min-height: 44px;
    border-radius: 10px;
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 0.01em;
    box-shadow: 0 0 20px rgba(79, 110, 247, 0.18);
  }

  /* ===== Detail modal action alignment ===== */
  .detail-modal-actions {
    margin-top: 18px;
    display: flex;
    justify-content: flex-end;
    gap: 10px;
    flex-wrap: wrap;
  }

  /* ===== Inline actions ===== */
  .inline-actions {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }

  /* ===== Icon buttons - line style ===== */
  .icon-btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 30px;
    height: 30px;
    min-width: 30px;
    padding: 0;
    margin-bottom: 0;
    border-radius: 8px;
    border: none;
    background: rgba(255, 255, 255, 0.05);
    line-height: 1;
    box-shadow: none;
    transition:
      filter 0.15s ease,
      background 0.15s ease,
      opacity 0.15s ease;
  }

  .icon-btn:hover {
    filter: brightness(1.18);
  }

  .icon-btn:active {
    filter: brightness(0.9);
  }

  .icon-btn:disabled {
    opacity: 0.45;
    cursor: not-allowed;
    filter: none;
  }

  .icon-btn svg {
    width: 14px;
    height: 14px;
    stroke: currentColor;
    flex-shrink: 0;
  }

  .icon-btn.detail {
    color: #93c5fd;
    background: rgba(147, 197, 253, 0.09);
  }

  .icon-btn.edit {
    color: #fbbf24;
    background: rgba(251, 191, 36, 0.09);
  }

  .icon-btn.expand {
    color: #94a3b8;
    background: rgba(148, 163, 184, 0.07);
  }

  .icon-btn.phone {
    color: #a5b4fc;
    background: rgba(165, 180, 252, 0.09);
  }

  .icon-btn.danger {
    color: #fca5a5;
    background: rgba(252, 165, 165, 0.09);
  }

  .icon-btn.refresh {
    color: #64748b;
    background: transparent;
  }

  .icon-btn.refresh:hover {
    color: #94a3b8;
    background: rgba(255, 255, 255, 0.06);
    filter: none;
  }

  /* ===== Toast ===== */
  .toast-container {
    position: fixed;
    top: 20px;
    right: 20px;
    z-index: 1200;
    display: flex;
    flex-direction: column;
    gap: 10px;
    max-width: calc(100vw - 24px);
  }

  .toast {
    min-width: 280px;
    max-width: 360px;
    background: #1e2235;
    border-left: 5px solid #4f6ef7;
    border-radius: 14px;
    padding: 14px 16px;
    box-shadow: 0 10px 30px rgba(0, 0, 0, .40);
    color: #e2e8f0;
    font-size: 14px;
    line-height: 1.4;
