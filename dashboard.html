<script>
  let dashboardPeriod = 'today';
  let dashboardCache = {};

  function formatDashboardRupiah(value) {
    const num = Number(value || 0);
    return 'Rp ' + num.toLocaleString('id-ID');
  }

  function formatDashboardDateDmy(value) {
    const s = String(value || '').trim();
    if (!s) return '-';

    if (/^\d{4}-\d{2}-\d{2}$/.test(s)) {
      const parts = s.split('-');
      return parts[2] + '-' + parts[1] + '-' + parts[0];
    }

    return s;
  }

  function formatDashboardRating(value) {
    const rating = Number(value || 0);

    if (!rating) return '-';

    return rating.toFixed(1).replace('.0', '') + ' / 5';
  }

  function renderDashboardSkeleton() {
    const heroKpi = document.getElementById('heroKpi');
    const statStrip = document.getElementById('statStrip');
    const topServices = document.getElementById('topServices');
    const latestAppt = document.getElementById('latestAppt');
    const recallDueList = document.getElementById('recallDueList');
    const periodInfo = document.getElementById('dashboardPeriodInfo');

    if (periodInfo) periodInfo.innerHTML = 'Memuat periode dashboard...';

    if (heroKpi) {
      heroKpi.innerHTML = `
        <div class="dashboard-hero-card dashboard-hero-cashin">
          <div class="dashboard-hero-label">Kas Masuk</div>
          <div class="dashboard-hero-value">...</div>
          <div class="dashboard-hero-sub">Memuat...</div>
        </div>
        <div class="dashboard-hero-card dashboard-hero-netbilling">
          <div class="dashboard-hero-label">Net Billing</div>
          <div class="dashboard-hero-value">...</div>
          <div class="dashboard-hero-sub">Memuat...</div>
        </div>
        <div class="dashboard-hero-card dashboard-hero-appointment">
          <div class="dashboard-hero-label">Appointment</div>
          <div class="dashboard-hero-value">...</div>
          <div class="dashboard-hero-sub">Memuat...</div>
        </div>
        <div class="dashboard-hero-card dashboard-hero-piutang">
          <div class="dashboard-hero-label">Piutang</div>
          <div class="dashboard-hero-value">...</div>
          <div class="dashboard-hero-sub">Memuat...</div>
        </div>
      `;
    }

    if (statStrip) {
      statStrip.innerHTML = `
        <div class="dashboard-stat-item dashboard-stat-primary">
          <div class="dashboard-stat-label">Pasien Baru</div>
          <div class="dashboard-stat-value">...</div>
          <div class="dashboard-stat-sub">Memuat...</div>
        </div>
        <div class="dashboard-stat-item">
          <div class="dashboard-stat-label">Completion Rate</div>
          <div class="dashboard-stat-value">...</div>
          <div class="dashboard-stat-sub">Memuat...</div>
        </div>
        <div class="dashboard-stat-item dashboard-stat-warning">
          <div class="dashboard-stat-label">Recall</div>
          <div class="dashboard-stat-value">...</div>
          <div class="dashboard-stat-sub">Memuat...</div>
        </div>
        <div class="dashboard-stat-item">
          <div class="dashboard-stat-label">Rating Layanan</div>
          <div class="dashboard-stat-value">...</div>
          <div class="dashboard-stat-sub">Memuat...</div>
        </div>
      `;
    }

    if (topServices) topServices.innerHTML = `<div class="dashboard-empty">Memuat top tindakan...</div>`;
    if (latestAppt) latestAppt.innerHTML = `<div class="dashboard-empty">Memuat appointment terbaru...</div>`;
    if (recallDueList) recallDueList.innerHTML = `<div class="dashboard-empty">Memuat daftar recall...</div>`;
  }

  function renderDashboardError(message) {
    const msg = message || 'Gagal memuat dashboard';
    const periodInfo = document.getElementById('dashboardPeriodInfo');
    const heroKpi = document.getElementById('heroKpi');
    const statStrip = document.getElementById('statStrip');
    const topServices = document.getElementById('topServices');
    const latestAppt = document.getElementById('latestAppt');
    const recallDueList = document.getElementById('recallDueList');

    if (periodInfo) periodInfo.innerHTML = 'Dashboard gagal dimuat';
    if (heroKpi) heroKpi.innerHTML = `<div class="dashboard-empty">${msg}</div>`;
    if (statStrip) statStrip.innerHTML = '';
    if (topServices) topServices.innerHTML = `<div class="dashboard-empty">${msg}</div>`;
    if (latestAppt) latestAppt.innerHTML = `<div class="dashboard-empty">${msg}</div>`;
    if (recallDueList) recallDueList.innerHTML = `<div class="dashboard-empty">${msg}</div>`;
  }

  function renderDashboardEmpty(message) {
    return `<div class="dashboard-empty">${message || 'Belum ada data'}</div>`;
  }

  function getDashboardStatusChip(status) {
    const value = String(status || '').toLowerCase();

    if (value === 'completed') {
      return '<span class="dashboard-status-chip completed">Completed</span>';
    }

    if (value === 'cancelled') {
      return '<span class="dashboard-status-chip overdue">Cancelled</span>';
    }

    return '<span class="dashboard-status-chip upcoming">Scheduled</span>';
  }

  function getDashboardRecallChip(status) {
    const value = String(status || '').toLowerCase();

    if (value === 'overdue') {
      return '<span class="dashboard-status-chip overdue">Overdue</span>';
    }

    if (value === 'due') {
      return '<span class="dashboard-status-chip upcoming">Due</span>';
    }

    if (value === 'reached_target') {
      return '<span class="dashboard-status-chip completed">Reached Target</span>';
    }

    if (value === 'done') {
      return '<span class="dashboard-status-chip">Done</span>';
    }

    return '<span class="dashboard-status-chip">Upcoming</span>';
  }

  function renderDashboardOpsList(rows, mapper) {
    if (!Array.isArray(rows) || !rows.length) return '';

    return `
      <div class="dashboard-ops-list">
        ${rows.map(mapper).join('')}
      </div>
    `;
  }

  function showDashboardPage() {
    setActiveMenu('menuDashboard');
    const content = document.getElementById('contentArea');
    if (!content) return;

    content.innerHTML = `
      <div class="dashboard-shell">
        <div class="dashboard-header">
          <div>
            <div class="dashboard-eyebrow">Overview</div>
            <h2 class="dashboard-title">Dashboard Owner</h2>
            <div class="dashboard-subtitle">Ringkasan kas masuk, billing, appointment, piutang, dan recall klinik</div>
          </div>

          <div class="dashboard-filter-wrap">
            <label for="dashboardPeriodSelect" class="dashboard-filter-label">Periode</label>
            <select id="dashboardPeriodSelect" class="dashboard-filter-select" onchange="changePeriod(this)">
              <option value="today">Hari Ini</option>
              <option value="7days">7 Hari</option>
              <option value="30days">30 Hari</option>
            </select>
          </div>
        </div>

        <div id="dashboardPeriodInfo" class="dashboard-period-info"></div>

        <div id="heroKpi" class="dashboard-hero-grid"></div>

        <div id="statStrip" class="dashboard-stat-strip"></div>

        <div class="dashboard-panels">
          <div class="dashboard-panel">
            <div class="dashboard-panel-header">
              <h3>Top Tindakan</h3>
              <span class="dashboard-panel-badge">Top 5</span>
            </div>
            <div id="topServices"></div>
          </div>

          <div class="dashboard-panel">
            <div class="dashboard-panel-header">
              <h3>Appointment Terbaru</h3>
              <span class="dashboard-panel-badge">Terbaru</span>
            </div>
            <div id="latestAppt"></div>
          </div>

          <div class="dashboard-panel">
            <div class="dashboard-panel-header">
              <h3>Recall Due List</h3>
              <span class="dashboard-panel-badge">Top 5</span>
            </div>
            <div id="recallDueList"></div>
          </div>
        </div>
      </div>
    `;

    const select = document.getElementById('dashboardPeriodSelect');
    if (select) select.value = dashboardPeriod;

    renderDashboardSkeleton();
    loadDashboard();
  }

  function changePeriod(el) {
    dashboardPeriod = el && el.value ? el.value : 'today';
    loadDashboard();
  }

  function loadDashboard() {
    const period = dashboardPeriod;

    if (dashboardCache[period]) {
      renderDashboard(dashboardCache[period]);
    } else {
      renderDashboardSkeleton();
    }

    google.script.run
      .withSuccessHandler(function(res) {
        if (res && res.success) {
          dashboardCache[period] = res;
        }
        renderDashboard(res);
      })
      .withFailureHandler(function(err) {
        const msg = 'Error: ' + (err && err.message ? err.message : err);
        if (!dashboardCache[period]) renderDashboardError(msg);
        showToast(msg, 'error');
      })
      .getDashboardOwnerSummary(period);
  }

  function renderDashboard(res) {
    if (!res || !res.success) {
      const msg = (res && res.message) || 'Gagal memuat dashboard';
      renderDashboardError(msg);
      showToast(msg, 'error');
      return;
    }

    const d = res.data || {};
    const k = d.kpi || {};

    renderDashboardPeriod(d.period || {});
    renderHeroKpi(k);
    renderStatStrip(k, d.feedback_summary || null);
    renderTopServices(d.top_services || []);
    renderLatestAppointments(d.latest_appointments || []);
    renderRecallDueList(d.recall_due_list || []);
  }

  function renderDashboardPeriod(period) {
    const el = document.getElementById('dashboardPeriodInfo');
    if (!el) return;

    el.innerHTML = `
      Periode data:
      <strong>${formatDashboardDateDmy(period.start || '')}</strong>
      s/d
      <strong>${formatDashboardDateDmy(period.end || '')}</strong>
    `;
  }

  function renderHeroKpi(k) {
    const el = document.getElementById('heroKpi');
    if (!el) return;

    const grossBilling = Number(k.gross_billing || 0);
    const discountTotal = Number(k.discount_total || 0);
    const netBilling = Number(k.net_billing || 0);
    const cashIn = Number(k.cash_in || 0);
    const outstandingTotal = Number(k.outstanding_total || 0);
    const unpaidBillingCount = Number(k.unpaid_billing_count || 0);

    const cashInRate = netBilling > 0 ? Math.round((cashIn / netBilling) * 100) : 0;
    const discountRate = grossBilling > 0 ? Math.round((discountTotal / grossBilling) * 100) : 0;

    const appointmentTotal = Number(k.appointment_total || 0);
    const completedTotal = Number(k.completed_total || 0);
    const cancelledTotal = Number(k.cancelled_total || 0);
    const scheduledTotal = Number(k.scheduled_total || 0);

    const discountPart = discountTotal > 0
      ? 'Diskon ' + formatDashboardRupiah(discountTotal) + (discountRate ? ' (' + discountRate + '%)' : '')
      : 'Tanpa diskon';

    el.innerHTML = `
      <div class="dashboard-hero-card dashboard-hero-cashin">
        <div class="dashboard-hero-label">Kas Masuk</div>
        <div class="dashboard-hero-value">${formatDashboardRupiah(cashIn)}</div>
        <div class="dashboard-hero-sub">${cashInRate}% dari Net Billing periode ini</div>
      </div>

      <div class="dashboard-hero-card dashboard-hero-netbilling">
        <div class="dashboard-hero-label">Net Billing</div>
        <div class="dashboard-hero-value">${formatDashboardRupiah(netBilling)}</div>
        <div class="dashboard-hero-sub">Gross ${formatDashboardRupiah(grossBilling)} &bull; ${discountPart}</div>
      </div>

      <div class="dashboard-hero-card dashboard-hero-appointment">
        <div class="dashboard-hero-label">Appointment</div>
        <div class="dashboard-hero-value">${appointmentTotal}</div>
        <div class="dashboard-hero-sub">${completedTotal} Completed &bull; ${cancelledTotal} Cancelled &bull; ${scheduledTotal} Scheduled</div>
      </div>

      <div class="dashboard-hero-card dashboard-hero-piutang">
        <div class="dashboard-hero-label">Piutang</div>
        <div class="dashboard-hero-value">${formatDashboardRupiah(outstandingTotal)}</div>
        <div class="dashboard-hero-sub">${unpaidBillingCount} billing belum lunas</div>
      </div>
    `;
  }

  function renderStatStrip(k, feedbackSummary) {
    const el = document.getElementById('statStrip');
    if (!el) return;

    const newPatients = Number(k.new_patients || 0);
    const activePatients = Number(k.active_patients || 0);
    const completedRate = Number(k.completed_rate || 0);
    const cancelledRate = Number(k.cancelled_rate || 0);
    const recallDue = Number(k.recall_due_total || 0);
    const recallOverdue = Number(k.recall_overdue_total || 0);

    const s = feedbackSummary || {};
    const avgRating = formatDashboardRating(s.average_rating || 0);
    const feedbackCount = Number(s.submitted_count || 0);

    const rateClass = completedRate >= 70 ? 'dashboard-stat-success'
      : completedRate < 40 && completedRate > 0 ? 'dashboard-stat-danger'
      : '';

    el.innerHTML = `
      <div class="dashboard-stat-item dashboard-stat-primary">
        <div class="dashboard-stat-label">Pasien Baru</div>
        <div class="dashboard-stat-value">${newPatients}</div>
        <div class="dashboard-stat-sub">dari ${activePatients} pasien aktif</div>
      </div>

      <div class="dashboard-stat-item ${rateClass}">
        <div class="dashboard-stat-label">Completion Rate</div>
        <div class="dashboard-stat-value">${completedRate}%</div>
        <div class="dashboard-stat-sub">Cancel ${cancelledRate}%</div>
      </div>

      <div class="dashboard-stat-item dashboard-stat-warning">
        <div class="dashboard-stat-label">Recall</div>
        <div class="dashboard-stat-value">${recallDue} Due</div>
        <div class="dashboard-stat-sub">${recallOverdue} Overdue</div>
      </div>

      <div class="dashboard-stat-item">
        <div class="dashboard-stat-label">Rating Layanan</div>
        <div class="dashboard-stat-value">${avgRating}</div>
        <div class="dashboard-stat-sub">${feedbackCount} feedback masuk</div>
      </div>
    `;
  }

  function renderTopServices(rows) {
    const el = document.getElementById('topServices');
    if (!el) return;

    if (!rows.length) {
      el.innerHTML = renderDashboardEmpty('Belum ada data tindakan');
      return;
    }

    el.innerHTML = `
      <div class="dashboard-list">
        ${rows.map(function(row, idx) {
          return `
            <div class="dashboard-list-item">
              <div class="dashboard-list-rank">${idx + 1}</div>
              <div class="dashboard-list-main">
                <div class="dashboard-list-title">${row.name || '-'}</div>
                <div class="dashboard-list-subtitle">
                  Qty ${Number(row.qty || 0)} &bull; ${formatDashboardRupiah(row.total || 0)}
                </div>
              </div>
            </div>
          `;
        }).join('')}
      </div>
    `;
  }

  function renderLatestAppointments(rows) {
    const el = document.getElementById('latestAppt');
    if (!el) return;

    if (!rows.length) {
      el.innerHTML = renderDashboardEmpty('Belum ada data appointment');
      return;
    }

    el.innerHTML = renderDashboardOpsList(rows, function(row) {
      return `
        <div class="dashboard-ops-item">
          <div class="dashboard-ops-main">
            <div class="dashboard-ops-title">${row.patient_name || '-'}</div>
            <div class="dashboard-ops-meta">
              <span>${formatDashboardDateDmy(row.appointment_date || '')}</span>
              <span>&bull;</span>
              <span>${row.appointment_time || '-'}</span>
            </div>
          </div>

          <div class="dashboard-ops-side">
            ${getDashboardStatusChip(row.status)}
          </div>
        </div>
      `;
    });
  }

  function renderRecallDueList(rows) {
    const el = document.getElementById('recallDueList');
    if (!el) return;

    if (!rows.length) {
      el.innerHTML = renderDashboardEmpty('Belum ada data recall aktif');
      return;
    }

    el.innerHTML = renderDashboardOpsList(rows, function(row) {
      const contactText = row.last_contact_date
        ? 'Contacted: ' + formatDashboardDateDmy(row.last_contact_date)
        : 'Belum dihubungi';

      return `
        <div class="dashboard-ops-item">
          <div class="dashboard-ops-main">
            <div class="dashboard-ops-title">${row.patient_name || '-'}</div>
            <div class="dashboard-ops-meta">
              <span>Next Due: ${formatDashboardDateDmy(row.next_due_date || '')}</span>
              <span>&bull;</span>
              <span>${contactText}</span>
            </div>
          </div>

          <div class="dashboard-ops-side">
            ${getDashboardRecallChip(row.followup_status)}
          </div>
        </div>
      `;
    });
  }
</script>
