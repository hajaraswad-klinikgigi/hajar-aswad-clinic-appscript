<style>
  /* =========================================================
     AUDIT LOG (AKTIVITAS) — page-specific styles
     Filter UI re-uses `.recall-*` classes dari style-recall.html
     (same dark-theme toolbar/chip/panel pattern).
     Diff table tetap pakai class `.activity-diff-*` (unique).
     ========================================================= */
  /* Override recall grid utk 4 filter field di Aktivitas */
  #activityFiltersPanel .recall-filter-grid {
    grid-template-columns: repeat(4, minmax(0, 1fr));
  }
  @media (max-width: 1024px) {
    #activityFiltersPanel .recall-filter-grid {
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }
  }
  @media (max-width: 600px) {
    #activityFiltersPanel .recall-filter-grid {
      grid-template-columns: 1fr;
    }
  }

  /* Main table cells */
  .activity-time-main {
    font-size: 12px;
    color: #e2e8f0;
  }
  .activity-time-sub {
    font-size: 10.5px;
    color: #64748b;
  }
  .activity-entity-id {
    margin-top: 2px;
    font-size: 10.5px;
    color: #64748b;
    word-break: break-all;
  }
  .activity-actor-id {
    font-size: 12px;
    color: #e2e8f0;
    word-break: break-all;
  }
  .activity-actor-roles {
    margin-top: 2px;
    font-size: 10.5px;
    color: #64748b;
  }
  .activity-notes-cell {
    font-size: 12px;
    color: #cbd5e1;
    word-break: break-word;
  }

  /* Detail modal info block (inside dark detail-modal-box-sticky) */
  .activity-detail-info {
    display: grid;
    grid-template-columns: 100px 1fr;
    gap: 8px 14px;
    margin-bottom: 14px;
    padding: 12px 14px;
    background: rgba(255, 255, 255, 0.04);
    border: 1px solid rgba(255, 255, 255, 0.07);
    border-radius: 10px;
    font-size: 12px;
  }
  .activity-detail-info dt {
    font-weight: 700;
    color: #94a3b8;
    margin: 0;
  }
  .activity-detail-info dd {
    margin: 0;
    color: #e2e8f0;
    word-break: break-word;
  }
  .activity-detail-info dd.activity-notes {
    white-space: pre-wrap;
    color: #cbd5e1;
  }

  /* Diff table */
  .activity-diff {
    border: 1px solid rgba(255, 255, 255, 0.10);
    border-radius: 10px;
    overflow: hidden;
  }
  .activity-diff-header,
  .activity-diff-row {
    display: grid;
    grid-template-columns: 170px 1fr 1fr;
    gap: 0;
  }
  .activity-diff-header > div,
  .activity-diff-row > div {
    padding: 9px 12px;
    font-size: 12px;
    word-break: break-word;
    white-space: pre-wrap;
  }
  .activity-diff-header {
    background: rgba(255, 255, 255, 0.05);
    border-bottom: 1px solid rgba(255, 255, 255, 0.10);
  }
  .activity-diff-header > div {
    font-weight: 700;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }
  .activity-diff-header > div + div {
    border-left: 1px solid rgba(255, 255, 255, 0.10);
  }
  .activity-diff-row + .activity-diff-row {
    border-top: 1px solid rgba(255, 255, 255, 0.05);
  }
  .activity-diff-row > div + div {
    border-left: 1px solid rgba(255, 255, 255, 0.05);
  }
  .activity-diff-field {
    background: rgba(255, 255, 255, 0.03);
    color: #94a3b8;
    font-weight: 600;
  }
  .activity-diff-value {
    color: #e2e8f0;
    font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    font-size: 11.5px;
  }
  .activity-diff-value-muted {
    color: #64748b;
    font-style: italic;
    font-family: inherit;
  }

  .activity-diff-cell-changed  { background: rgba(234, 179, 8, 0.12); }
  .activity-diff-cell-added    { background: rgba(34, 197, 94, 0.14); }
  .activity-diff-cell-removed  { background: rgba(239, 68, 68, 0.13); }
  .activity-diff-cell-neutral  { background: transparent; }

  .activity-diff-empty {
    padding: 24px;
    text-align: center;
    color: #64748b;
    font-size: 12.5px;
    border: 1px dashed rgba(255, 255, 255, 0.10);
    border-radius: 10px;
  }

  .activity-header-color-before { color: #fca5a5; }
  .activity-header-color-after  { color: #86efac; }
  .activity-header-color-muted  { color: #64748b; }
</style>

<script>
/* =========================================================
   AUDIT LOG (AKTIVITAS) PAGE — STATE
   ========================================================= */
var activityRows = [];
var activityPageNumber = 1;
var activityPageSize = 5;
var activityTotalCount = 0;
var activityTotalPages = 1;
var activityHasNext = false;
var activityHasPrev = false;
var activityAllowedEntityTypes = null;
var activityActiveSince = '2026-05-19';
var activityFiltersApplied = {};
var activityLoading = false;
var activityFiltersExpanded = false;
var activitySearchDebounce = null;
var ACTIVITY_SEARCH_DEBOUNCE_MS = 280;

// Page cache untuk stale-while-revalidate.
// Key: JSON.stringify(filtersApplied) + '|' + pageNumber.
// FIFO eviction, max 10 entry, TTL 30 detik supaya audit log baru kelihatan.
var activityPageCache = {};
var activityPageCacheOrder = [];
var ACTIVITY_PAGE_CACHE_MAX = 10;
var ACTIVITY_PAGE_CACHE_TTL_MS = 30 * 1000;

var ACTIVITY_ENTITY_TYPE_LABELS = {
  patient:                   'Pasien',
  appointment:               'Appointment',
  treatment:                 'Treatment',
  ortho_recall:              'Recall Ortho',
  billing:                   'Tagihan',
  billing_adjustment:        'Diskon Tagihan',
  payment:                   'Pembayaran',
  billing_installment_plan:  'Plan Cicilan',
  billing_invoice:           'Invoice',
  billing_feedback:          'Feedback Pasien',
  expense:                   'Pengeluaran',
  doctor_compensation_rule:  'Aturan Fee Dokter',
  doctor_material_deduction: 'Deduksi Material',
  service_catalog:           'Katalog Layanan',
  clinic_info:               'Info Klinik',
  user:                      'Pengguna'
};

var ACTIVITY_ACTION_LABELS = {
  create:                'Tambah',
  update:                'Ubah',
  delete:                'Hapus',
  deactivate:            'Nonaktifkan',
  activate:              'Aktifkan',
  cancel:                'Batalkan',
  restore:               'Pulihkan',
  complete:              'Selesaikan',
  submit:                'Kirim',
  replace:               'Ganti',
  clear:                 'Bersihkan',
  save_contact:          'Simpan Kontak',
  confirm_doctor_fee:    'Konfirmasi Fee',
  generate_totp:         'Setup TOTP',
  reset_totp:            'Reset TOTP',
  disable_totp:          'Disable TOTP',
  send_totp_setup_email: 'Kirim Email TOTP',
  generate_pdf:          'Buat PDF',
  send_email:            'Kirim Email'
};

var ACTIVITY_ACTION_DANGER = ['delete', 'deactivate', 'cancel', 'disable_totp', 'clear'];
var ACTIVITY_ACTION_POSITIVE = ['create', 'activate', 'restore', 'complete', 'submit'];

/* =========================================================
   ENTRY POINT
   ========================================================= */
function showActivityPage() {
  document.querySelectorAll('.sidebar-menu').forEach(function(b) { b.classList.remove('active'); });
  var btn = document.getElementById('menuActivity');
  if (btn) btn.classList.add('active');

  var contentArea = document.getElementById('contentArea');
  if (!contentArea) return;

  contentArea.innerHTML =
    '<div class="patients-shell">' +
      '<div class="patients-header">' +
        '<div>' +
          '<div class="patients-eyebrow">Aktivitas</div>' +
          '<h1 class="patients-title">Log Aktivitas Sistem</h1>' +
          '<div class="patients-subtitle">Rekam jejak perubahan data oleh seluruh pengguna staff klinik</div>' +
        '</div>' +
      '</div>' +

      '<div class="content-card patients-toolbar-card">' +
        '<div class="recall-toolbar">' +
          '<div class="recall-toolbar-main">' +
            '<div class="patients-search-wrap recall-search-wrap">' +
              '<label class="patients-toolbar-label">Cari Pengguna</label>' +
              '<input type="text" id="activitySearchActor" class="search-box" ' +
                'placeholder="Cari nama / username pengguna..." ' +
                'oninput="activityOnSearchInput_()">' +
            '</div>' +
            '<div class="recall-toolbar-actions">' +
              '<button type="button" id="activityFiltersToggleBtn" class="recall-filter-chip" ' +
                'onclick="activityToggleFilters_()" aria-label="Toggle filters" title="Filters">' +
                '<svg viewBox="0 0 24 24" fill="none" stroke-width="2">' +
                  '<path d="M3 5h18"></path><path d="M6 12h12"></path><path d="M10 19h4"></path>' +
                '</svg>' +
                '<span class="recall-filter-chip-label">Filters</span>' +
              '</button>' +
              '<button type="button" id="activityFiltersResetBtn" class="recall-reset-link" ' +
                'onclick="activityResetFilter_()" style="display:none;">Reset</button>' +
            '</div>' +
          '</div>' +
          '<div id="activityFiltersPanel" class="recall-filter-panel">' +
            '<div class="recall-filter-grid">' +
              '<div class="recall-filter-wrap">' +
                '<label class="patients-toolbar-label">Dari tanggal</label>' +
                '<input type="date" id="activityFilterStartDate" onchange="activityApplyFilter_()">' +
              '</div>' +
              '<div class="recall-filter-wrap">' +
                '<label class="patients-toolbar-label">Sampai tanggal</label>' +
                '<input type="date" id="activityFilterEndDate" onchange="activityApplyFilter_()">' +
              '</div>' +
              '<div class="recall-filter-wrap">' +
                '<label class="patients-toolbar-label">Entitas</label>' +
                '<select id="activityFilterEntityType" onchange="activityApplyFilter_()">' +
                  '<option value="">Semua entitas</option>' +
                  activityBuildEntityTypeOptions_() +
                '</select>' +
              '</div>' +
              '<div class="recall-filter-wrap">' +
                '<label class="patients-toolbar-label">Aksi</label>' +
                '<select id="activityFilterAction" onchange="activityApplyFilter_()">' +
                  '<option value="">Semua aksi</option>' +
                  activityBuildActionOptions_() +
                '</select>' +
              '</div>' +
            '</div>' +
          '</div>' +
        '</div>' +
      '</div>' +

      '<div class="content-card">' +
        '<div class="table-wrapper"><table class="table" style="table-layout:fixed;width:100%">' +
          '<thead><tr>' +
            '<th style="width:15%">Waktu</th>' +
            '<th style="width:14%">Entitas</th>' +
            '<th style="width:13%">Aksi</th>' +
            '<th style="width:20%">Aktor</th>' +
            '<th style="width:30%">Catatan</th>' +
            '<th style="width:8%;text-align:right">Detail</th>' +
          '</tr></thead>' +
          '<tbody id="activityTbody">' +
            '<tr><td colspan="6">Memuat data...</td></tr>' +
          '</tbody>' +
        '</table></div>' +

        '<div class="pagination">' +
          '<div class="pagination-nav">' +
            '<button type="button" class="pagination-arrow" id="activityPrevBtn" onclick="activityPrevPage_()" aria-label="Halaman sebelumnya" disabled>' +
              '<svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"></polyline></svg>' +
            '</button>' +
            '<span class="pagination-label">Page</span>' +
            '<span class="pagination-current" id="activityCurrentPage" contenteditable="true" ' +
              'onkeydown="if(event.key===\'Enter\'){activityGoToPage_(this);this.blur();event.preventDefault();}" ' +
              'onblur="activityGoToPage_(this)" ' +
              'onfocus="var r=document.createRange(),s=window.getSelection();r.selectNodeContents(this);s.removeAllRanges();s.addRange(r);">1</span>' +
            '<span class="pagination-sep">of</span>' +
            '<span class="pagination-total" id="activityTotalPages">1</span>' +
            '<button type="button" class="pagination-arrow" id="activityNextBtn" onclick="activityNextPage_()" aria-label="Halaman berikutnya" disabled>' +
              '<svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9 18 15 12 9 6"></polyline></svg>' +
            '</button>' +
          '</div>' +
          '<div class="pagination-meta">' +
            '<span class="pagination-rows-chip">' + activityPageSize + ' rows</span>' +
            '<span class="pagination-count" id="activityPaginationInfo">-</span>' +
          '</div>' +
        '</div>' +
      '</div>' +
    '</div>' +
    activityDetailModalHtml_();

  // Reset filter state setiap entry halaman (mirror pola recall:
  // filter input DOM auto-clear oleh innerHTML replace; sinkronkan
  // JS state supaya Reset link / chip badge ikut hilang).
  activityFiltersApplied = {};
  activityFiltersExpanded = false;
  activityPageNumber = 1;

  activityUpdateFilterControls_();

  // Stale-while-revalidate: render rows yang sudah di-cache (kalau ada)
  // langsung supaya tidak flash 'Memuat data...' setiap kembali ke halaman.
  // Fresh data tetap di-fetch di bawah; UI auto-update saat response masuk.
  if (activityRows && activityRows.length > 0) {
    activityRenderBody_();
  }

  activityLoadPage_();
}

/* =========================================================
   LOAD & RENDER
   ========================================================= */
function activityBuildPageCacheKey_() {
  return JSON.stringify(activityFiltersApplied || {}) + '|' + activityPageNumber;
}

function activityGetCachedPage_() {
  var key = activityBuildPageCacheKey_();
  var entry = activityPageCache[key];
  if (!entry) return null;
  if (Date.now() - entry.timestamp > ACTIVITY_PAGE_CACHE_TTL_MS) {
    delete activityPageCache[key];
    var idx = activityPageCacheOrder.indexOf(key);
    if (idx !== -1) activityPageCacheOrder.splice(idx, 1);
    return null;
  }
  return entry;
}

function activitySetCachedPage_(entry) {
  var key = activityBuildPageCacheKey_();
  activityPageCache[key] = {
    rows: entry.rows,
    totalCount: entry.totalCount,
    totalPages: entry.totalPages,
    hasNext: entry.hasNext,
    hasPrev: entry.hasPrev,
    timestamp: Date.now()
  };
  var existingIdx = activityPageCacheOrder.indexOf(key);
  if (existingIdx !== -1) activityPageCacheOrder.splice(existingIdx, 1);
  activityPageCacheOrder.push(key);
  while (activityPageCacheOrder.length > ACTIVITY_PAGE_CACHE_MAX) {
    var evictKey = activityPageCacheOrder.shift();
    delete activityPageCache[evictKey];
  }
}

function activityClearPageCache_() {
  activityPageCache = {};
  activityPageCacheOrder = [];
}

// Set visual loading state pada area pagination supaya user dapat feedback
// jelas saat round-trip ke server. Tombol prev/next + contenteditable page
// number didisable, info text jadi "Memuat...".
function activitySetPaginationLoading_(isLoading) {
  var prevBtn = document.getElementById('activityPrevBtn');
  var nextBtn = document.getElementById('activityNextBtn');
  var pageEl  = document.getElementById('activityCurrentPage');
  var infoEl  = document.getElementById('activityPaginationInfo');

  if (isLoading) {
    if (prevBtn) prevBtn.disabled = true;
    if (nextBtn) nextBtn.disabled = true;
    if (pageEl) {
      pageEl.setAttribute('contenteditable', 'false');
      pageEl.blur();
    }
    if (infoEl) infoEl.textContent = 'Memuat...';
  } else {
    if (pageEl) pageEl.setAttribute('contenteditable', 'true');
    // prev/next & info text di-restore oleh activityRenderBody_
  }
}

function activityLoadPage_() {
  if (activityLoading) return;

  // Coba serve dari cache supaya prev/next/goTo terasa instan.
  // Fresh data tetap di-fetch di belakang (stale-while-revalidate).
  var cached = activityGetCachedPage_();
  if (cached) {
    activityRows = cached.rows;
    activityTotalCount = cached.totalCount;
    activityTotalPages = cached.totalPages;
    activityHasNext = cached.hasNext;
    activityHasPrev = cached.hasPrev;
    activityRenderBody_();
  } else {
    activitySetPaginationLoading_(true);
  }

  activityLoading = true;

  var payload = Object.assign({
    session_token: getCurrentSessionToken(),
    page_number: activityPageNumber,
    page_size: activityPageSize
  }, activityFiltersApplied || {});

  google.script.run
    .withSuccessHandler(function(res) {
      activityLoading = false;
      if (!res || !res.success) {
        // Kalau tadi sudah render dari cache, jangan flash error — biarkan
        // user lihat data lama; mereka bisa retry. Toast hanya kalau benar
        // tidak ada apa pun di layar.
        if (!cached) {
          showToast(res && res.message || 'Gagal memuat aktivitas', 'error');
          activityRows = [];
          activityHasNext = false;
          activityHasPrev = false;
          activityRenderBody_();
        }
        return;
      }
      var data = res.data || {};
      activityRows = Array.isArray(data.rows) ? data.rows : [];
      activityHasNext = !!data.has_next;
      activityHasPrev = !!data.has_prev;
      activityTotalCount = Number(data.total_count || 0);
      activityTotalPages = Number(data.total_pages || 1);
      activityAllowedEntityTypes = data.allowed_entity_types || null;
      activityActiveSince = data.active_since || activityActiveSince;
      activityFiltersApplied = data.filters_applied || {};

      activitySetCachedPage_({
        rows: activityRows,
        totalCount: activityTotalCount,
        totalPages: activityTotalPages,
        hasNext: activityHasNext,
        hasPrev: activityHasPrev
      });

      activityRenderBody_();
      activitySyncEntityTypeOptions_();
      activityUpdateFilterControls_();
    })
    .withFailureHandler(function(err) {
      activityLoading = false;
      if (!cached) {
        showToast('Error: ' + ((err && err.message) || err), 'error');
        activityRenderBody_();
      }
      // Kalau ada cached, biarkan data lama tetap visible — user bisa retry.
    })
    .getAuditLogPage(payload);
}

function activityRenderBody_() {
  var tbody = document.getElementById('activityTbody');
  if (!tbody) return;

  if (!activityRows.length) {
    var emptyTitle = activityPageNumber > 1
      ? 'Halaman ini kosong'
      : 'Belum ada aktivitas';
    var emptySub = activityPageNumber > 1
      ? 'Tidak ada catatan tambahan di halaman ini'
      : 'Belum ada catatan aktivitas pada periode/filter yang dipilih';
    tbody.innerHTML =
      '<tr><td colspan="6">' +
        '<div class="patients-empty-state">' +
          '<div class="patients-empty-title">' + emptyTitle + '</div>' +
          '<div class="patients-empty-subtitle">' + emptySub + '</div>' +
        '</div>' +
      '</td></tr>';
  } else {
    tbody.innerHTML = activityRows.map(function(r) {
      return '<tr>' +
        '<td>' + activityFormatTimestamp_(r.occurred_at) + '</td>' +
        '<td>' + activityFormatEntityType_(r.entity_type) +
          '<div class="activity-entity-id">' + escapeAppHtml(r.entity_id || '') + '</div>' +
        '</td>' +
        '<td>' + activityFormatAction_(r.action) + '</td>' +
        '<td>' +
          '<div class="activity-actor-id">' + escapeAppHtml(r.actor_user_id || '') + '</div>' +
          '<div class="activity-actor-roles">' + activityFormatRoles_(r.actor_roles) + '</div>' +
        '</td>' +
        '<td class="activity-notes-cell">' + escapeAppHtml(r.notes || '') + '</td>' +
        '<td style="text-align:right">' +
          '<button type="button" class="icon-btn" onclick="activityOpenDetail_(' + Number(r.id) + ')" aria-label="Lihat detail" title="Lihat detail">' +
            '<svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7z"/></svg>' +
          '</button>' +
        '</td>' +
      '</tr>';
    }).join('');
  }

  var pageEl  = document.getElementById('activityCurrentPage');
  var totalEl = document.getElementById('activityTotalPages');
  var prevBtn = document.getElementById('activityPrevBtn');
  var nextBtn = document.getElementById('activityNextBtn');
  var infoEl  = document.getElementById('activityPaginationInfo');
  if (pageEl)  pageEl.textContent  = activityPageNumber;
  if (totalEl) totalEl.textContent = activityTotalPages;
  if (prevBtn) prevBtn.disabled = !activityHasPrev;
  if (nextBtn) nextBtn.disabled = !activityHasNext;
  if (infoEl)  infoEl.textContent  = activityTotalCount + ' records';
}

/* =========================================================
   PAGINATION
   ========================================================= */
function activityPrevPage_() {
  if (activityLoading) return;
  if (!activityHasPrev || activityPageNumber <= 1) return;
  activityPageNumber--;
  activityLoadPage_();
}

function activityNextPage_() {
  if (activityLoading) return;
  if (!activityHasNext || activityPageNumber >= activityTotalPages) return;
  activityPageNumber++;
  activityLoadPage_();
}

function activityGoToPage_(el) {
  if (activityLoading) {
    // Restore tampilan ke page number aktif supaya user tidak bingung
    if (el) el.textContent = activityPageNumber;
    return;
  }
  var raw = el ? String(el.textContent || '').trim() : '';
  var target = parseInt(raw, 10);
  if (isNaN(target) || target < 1) target = 1;
  if (target > activityTotalPages) target = activityTotalPages;
  if (el) el.textContent = target;
  if (target === activityPageNumber) return;
  activityPageNumber = target;
  activityLoadPage_();
}

/* =========================================================
   FORMAT HELPERS
   ========================================================= */
function activityFormatTimestamp_(iso) {
  if (!iso) return '-';
  var d = new Date(iso);
  if (isNaN(d.getTime())) return escapeAppHtml(String(iso));
  var pad = function(n) { return ('0' + n).slice(-2); };
  var dateStr = pad(d.getDate()) + '-' + pad(d.getMonth() + 1) + '-' + d.getFullYear();
  var timeStr = pad(d.getHours()) + ':' + pad(d.getMinutes());
  return '<div class="activity-time-main">' + dateStr + '</div>' +
         '<div class="activity-time-sub">' + timeStr + '</div>';
}

function activityFormatEntityType_(t) {
  var raw = String(t || '').trim();
  var label = ACTIVITY_ENTITY_TYPE_LABELS[raw] || (raw || '-');
  return '<span class="status-badge default">' + escapeAppHtml(label) + '</span>';
}

function activityFormatAction_(a) {
  var key = String(a || '').toLowerCase();
  var label = ACTIVITY_ACTION_LABELS[key] || key || '-';
  var className = 'status-badge default';
  if (ACTIVITY_ACTION_DANGER.indexOf(key) !== -1) {
    className = 'status-badge cancelled';
  } else if (ACTIVITY_ACTION_POSITIVE.indexOf(key) !== -1) {
    className = 'status-badge completed';
  }
  return '<span class="' + className + '">' + escapeAppHtml(label) + '</span>';
}

function activityFormatRoles_(roles) {
  if (!Array.isArray(roles) || !roles.length) return '<span style="font-style:italic">-</span>';
  return roles.map(function(r) { return escapeAppHtml(String(r || '')); }).join(', ');
}

/* =========================================================
   FILTER CONTROLS (pola recall.html)
   ========================================================= */
function activityBuildEntityTypeOptions_() {
  var list;
  if (Array.isArray(activityAllowedEntityTypes) && activityAllowedEntityTypes.length > 0) {
    list = activityAllowedEntityTypes.slice();
  } else {
    list = Object.keys(ACTIVITY_ENTITY_TYPE_LABELS);
  }
  list.sort(function(a, b) {
    var la = ACTIVITY_ENTITY_TYPE_LABELS[a] || a;
    var lb = ACTIVITY_ENTITY_TYPE_LABELS[b] || b;
    return la.localeCompare(lb);
  });
  var selected = (Array.isArray(activityFiltersApplied.entity_types) && activityFiltersApplied.entity_types.length === 1)
    ? String(activityFiltersApplied.entity_types[0])
    : '';
  return list.map(function(t) {
    var label = ACTIVITY_ENTITY_TYPE_LABELS[t] || t;
    var sel = String(selected) === String(t) ? ' selected' : '';
    return '<option value="' + escapeAppHtml(t) + '"' + sel + '>' + escapeAppHtml(label) + '</option>';
  }).join('');
}

function activityBuildActionOptions_() {
  var keys = Object.keys(ACTIVITY_ACTION_LABELS);
  keys.sort(function(a, b) {
    return (ACTIVITY_ACTION_LABELS[a] || a).localeCompare(ACTIVITY_ACTION_LABELS[b] || b);
  });
  var selected = (Array.isArray(activityFiltersApplied.actions) && activityFiltersApplied.actions.length === 1)
    ? String(activityFiltersApplied.actions[0])
    : '';
  return keys.map(function(a) {
    var label = ACTIVITY_ACTION_LABELS[a];
    var sel = String(selected) === String(a) ? ' selected' : '';
    return '<option value="' + escapeAppHtml(a) + '"' + sel + '>' + escapeAppHtml(label) + '</option>';
  }).join('');
}

function activitySyncEntityTypeOptions_() {
  var sel = document.getElementById('activityFilterEntityType');
  if (!sel) return;
  if (!Array.isArray(activityAllowedEntityTypes)) return;

  var currentValue = sel.value;
  sel.innerHTML = '<option value="">Semua entitas</option>' + activityBuildEntityTypeOptions_();
  var matched = false;
  for (var i = 0; i < sel.options.length; i++) {
    if (sel.options[i].value === currentValue) { matched = true; break; }
  }
  if (matched) sel.value = currentValue;
}

function activityGetActiveFilterCount_() {
  // Hitung filter di panel saja (date×2, entity, action). Search actor di luar.
  var startEl  = document.getElementById('activityFilterStartDate');
  var endEl    = document.getElementById('activityFilterEndDate');
  var entityEl = document.getElementById('activityFilterEntityType');
  var actionEl = document.getElementById('activityFilterAction');
  var count = 0;
  if (startEl  && String(startEl.value  || '').trim()) count++;
  if (endEl    && String(endEl.value    || '').trim()) count++;
  if (entityEl && String(entityEl.value || '').trim()) count++;
  if (actionEl && String(actionEl.value || '').trim()) count++;
  return count;
}

function activityHasActiveSearch_() {
  var searchEl = document.getElementById('activitySearchActor');
  return !!(searchEl && String(searchEl.value || '').trim());
}

function activityUpdateFilterControls_() {
  var panel    = document.getElementById('activityFiltersPanel');
  var toggleBtn = document.getElementById('activityFiltersToggleBtn');
  var resetBtn = document.getElementById('activityFiltersResetBtn');

  var activeCount = activityGetActiveFilterCount_();

  if (panel) {
    panel.classList.toggle('show', !!activityFiltersExpanded);
  }

  if (toggleBtn) {
    toggleBtn.classList.toggle('active', !!activityFiltersExpanded);
    toggleBtn.innerHTML =
      '<svg viewBox="0 0 24 24" fill="none" stroke-width="2">' +
        '<path d="M3 5h18"></path><path d="M6 12h12"></path><path d="M10 19h4"></path>' +
      '</svg>' +
      '<span class="recall-filter-chip-label">Filters</span>' +
      (activeCount > 0 ? '<span class="recall-filter-chip-count">' + activeCount + '</span>' : '');
  }

  if (resetBtn) {
    var hasAny = activeCount > 0 || activityHasActiveSearch_();
    resetBtn.style.display = hasAny ? 'inline-flex' : 'none';
  }
}

function activityToggleFilters_() {
  activityFiltersExpanded = !activityFiltersExpanded;
  activityUpdateFilterControls_();
}

function activityOnSearchInput_() {
  if (activitySearchDebounce) {
    clearTimeout(activitySearchDebounce);
  }
  // Update reset link visibility immediately
  activityUpdateFilterControls_();
  activitySearchDebounce = setTimeout(function() {
    activityApplyFilter_();
  }, ACTIVITY_SEARCH_DEBOUNCE_MS);
}

function activityApplyFilter_() {
  var startEl  = document.getElementById('activityFilterStartDate');
  var endEl    = document.getElementById('activityFilterEndDate');
  var entityEl = document.getElementById('activityFilterEntityType');
  var actionEl = document.getElementById('activityFilterAction');
  var searchEl = document.getElementById('activitySearchActor');

  var start  = startEl  ? String(startEl.value || '').trim()  : '';
  var end    = endEl    ? String(endEl.value || '').trim()    : '';
  var entity = entityEl ? String(entityEl.value || '').trim() : '';
  var action = actionEl ? String(actionEl.value || '').trim() : '';
  var actor  = searchEl ? String(searchEl.value || '').trim() : '';

  if (start && end && start > end) {
    showToast('Tanggal mulai tidak boleh lebih besar dari tanggal akhir', 'error');
    return;
  }

  activityFiltersApplied = {
    start_date:     start || null,
    end_date:       end || null,
    entity_types:   entity ? [entity] : [],
    actions:        action ? [action] : [],
    actor_search:   actor || null
  };
  activityPageNumber = 1;
  activityClearPageCache_();
  activityUpdateFilterControls_();
  activityLoadPage_();
}

function activityResetFilter_() {
  activityFiltersApplied = {};
  activityPageNumber = 1;
  activityClearPageCache_();

  var ids = ['activityFilterStartDate', 'activityFilterEndDate', 'activityFilterEntityType',
             'activityFilterAction', 'activitySearchActor'];
  ids.forEach(function(id) {
    var el = document.getElementById(id);
    if (el) el.value = '';
  });

  activityUpdateFilterControls_();
  activityLoadPage_();
}

/* =========================================================
   DETAIL MODAL + DIFF HIGHLIGHT
   ========================================================= */
function activityDetailModalHtml_() {
  return '<div id="activityDetailModal" class="modal hidden">' +
    '<div class="modal-box modal-box-sticky detail-modal-box-sticky">' +
      '<div class="detail-modal-header-sticky">' +
        '<h2 class="detail-modal-title-sticky">Detail Aktivitas</h2>' +
        '<button type="button" class="detail-close-btn" onclick="activityCloseDetail_()" aria-label="Tutup modal detail aktivitas" title="Tutup">' +
          '<svg viewBox="0 0 24 24" fill="none" stroke-width="2">' +
            '<path d="M6 6l12 12"></path>' +
            '<path d="M18 6l-12 12"></path>' +
          '</svg>' +
        '</button>' +
      '</div>' +
      '<div class="detail-modal-content-scroll">' +
        '<dl class="activity-detail-info">' +
          '<dt>Waktu</dt><dd id="activityDetailWhen">-</dd>' +
          '<dt>Entitas</dt><dd id="activityDetailEntity">-</dd>' +
          '<dt>Aksi</dt><dd id="activityDetailAction">-</dd>' +
          '<dt>Aktor</dt><dd id="activityDetailActor">-</dd>' +
          '<dt>Catatan</dt><dd id="activityDetailNotes" class="activity-notes">-</dd>' +
        '</dl>' +
        '<div id="activityDetailDiff"></div>' +
        '<div class="modal-actions modal-actions-right">' +
          '<button type="button" class="btn btn-secondary" onclick="activityCloseDetail_()">Tutup</button>' +
        '</div>' +
      '</div>' +
    '</div>' +
  '</div>';
}

function activityOpenDetail_(id) {
  var row = (activityRows || []).find(function(r) { return Number(r.id) === Number(id); });
  if (!row) {
    showToast('Data tidak ditemukan di halaman ini', 'error');
    return;
  }
  var modal = document.getElementById('activityDetailModal');
  if (!modal) return;

  var whenEl   = document.getElementById('activityDetailWhen');
  var entityEl = document.getElementById('activityDetailEntity');
  var actionEl = document.getElementById('activityDetailAction');
  var actorEl  = document.getElementById('activityDetailActor');
  var notesEl  = document.getElementById('activityDetailNotes');
  var diffEl   = document.getElementById('activityDetailDiff');

  if (whenEl) whenEl.textContent = activityFormatTimestampLong_(row.occurred_at);
  if (entityEl) {
    var entityLabel = ACTIVITY_ENTITY_TYPE_LABELS[String(row.entity_type || '')] || String(row.entity_type || '-');
    entityEl.innerHTML =
      '<span class="status-badge default">' + escapeAppHtml(entityLabel) + '</span>' +
      ' <span class="activity-entity-id" style="display:inline;margin-left:8px">' + escapeAppHtml(String(row.entity_id || '')) + '</span>';
  }
  if (actionEl) actionEl.innerHTML = activityFormatAction_(row.action);
  if (actorEl) {
    actorEl.innerHTML =
      escapeAppHtml(String(row.actor_user_id || '-')) +
      ' <span style="color:#64748b">(' + escapeAppHtml(activityFormatRolesPlain_(row.actor_roles)) + ')</span>';
  }
  if (notesEl) notesEl.textContent = row.notes || '-';
  if (diffEl) diffEl.innerHTML = activityRenderDiff_(row.old_value, row.new_value);

  modal.style.display = 'flex';
  modal.classList.remove('hidden');
}

function activityCloseDetail_() {
  var modal = document.getElementById('activityDetailModal');
  if (modal) {
    modal.classList.add('hidden');
    modal.style.display = 'none';
  }
}

function activityFormatTimestampLong_(iso) {
  if (!iso) return '-';
  var d = new Date(iso);
  if (isNaN(d.getTime())) return String(iso);
  var pad = function(n) { return ('0' + n).slice(-2); };
  return pad(d.getDate()) + '-' + pad(d.getMonth() + 1) + '-' + d.getFullYear() + ' ' +
    pad(d.getHours()) + ':' + pad(d.getMinutes()) + ':' + pad(d.getSeconds());
}

function activityFormatRolesPlain_(roles) {
  if (!Array.isArray(roles) || !roles.length) return '-';
  return roles.map(function(r) { return String(r || ''); }).join(', ');
}

// Field timestamp yang ditampilkan dalam format readable (DD-MM-YYYY HH:MM:SS)
// di diff table, alih-alih ISO string mentah.
var ACTIVITY_TIMESTAMP_FIELDS = {
  updated_at: true,
  created_at: true,
  occurred_at: true,
  deleted_at: true,
  cancelled_at: true,
  deactivated_at: true,
  completed_at: true
};

function activityIsTimestampField_(key) {
  return ACTIVITY_TIMESTAMP_FIELDS[key] === true;
}

function activityComputeDiffStatus_(k, oldData, newData, isCreate, isDelete) {
  var hasOld = Object.prototype.hasOwnProperty.call(oldData, k);
  var hasNew = Object.prototype.hasOwnProperty.call(newData, k);
  if (isCreate) return 'created';
  if (isDelete) return 'deleted';
  if (!hasOld && hasNew) return 'added';
  if (hasOld && !hasNew) return 'removed';
  if (hasOld && hasNew) {
    var os = JSON.stringify(oldData[k]);
    var ns = JSON.stringify(newData[k]);
    return (os !== ns) ? 'changed' : 'unchanged';
  }
  return 'unchanged';
}

function activityRenderDiff_(oldObj, newObj) {
  var isCreate = (oldObj === null || oldObj === undefined);
  var isDelete = (newObj === null || newObj === undefined);

  var oldData = (oldObj && typeof oldObj === 'object') ? oldObj : {};
  var newData = (newObj && typeof newObj === 'object') ? newObj : {};

  var keySet = {};
  Object.keys(oldData).forEach(function(k) { keySet[k] = true; });
  Object.keys(newData).forEach(function(k) { keySet[k] = true; });
  var allKeys = Object.keys(keySet).sort();

  // Untuk UPDATE: hanya tampilkan field yang berubah (changed/added/removed)
  // supaya owner fokus pada perubahan saja. updated_at otomatis ikut karena
  // selalu berubah saat mutasi.
  // Untuk CREATE/DELETE: tampilkan semua field (snapshot lengkap entry).
  var keys;
  if (isCreate || isDelete) {
    keys = allKeys;
  } else {
    keys = allKeys.filter(function(k) {
      var st = activityComputeDiffStatus_(k, oldData, newData, false, false);
      return st === 'changed' || st === 'added' || st === 'removed';
    });
  }

  if (keys.length === 0) {
    if (isCreate || isDelete) {
      return '<div class="activity-diff-empty">Tidak ada data old/new yang tersedia untuk entri ini.</div>';
    }
    return '<div class="activity-diff-empty">Tidak ada field yang berubah pada entri ini.</div>';
  }

  var beforeClass = isCreate ? 'activity-header-color-muted' : 'activity-header-color-before';
  var afterClass  = isDelete ? 'activity-header-color-muted' : 'activity-header-color-after';
  var beforeLabel = isCreate ? '(tidak ada — entry baru)' : 'Sebelum';
  var afterLabel  = isDelete ? '(tidak ada — entry dihapus)' : 'Sesudah';

  var headerHtml =
    '<div class="activity-diff-header">' +
      '<div>Field</div>' +
      '<div class="' + beforeClass + '">' + beforeLabel + '</div>' +
      '<div class="' + afterClass + '">' + afterLabel + '</div>' +
    '</div>';

  var rowsHtml = keys.map(function(k) {
    var hasOld = Object.prototype.hasOwnProperty.call(oldData, k);
    var hasNew = Object.prototype.hasOwnProperty.call(newData, k);
    var oldVal = hasOld ? oldData[k] : undefined;
    var newVal = hasNew ? newData[k] : undefined;

    var status = activityComputeDiffStatus_(k, oldData, newData, isCreate, isDelete);

    var oldClass = 'activity-diff-cell-neutral';
    var newClass = 'activity-diff-cell-neutral';
    if (status === 'created' || status === 'added') {
      newClass = 'activity-diff-cell-added';
    } else if (status === 'deleted' || status === 'removed') {
      oldClass = 'activity-diff-cell-removed';
    } else if (status === 'changed') {
      oldClass = 'activity-diff-cell-changed';
      newClass = 'activity-diff-cell-changed';
    }

    return '<div class="activity-diff-row">' +
      '<div class="activity-diff-field">' + escapeAppHtml(k) + '</div>' +
      '<div class="activity-diff-value ' + oldClass + '">' + activityFormatDiffValue_(oldVal, hasOld, k) + '</div>' +
      '<div class="activity-diff-value ' + newClass + '">' + activityFormatDiffValue_(newVal, hasNew, k) + '</div>' +
    '</div>';
  }).join('');

  return '<div class="activity-diff">' + headerHtml + rowsHtml + '</div>';
}

function activityFormatDiffValue_(v, hasIt, fieldKey) {
  if (!hasIt) return '<span class="activity-diff-value-muted">(tidak ada)</span>';
  if (v === null) return '<span class="activity-diff-value-muted">null</span>';
  if (v === undefined) return '<span class="activity-diff-value-muted">undefined</span>';

  // Field timestamp tertentu (updated_at, created_at, dll) ditampilkan dalam
  // format readable DD-MM-YYYY HH:MM:SS — bukan ISO string mentah — supaya
  // owner tidak harus parse manual.
  if (fieldKey && activityIsTimestampField_(fieldKey) &&
      (typeof v === 'string' || typeof v === 'number')) {
    var formatted = activityFormatTimestampLong_(v);
    if (formatted && formatted !== '-' && formatted !== String(v)) {
      return escapeAppHtml(formatted);
    }
  }

  if (typeof v === 'object') {
    try {
      return escapeAppHtml(JSON.stringify(v, null, 2));
    } catch (e) {
      return escapeAppHtml(String(v));
    }
  }
  if (v === '') return '<span class="activity-diff-value-muted">(kosong)</span>';
  return escapeAppHtml(String(v));
}
</script>
