<script>
/* =========================================================
   AUDIT LOG (AKTIVITAS) PAGE — STATE
   ========================================================= */
var activityRows = [];
var activityPageNumber = 1;
var activityPageSize = 50;
var activityHasNext = false;
var activityHasPrev = false;
var activityAllowedEntityTypes = null;
var activityActiveSince = '2026-05-19';
var activityFiltersApplied = {};
var activityLoading = false;

var ACTIVITY_ENTITY_TYPE_LABELS = {
  patient:                   'Pasien',
  appointment:               'Appointment',
  treatment:                 'Treatment',
  ortho_recall:              'Recall Ortho',
  billing:                   'Tagihan',
  billing_adjustment:        'Diskon Tagihan',
  payment:                   'Pembayaran',
  billing_installment_plan:  'Plan Cicilan',
  billing_invoice:           'Invoice',
  billing_feedback:          'Feedback Pasien',
  expense:                   'Pengeluaran',
  doctor_compensation_rule:  'Aturan Fee Dokter',
  doctor_material_deduction: 'Deduksi Material',
  service_catalog:           'Katalog Layanan',
  clinic_info:               'Info Klinik',
  user:                      'Pengguna'
};

var ACTIVITY_ACTION_LABELS = {
  create:                'Tambah',
  update:                'Ubah',
  delete:                'Hapus',
  deactivate:            'Nonaktifkan',
  activate:              'Aktifkan',
  cancel:                'Batalkan',
  restore:               'Pulihkan',
  complete:              'Selesaikan',
  submit:                'Kirim',
  replace:               'Ganti',
  clear:                 'Bersihkan',
  save_contact:          'Simpan Kontak',
  confirm_doctor_fee:    'Konfirmasi Fee',
  generate_totp:         'Setup TOTP',
  reset_totp:            'Reset TOTP',
  disable_totp:          'Disable TOTP',
  send_totp_setup_email: 'Kirim Email TOTP',
  generate_pdf:          'Buat PDF',
  send_email:            'Kirim Email'
};

var ACTIVITY_ACTION_DANGER = ['delete', 'deactivate', 'cancel', 'disable_totp', 'clear'];
var ACTIVITY_ACTION_POSITIVE = ['create', 'activate', 'restore', 'complete', 'submit'];

/* =========================================================
   ENTRY POINT
   ========================================================= */
function showActivityPage() {
  document.querySelectorAll('.sidebar-menu').forEach(function(b) { b.classList.remove('active'); });
  var btn = document.getElementById('menuActivity');
  if (btn) btn.classList.add('active');

  var contentArea = document.getElementById('contentArea');
  if (!contentArea) return;

  contentArea.innerHTML =
    '<div class="settings-shell">' +
      '<div class="settings-header">' +
        '<div class="owner-eyebrow">Aktivitas</div>' +
        '<h1 class="owner-title">Log Aktivitas Sistem</h1>' +
        '<div class="owner-subtitle">Rekam jejak perubahan data oleh seluruh pengguna staff klinik</div>' +
      '</div>' +

      '<div id="activityBanner" style="margin:0 0 16px;padding:10px 14px;background:#eff6ff;border:1px solid #bfdbfe;border-radius:8px;font-size:12px;color:#1e40af;line-height:1.5">' +
        '<strong>Catatan:</strong> Audit log mulai aktif sejak <strong>' + escapeAppHtml(activityActiveSince) + '</strong>. Perubahan sebelum tanggal tersebut tidak tercatat di halaman ini.' +
      '</div>' +

      '<div id="activityFilterArea" style="margin:0 0 12px"></div>' +

      '<div class="table-wrapper"><table class="table" style="table-layout:fixed;width:100%">' +
        '<thead><tr>' +
          '<th style="width:15%">Waktu</th>' +
          '<th style="width:14%">Entitas</th>' +
          '<th style="width:13%">Aksi</th>' +
          '<th style="width:20%">Aktor</th>' +
          '<th style="width:30%">Catatan</th>' +
          '<th style="width:8%;text-align:right">Detail</th>' +
        '</tr></thead>' +
        '<tbody id="activityTbody">' +
          '<tr><td colspan="6">' +
            '<div class="settings-empty-state">' +
              '<div class="settings-empty-state-title">Memuat aktivitas...</div>' +
            '</div>' +
          '</td></tr>' +
        '</tbody>' +
      '</table></div>' +

      '<div class="pagination">' +
        '<div class="pagination-nav">' +
          '<button type="button" class="pagination-arrow" id="activityPrevBtn" onclick="activityPrevPage_()" aria-label="Halaman sebelumnya" disabled>' +
            '<svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"></polyline></svg>' +
          '</button>' +
          '<span class="pagination-label">Page</span>' +
          '<span class="pagination-current" id="activityCurrentPage">1</span>' +
          '<button type="button" class="pagination-arrow" id="activityNextBtn" onclick="activityNextPage_()" aria-label="Halaman berikutnya" disabled>' +
            '<svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9 18 15 12 9 6"></polyline></svg>' +
          '</button>' +
        '</div>' +
        '<div class="pagination-meta">' +
          '<span class="pagination-rows-chip">' + activityPageSize + ' rows</span>' +
          '<span class="pagination-count" id="activityPaginationInfo">-</span>' +
        '</div>' +
      '</div>' +
    '</div>';

  activityPageNumber = 1;
  activityLoadPage_();
}

/* =========================================================
   LOAD & RENDER
   ========================================================= */
function activityLoadPage_() {
  if (activityLoading) return;
  activityLoading = true;

  var payload = Object.assign({
    session_token: getCurrentSessionToken(),
    page_number: activityPageNumber,
    page_size: activityPageSize
  }, activityFiltersApplied || {});

  google.script.run
    .withSuccessHandler(function(res) {
      activityLoading = false;
      if (!res || !res.success) {
        showToast(res && res.message || 'Gagal memuat aktivitas', 'error');
        activityRows = [];
        activityHasNext = false;
        activityHasPrev = false;
        activityRenderBody_();
        return;
      }
      var data = res.data || {};
      activityRows = Array.isArray(data.rows) ? data.rows : [];
      activityHasNext = !!data.has_next;
      activityHasPrev = !!data.has_prev;
      activityAllowedEntityTypes = data.allowed_entity_types || null;
      activityActiveSince = data.active_since || activityActiveSince;
      activityFiltersApplied = data.filters_applied || {};
      activityRenderBody_();
    })
    .withFailureHandler(function(err) {
      activityLoading = false;
      showToast('Error: ' + ((err && err.message) || err), 'error');
    })
    .getAuditLogPage(payload);
}

function activityRenderBody_() {
  var tbody = document.getElementById('activityTbody');
  if (!tbody) return;

  if (!activityRows.length) {
    var emptyTitle = activityPageNumber > 1
      ? 'Halaman ini kosong'
      : 'Belum ada aktivitas';
    var emptySub = activityPageNumber > 1
      ? 'Tidak ada catatan tambahan di halaman ini'
      : 'Belum ada catatan aktivitas pada periode/filter yang dipilih';
    tbody.innerHTML =
      '<tr><td colspan="6">' +
        '<div class="settings-empty-state">' +
          '<div class="settings-empty-state-title">' + emptyTitle + '</div>' +
          '<div class="settings-empty-state-subtitle">' + emptySub + '</div>' +
        '</div>' +
      '</td></tr>';
  } else {
    tbody.innerHTML = activityRows.map(function(r) {
      return '<tr>' +
        '<td style="font-size:11.5px;color:#475569">' + activityFormatTimestamp_(r.occurred_at) + '</td>' +
        '<td>' + activityFormatEntityType_(r.entity_type) +
          '<div style="font-size:10.5px;color:#94a3b8;word-break:break-all;margin-top:2px">' + escapeAppHtml(r.entity_id || '') + '</div>' +
        '</td>' +
        '<td>' + activityFormatAction_(r.action) + '</td>' +
        '<td style="font-size:11.5px">' +
          '<div style="color:#1e293b">' + escapeAppHtml(r.actor_user_id || '') + '</div>' +
          '<div style="font-size:10.5px;color:#94a3b8;margin-top:2px">' + activityFormatRoles_(r.actor_roles) + '</div>' +
        '</td>' +
        '<td style="font-size:11.5px;color:#475569;word-break:break-word">' + escapeAppHtml(r.notes || '') + '</td>' +
        '<td style="text-align:right">' +
          '<button type="button" class="icon-btn" onclick="activityOpenDetail_(' + Number(r.id) + ')" aria-label="Lihat detail" title="Lihat detail">' +
            '<svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7z"/></svg>' +
          '</button>' +
        '</td>' +
      '</tr>';
    }).join('');
  }

  var pageEl = document.getElementById('activityCurrentPage');
  var prevBtn = document.getElementById('activityPrevBtn');
  var nextBtn = document.getElementById('activityNextBtn');
  var infoEl = document.getElementById('activityPaginationInfo');
  if (pageEl) pageEl.textContent = activityPageNumber;
  if (prevBtn) prevBtn.disabled = !activityHasPrev;
  if (nextBtn) nextBtn.disabled = !activityHasNext;
  if (infoEl) infoEl.textContent = activityRows.length + ' rows on this page';
}

/* =========================================================
   PAGINATION
   ========================================================= */
function activityPrevPage_() {
  if (activityPageNumber > 1) {
    activityPageNumber--;
    activityLoadPage_();
  }
}

function activityNextPage_() {
  if (activityHasNext) {
    activityPageNumber++;
    activityLoadPage_();
  }
}

/* =========================================================
   FORMAT HELPERS
   ========================================================= */
function activityFormatTimestamp_(iso) {
  if (!iso) return '-';
  var d = new Date(iso);
  if (isNaN(d.getTime())) return escapeAppHtml(String(iso));
  var dd = String(d.getDate()).padStart(2, '0');
  var mm = String(d.getMonth() + 1).padStart(2, '0');
  var yy = d.getFullYear();
  var hh = String(d.getHours()).padStart(2, '0');
  var mi = String(d.getMinutes()).padStart(2, '0');
  return dd + '/' + mm + '/' + yy + '<br><span style="color:#94a3b8;font-size:10.5px">' + hh + ':' + mi + '</span>';
}

function activityFormatEntityType_(t) {
  var raw = String(t || '').trim();
  var label = ACTIVITY_ENTITY_TYPE_LABELS[raw] || (raw || '-');
  return '<span class="settings-badge" style="font-size:11px">' + escapeAppHtml(label) + '</span>';
}

function activityFormatAction_(a) {
  var key = String(a || '').toLowerCase();
  var label = ACTIVITY_ACTION_LABELS[key] || key || '-';
  var className = 'settings-badge';
  if (ACTIVITY_ACTION_DANGER.indexOf(key) !== -1) {
    className = 'settings-badge settings-badge-inactive';
  } else if (ACTIVITY_ACTION_POSITIVE.indexOf(key) !== -1) {
    className = 'settings-badge settings-badge-active';
  }
  return '<span class="' + className + '" style="font-size:11px">' + escapeAppHtml(label) + '</span>';
}

function activityFormatRoles_(roles) {
  if (!Array.isArray(roles) || !roles.length) {
    return '<span style="font-style:italic">-</span>';
  }
  return roles.map(function(r) { return escapeAppHtml(String(r || '')); }).join(', ');
}

/* =========================================================
   DETAIL (placeholder — diisi di P3c.5)
   ========================================================= */
function activityOpenDetail_(id) {
  showToast('Detail row #' + id + ' akan tersedia di P3c.5', 'info');
}
</script>
