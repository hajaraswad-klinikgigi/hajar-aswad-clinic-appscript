<script>
/* =========================================================
   AUDIT LOG (AKTIVITAS) PAGE — STATE

   Pola: client-side pagination (konsisten dengan Patients/Recall).
   Backend kirim semua row sesuai filter (max activityCapLimit),
   client paginate via array.slice() supaya navigasi INSTAN.

   Race-condition handling — sinkron dengan Dashboard/Finance
   (commit 22662b5): request token discard stale response saat user
   rapid switch period/filter; cache TTL 5 menit per (period+filter)
   supaya freshness OK tanpa over-refetch; period selector NEVER
   locked supaya rapid switch tetap responsif.

   activityAllRows  = hasil mentah dari backend (≤ cap)
   activityFilteredRows = sama dengan allRows untuk now (semua filter
                          server-side). Disiapkan kalau nanti ada
                          filter client-side tambahan.
   ========================================================= */
let activityAllRows = [];
let activityFilteredRows = [];
let activityCurrentPage = 1;
const activityPageSize = 5;
let activityCapLimit = 2000;
let activityHitCap = false;
let activityAllowedEntityTypes = null;
let activityActiveSince = '2026-05-19';
let activityPeriod = '7days';                          // primary scope, tidak di-reset Reset link
let activityFiltersApplied = {};
let activityFiltersExpanded = false;
let activitySearchDebounce = null;
const ACTIVITY_SEARCH_DEBOUNCE_MS = 220;
// Sinkron dengan AUDIT_LOG_VALID_PERIODS di AuditLogQueryService.js.
// Frontend whitelist mencegah call ke backend dengan value invalid.
const ACTIVITY_VALID_PERIODS = { today: true, '7days': true, '30days': true };
const ACTIVITY_DEFAULT_PERIOD = '7days';
// Race condition handling — konsisten dengan Dashboard/Finance
// (commit 22662b5). Request token discard stale response saat rapid
// switch period/filter. Cache per (period+entity+action) dengan TTL
// 5 menit supaya owner lihat data segar tapi tidak refetch berulang.
let activityRequestToken = 0;
let activityCache = {};
const ACTIVITY_CACHE_TTL_MS = 5 * 60 * 1000;

var ACTIVITY_ENTITY_TYPE_LABELS = {
  patient:                   'Pasien',
  appointment:               'Appointment',
  treatment:                 'Treatment',
  ortho_recall:              'Recall Ortho',
  billing:                   'Tagihan',
  billing_adjustment:        'Diskon Tagihan',
  payment:                   'Pembayaran',
  billing_installment_plan:  'Plan Cicilan',
  billing_invoice:           'Invoice',
  billing_feedback:          'Feedback Pasien',
  expense:                   'Pengeluaran',
  doctor_compensation_rule:  'Aturan Fee Dokter',
  doctor_material_deduction: 'Deduksi Material',
  service_catalog:           'Katalog Layanan',
  clinic_info:               'Info Klinik',
  user:                      'Pengguna'
};

var ACTIVITY_ACTION_LABELS = {
  create:                'Tambah',
  update:                'Ubah',
  delete:                'Hapus',
  deactivate:            'Nonaktifkan',
  activate:              'Aktifkan',
  cancel:                'Batalkan',
  restore:               'Pulihkan',
  complete:              'Selesaikan',
  submit:                'Kirim',
  replace:               'Ganti',
  clear:                 'Bersihkan',
  save_contact:          'Simpan Kontak',
  confirm_doctor_fee:    'Konfirmasi Fee',
  generate_totp:         'Setup TOTP',
  reset_totp:            'Reset TOTP',
  disable_totp:          'Disable TOTP',
  send_totp_setup_email: 'Kirim Email TOTP',
  generate_pdf:          'Buat PDF',
  send_email:            'Kirim Email'
};

var ACTIVITY_ACTION_DANGER = ['delete', 'deactivate', 'cancel', 'disable_totp', 'clear'];
var ACTIVITY_ACTION_POSITIVE = ['create', 'activate', 'restore', 'complete', 'submit'];

/* =========================================================
   ENTRY POINT
   ========================================================= */
function showActivityPage() {
  document.querySelectorAll('.sidebar-menu').forEach(function(b) { b.classList.remove('active'); });
  var btn = document.getElementById('menuActivity');
  if (btn) btn.classList.add('active');

  var contentArea = document.getElementById('contentArea');
  if (!contentArea) return;

  contentArea.innerHTML =
    '<div class="patients-shell">' +
      '<div class="patients-header">' +
        '<div>' +
          '<div class="patients-eyebrow">Aktivitas</div>' +
          '<h1 class="patients-title">Log Aktivitas Sistem</h1>' +
          '<div class="patients-subtitle">Rekam jejak perubahan data oleh seluruh pengguna staff klinik</div>' +
        '</div>' +
      '</div>' +

      '<div class="content-card patients-toolbar-card">' +
        '<div class="recall-toolbar">' +
          '<div class="recall-toolbar-main">' +
            '<div class="patients-search-wrap recall-search-wrap">' +
              '<label class="patients-toolbar-label">Cari Pengguna</label>' +
              '<input type="text" id="activitySearchActor" class="search-box" ' +
                'placeholder="Cari nama / username pengguna..." ' +
                'oninput="handleActivitySearch()">' +
            '</div>' +
            '<div class="activity-toolbar-period-wrap">' +
              '<label class="patients-toolbar-label" for="activityPeriodSelect">Periode</label>' +
              '<select id="activityPeriodSelect" onchange="changeActivityPeriod(this)">' +
                '<option value="today">Hari Ini</option>' +
                '<option value="7days" selected>7 Hari</option>' +
                '<option value="30days">30 Hari</option>' +
              '</select>' +
            '</div>' +
            '<div class="recall-toolbar-actions">' +
              '<button type="button" id="activityFiltersToggleBtn" class="recall-filter-chip" ' +
                'onclick="toggleActivityFilters()" aria-label="Toggle filters" title="Filters">' +
                '<svg viewBox="0 0 24 24" fill="none" stroke-width="2">' +
                  '<path d="M3 5h18"></path><path d="M6 12h12"></path><path d="M10 19h4"></path>' +
                '</svg>' +
                '<span class="recall-filter-chip-label">Filters</span>' +
              '</button>' +
              '<button type="button" id="activityFiltersResetBtn" class="recall-reset-link" ' +
                'onclick="resetActivityFilters()" style="display:none;">Reset</button>' +
            '</div>' +
          '</div>' +
          '<div id="activityFiltersPanel" class="recall-filter-panel">' +
            '<div class="recall-filter-grid">' +
              '<div class="recall-filter-wrap">' +
                '<label class="patients-toolbar-label">Entitas</label>' +
                '<select id="activityFilterEntityType" onchange="applyActivityFilters()">' +
                  '<option value="">Semua entitas</option>' +
                  buildActivityEntityTypeOptions() +
                '</select>' +
              '</div>' +
              '<div class="recall-filter-wrap">' +
                '<label class="patients-toolbar-label">Aksi</label>' +
                '<select id="activityFilterAction" onchange="applyActivityFilters()">' +
                  '<option value="">Semua aksi</option>' +
                  buildActivityActionOptions() +
                '</select>' +
              '</div>' +
            '</div>' +
          '</div>' +
        '</div>' +
      '</div>' +

      '<div class="content-card">' +
        '<div id="activityCapBanner" style="display:none"></div>' +
        '<div class="table-wrapper"><table class="table" style="table-layout:fixed;width:100%">' +
          '<thead><tr>' +
            '<th style="width:20%">Aktor</th>' +
            '<th style="width:15%">Waktu</th>' +
            '<th style="width:13%">Aksi</th>' +
            '<th style="width:14%">Entitas</th>' +
            '<th style="width:30%">Catatan</th>' +
            '<th style="width:8%;text-align:right">Detail</th>' +
          '</tr></thead>' +
          '<tbody id="activityTableBody">' +
            '<tr><td colspan="6">Memuat data...</td></tr>' +
          '</tbody>' +
        '</table></div>' +

        '<div class="pagination">' +
          '<div class="pagination-nav">' +
            '<button type="button" class="pagination-arrow" id="activityPrevBtn" onclick="prevActivityPage()" aria-label="Halaman sebelumnya" disabled>' +
              '<svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"></polyline></svg>' +
            '</button>' +
            '<span class="pagination-label">Page</span>' +
            '<span class="pagination-current" id="activityCurrentPage" contenteditable="true" ' +
              'onkeydown="if(event.key===\'Enter\'){goToActivityPage(this);this.blur();event.preventDefault();}" ' +
              'onblur="goToActivityPage(this)" ' +
              'onfocus="var r=document.createRange(),s=window.getSelection();r.selectNodeContents(this);s.removeAllRanges();s.addRange(r);">1</span>' +
            '<span class="pagination-sep">of</span>' +
            '<span class="pagination-total" id="activityTotalPages">1</span>' +
            '<button type="button" class="pagination-arrow" id="activityNextBtn" onclick="nextActivityPage()" aria-label="Halaman berikutnya" disabled>' +
              '<svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9 18 15 12 9 6"></polyline></svg>' +
            '</button>' +
          '</div>' +
          '<div class="pagination-meta">' +
            '<span class="pagination-rows-chip">' + activityPageSize + ' rows</span>' +
            '<span class="pagination-count" id="activityPaginationInfo">-</span>' +
          '</div>' +
        '</div>' +
      '</div>' +
    '</div>' +
    getActivityDetailModalHtml();

  // Reset filter state setiap entry halaman (mirror pola recall:
  // filter input DOM auto-clear oleh innerHTML replace; sinkronkan
  // JS state supaya Reset link / chip badge ikut hilang).
  activityFiltersApplied = {};
  activityFiltersExpanded = false;
  activityCurrentPage = 1;
  // Period: reset ke default tiap entry — konsisten dengan template
  // option `selected` di markup. Owner masuk halaman, dropdown selalu
  // mulai dari "7 Hari".
  activityPeriod = ACTIVITY_DEFAULT_PERIOD;
  var periodSel = document.getElementById('activityPeriodSelect');
  if (periodSel) periodSel.value = activityPeriod;

  updateActivityFilterControls();

  // Stale-while-revalidate: render rows yang sudah di-cache (kalau ada)
  // langsung supaya tidak flash 'Memuat data...' setiap kembali ke halaman.
  // Fresh data tetap di-fetch di bawah; UI auto-update saat response masuk.
  if (activityAllRows && activityAllRows.length > 0) {
    activityFilteredRows = activityAllRows.slice();
    renderActivityCapBanner();
    renderActivityTable();
  }

  loadActivity();
}

/* =========================================================
   LOAD & RENDER

   Pola CANONICAL Patients/Recall: fetch sekali, simpan di
   activityAllRows, paginate via array.slice() → INSTAN.
   Filter panel (date/entity/action) trigger fetch ulang ke backend
   karena affect query scope. Search aktor: client-side substring
   match di _search_text → INSTAN, no fetch.
   ========================================================= */

// Set visual loading state pada area tabel + pagination saat fetch
// ke server (initial load tanpa cache). Pagination CLIENT-SIDE tidak
// trigger ini — navigasi prev/next/goTo instan.
// PERIOD selector & filter panel select TIDAK pernah di-lock — rapid
// switch tetap responsif, race condition di-handle via request token
// (sama pola Dashboard/Finance commit 22662b5).
// Konsisten dengan Patients: pagination count tetap menampilkan nilai
// sebelumnya (atau '-' default) — TIDAK di-override jadi 'Memuat...'.
function setActivityListLoading(isLoading) {
  var prevBtn = document.getElementById('activityPrevBtn');
  var nextBtn = document.getElementById('activityNextBtn');
  var pageEl  = document.getElementById('activityCurrentPage');
  var tbody   = document.getElementById('activityTableBody');

  if (isLoading) {
    if (prevBtn) prevBtn.disabled = true;
    if (nextBtn) nextBtn.disabled = true;
    if (pageEl) {
      pageEl.setAttribute('contenteditable', 'false');
      pageEl.blur();
    }
    if (tbody) tbody.classList.add('activity-table-loading');
  } else {
    if (pageEl) pageEl.setAttribute('contenteditable', 'true');
    if (tbody) tbody.classList.remove('activity-table-loading');
    // prev/next & info text di-restore oleh renderActivityTable
  }
}

// Build cache key dari (period + filter panel state). Sort array supaya
// urutan tidak menghasilkan key berbeda untuk filter set yang sama.
function buildActivityCacheKey_(period, filters) {
  var f = filters || {};
  var entities = Array.isArray(f.entity_types) ? f.entity_types.slice().sort() : [];
  var actions  = Array.isArray(f.actions)      ? f.actions.slice().sort()      : [];
  return JSON.stringify({ p: period, e: entities, a: actions });
}

function getActivityCached_(key) {
  var entry = activityCache[key];
  if (!entry) return null;
  if (Date.now() - entry.timestamp > ACTIVITY_CACHE_TTL_MS) {
    delete activityCache[key];
    return null;
  }
  return entry.data;
}

function setActivityCached_(key, res) {
  activityCache[key] = { data: res, timestamp: Date.now() };
}

function loadActivity() {
  var period = activityPeriod;
  var filters = activityFiltersApplied || {};
  var cacheKey = buildActivityCacheKey_(period, filters);

  // Increment token — handler yang in-flight dengan token lama akan
  // discard hasilnya (race condition fix saat rapid period/filter switch).
  // Konsisten dengan Dashboard/Finance (commit 22662b5).
  var myToken = ++activityRequestToken;
  var cached = getActivityCached_(cacheKey);

  // Defensive cleanup: kalau ada stale loading state dari request lama
  // yang sudah ter-discard, unlock UI di awal. Idempotent kalau tidak ada.
  setActivityListLoading(false);

  if (cached) {
    // Stale-while-revalidate: render cache instan, lalu refetch background.
    applyActivityResponse_(cached);
  } else if (!activityAllRows || activityAllRows.length === 0) {
    // Initial load tanpa fallback data — show loading state.
    setActivityListLoading(true);
  }
  // else: tidak ada cache untuk key ini tapi ada data lama dari key lain —
  // biarkan tampil sebagai fallback sampai response baru masuk.

  var payload = attachAuthContext(Object.assign(
    {},
    filters,
    { period: period }
  ));

  google.script.run
    .withSuccessHandler(function(res) {
      // Discard kalau token sudah berubah (user pindah period/filter dulu).
      if (myToken !== activityRequestToken) return;
      setActivityListLoading(false);
      if (!res || !res.success) {
        showToast(res && res.message || 'Gagal memuat aktivitas', 'error');
        // Pertahankan cached data kalau ada — jangan kosongkan UI
        // karena background fetch gagal. Konsisten dengan Dashboard.
        if (!cached) {
          activityAllRows = [];
          activityFilteredRows = [];
          activityHitCap = false;
          renderActivityCapBanner();
          renderActivityTable();
        }
        return;
      }
      setActivityCached_(cacheKey, res);
      applyActivityResponse_(res);
    })
    .withFailureHandler(function(err) {
      if (myToken !== activityRequestToken) return;
      setActivityListLoading(false);
      showToast('Error: ' + ((err && err.message) || err), 'error');
      if (!cached) {
        activityAllRows = [];
        activityFilteredRows = [];
        activityHitCap = false;
        renderActivityCapBanner();
        renderActivityTable();
      }
    })
    .getAuditLogList(payload);
}

function applyActivityResponse_(res) {
  var data = res.data || {};
  var rawRows = Array.isArray(data.rows) ? data.rows : [];
  // Precompute _search_text per row (gabungan user_id + full_name +
  // username, lowercase) supaya search substring client-side instan.
  activityAllRows = rawRows.map(function(r) {
    var searchText = [
      r.actor_user_id || '',
      r.actor_full_name || '',
      r.actor_username || ''
    ].join(' ').toLowerCase();
    r._search_text = searchText;
    return r;
  });
  activityHitCap = !!data.hit_cap;
  activityCapLimit = Number(data.cap_limit || activityCapLimit);
  activityAllowedEntityTypes = data.allowed_entity_types || null;
  activityActiveSince = data.active_since || activityActiveSince;
  activityFiltersApplied = data.filters_applied || {};
  // Sinkronisasi period dari server (server mungkin override invalid
  // value ke default) ke state + dropdown UI.
  if (data.effective_period && ACTIVITY_VALID_PERIODS[data.effective_period]) {
    activityPeriod = data.effective_period;
    var periodSel = document.getElementById('activityPeriodSelect');
    if (periodSel && periodSel.value !== activityPeriod) {
      periodSel.value = activityPeriod;
    }
  }
  // Tidak reset activityCurrentPage di sini — caller yang reset kalau
  // perlu (showActivityPage / applyActivityFilters / changeActivityPeriod).
  // renderActivityTable clamp page > totalPages.
  renderActivityCapBanner();
  applyActivitySearchClient();
  syncActivityEntityTypeOptions();
  updateActivityFilterControls();
}

function renderActivityCapBanner() {
  var el = document.getElementById('activityCapBanner');
  if (!el) return;
  if (!activityHitCap) {
    el.style.display = 'none';
    el.innerHTML = '';
    return;
  }
  el.style.display = 'block';
  el.className = 'activity-cap-banner';
  el.innerHTML =
    '<span class="activity-cap-banner-title">Hasil dibatasi ' + activityCapLimit + ' aktivitas terbaru.</span>' +
    'Persempit periode atau filter entitas/aksi untuk melihat catatan yang lebih lama.';
}

function renderActivityTable() {
  var tbody = document.getElementById('activityTableBody');
  if (!tbody) return;

  var totalRecords = activityFilteredRows.length;
  var totalPages = Math.max(1, Math.ceil(totalRecords / activityPageSize));
  if (activityCurrentPage > totalPages) activityCurrentPage = totalPages;
  if (activityCurrentPage < 1) activityCurrentPage = 1;

  var startIdx = (activityCurrentPage - 1) * activityPageSize;
  var endIdx = startIdx + activityPageSize;
  var pageRows = activityFilteredRows.slice(startIdx, endIdx);

  if (!totalRecords) {
    tbody.innerHTML =
      '<tr><td colspan="6">' +
        '<div class="patients-empty-state">' +
          '<div class="patients-empty-title">Belum ada aktivitas</div>' +
          '<div class="patients-empty-subtitle">Belum ada catatan aktivitas pada periode/filter yang dipilih</div>' +
        '</div>' +
      '</td></tr>';
  } else {
    tbody.innerHTML = pageRows.map(function(r) {
      return '<tr>' +
        '<td>' +
          '<div class="activity-actor-id">' +
            (r.actor_full_name
              ? escapeAppHtml(r.actor_full_name)
              : escapeAppHtml(r.actor_user_id || '-')) +
          '</div>' +
          '<div class="activity-actor-roles">' + formatActivityRoles(r.actor_roles) + '</div>' +
        '</td>' +
        '<td>' + formatActivityTimestamp(r.occurred_at) + '</td>' +
        '<td>' + formatActivityAction(r.action) + '</td>' +
        '<td>' + formatActivityEntityType(r.entity_type) +
          '<div class="activity-entity-id">' + escapeAppHtml(r.entity_id || '') + '</div>' +
        '</td>' +
        '<td class="activity-notes-cell">' + escapeAppHtml(r.notes || '') + '</td>' +
        '<td style="text-align:right">' +
          '<button type="button" class="icon-btn" onclick="openActivityDetail(' + Number(r.id) + ')" aria-label="Lihat detail" title="Lihat detail">' +
            '<svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7z"/></svg>' +
          '</button>' +
        '</td>' +
      '</tr>';
    }).join('');
  }

  renderActivityPaginationState(activityCurrentPage, totalPages, totalRecords);
}

function renderActivityPaginationState(current, total, count) {
  var pageEl  = document.getElementById('activityCurrentPage');
  var totalEl = document.getElementById('activityTotalPages');
  var prevBtn = document.getElementById('activityPrevBtn');
  var nextBtn = document.getElementById('activityNextBtn');
  var infoEl  = document.getElementById('activityPaginationInfo');
  if (pageEl && document.activeElement !== pageEl) pageEl.textContent = current || 0;
  if (totalEl) totalEl.textContent = total || 0;
  if (prevBtn) prevBtn.disabled = current <= 1;
  if (nextBtn) nextBtn.disabled = current >= total;
  if (infoEl)  infoEl.textContent = (count || 0) + ' records';
}

/* =========================================================
   PAGINATION (CLIENT-SIDE — slice array, INSTAN)
   ========================================================= */
function prevActivityPage() {
  if (activityCurrentPage <= 1) return;
  activityCurrentPage--;
  renderActivityTable();
}

function nextActivityPage() {
  var totalPages = Math.max(1, Math.ceil(activityFilteredRows.length / activityPageSize));
  if (activityCurrentPage >= totalPages) return;
  activityCurrentPage++;
  renderActivityTable();
}

function goToActivityPage(el) {
  var totalPages = Math.max(1, Math.ceil(activityFilteredRows.length / activityPageSize));
  var raw = el ? String(el.textContent || '').trim() : '';
  var target = parseInt(raw, 10);
  if (isNaN(target) || target < 1) target = 1;
  if (target > totalPages) target = totalPages;
  if (el) el.textContent = target;
  if (target === activityCurrentPage) return;
  activityCurrentPage = target;
  renderActivityTable();
}

/* =========================================================
   FORMAT HELPERS
   ========================================================= */
function formatActivityTimestamp(iso) {
  if (!iso) return '-';
  var d = new Date(iso);
  if (isNaN(d.getTime())) return escapeAppHtml(String(iso));
  var pad = function(n) { return ('0' + n).slice(-2); };
  var dateStr = pad(d.getDate()) + '-' + pad(d.getMonth() + 1) + '-' + d.getFullYear();
  var timeStr = pad(d.getHours()) + ':' + pad(d.getMinutes());
  return '<div class="activity-time-main">' + dateStr + '</div>' +
         '<div class="activity-time-sub">' + timeStr + '</div>';
}

function formatActivityEntityType(t) {
  var raw = String(t || '').trim();
  var label = ACTIVITY_ENTITY_TYPE_LABELS[raw] || (raw || '-');
  return '<span class="status-badge default">' + escapeAppHtml(label) + '</span>';
}

function formatActivityAction(a) {
  var key = String(a || '').toLowerCase();
  var label = ACTIVITY_ACTION_LABELS[key] || key || '-';
  var className = 'status-badge default';
  if (ACTIVITY_ACTION_DANGER.indexOf(key) !== -1) {
    className = 'status-badge cancelled';
  } else if (ACTIVITY_ACTION_POSITIVE.indexOf(key) !== -1) {
    className = 'status-badge completed';
  }
  return '<span class="' + className + '">' + escapeAppHtml(label) + '</span>';
}

function formatActivityRoles(roles) {
  if (!Array.isArray(roles) || !roles.length) return '<span style="font-style:italic">-</span>';
  return roles.map(function(r) { return escapeAppHtml(String(r || '')); }).join(', ');
}

/* =========================================================
   FILTER CONTROLS (pola recall.html)
   ========================================================= */
function buildActivityEntityTypeOptions() {
  var list;
  if (Array.isArray(activityAllowedEntityTypes) && activityAllowedEntityTypes.length > 0) {
    list = activityAllowedEntityTypes.slice();
  } else {
    list = Object.keys(ACTIVITY_ENTITY_TYPE_LABELS);
  }
  list.sort(function(a, b) {
    var la = ACTIVITY_ENTITY_TYPE_LABELS[a] || a;
    var lb = ACTIVITY_ENTITY_TYPE_LABELS[b] || b;
    return la.localeCompare(lb);
  });
  var selected = (Array.isArray(activityFiltersApplied.entity_types) && activityFiltersApplied.entity_types.length === 1)
    ? String(activityFiltersApplied.entity_types[0])
    : '';
  return list.map(function(t) {
    var label = ACTIVITY_ENTITY_TYPE_LABELS[t] || t;
    var sel = String(selected) === String(t) ? ' selected' : '';
    return '<option value="' + escapeAppHtml(t) + '"' + sel + '>' + escapeAppHtml(label) + '</option>';
  }).join('');
}

function buildActivityActionOptions() {
  var keys = Object.keys(ACTIVITY_ACTION_LABELS);
  keys.sort(function(a, b) {
    return (ACTIVITY_ACTION_LABELS[a] || a).localeCompare(ACTIVITY_ACTION_LABELS[b] || b);
  });
  var selected = (Array.isArray(activityFiltersApplied.actions) && activityFiltersApplied.actions.length === 1)
    ? String(activityFiltersApplied.actions[0])
    : '';
  return keys.map(function(a) {
    var label = ACTIVITY_ACTION_LABELS[a];
    var sel = String(selected) === String(a) ? ' selected' : '';
    return '<option value="' + escapeAppHtml(a) + '"' + sel + '>' + escapeAppHtml(label) + '</option>';
  }).join('');
}

function syncActivityEntityTypeOptions() {
  var sel = document.getElementById('activityFilterEntityType');
  if (!sel) return;
  if (!Array.isArray(activityAllowedEntityTypes)) return;

  var currentValue = sel.value;
  sel.innerHTML = '<option value="">Semua entitas</option>' + buildActivityEntityTypeOptions();
  var matched = false;
  for (var i = 0; i < sel.options.length; i++) {
    if (sel.options[i].value === currentValue) { matched = true; break; }
  }
  if (matched) sel.value = currentValue;
}

function getActiveActivityFilterCount() {
  // Hitung filter di panel saja (entity + action). Period di toolbar
  // utama selalu set (primary scope) — tidak dihitung. Search actor di luar.
  var entityEl = document.getElementById('activityFilterEntityType');
  var actionEl = document.getElementById('activityFilterAction');
  var count = 0;
  if (entityEl && String(entityEl.value || '').trim()) count++;
  if (actionEl && String(actionEl.value || '').trim()) count++;
  return count;
}

function updateActivityFilterControls() {
  var panel    = document.getElementById('activityFiltersPanel');
  var toggleBtn = document.getElementById('activityFiltersToggleBtn');
  var resetBtn = document.getElementById('activityFiltersResetBtn');

  var activeCount = getActiveActivityFilterCount();

  if (panel) {
    panel.classList.toggle('show', !!activityFiltersExpanded);
  }

  if (toggleBtn) {
    toggleBtn.classList.toggle('active', !!activityFiltersExpanded);
    toggleBtn.innerHTML =
      '<svg viewBox="0 0 24 24" fill="none" stroke-width="2">' +
        '<path d="M3 5h18"></path><path d="M6 12h12"></path><path d="M10 19h4"></path>' +
      '</svg>' +
      '<span class="recall-filter-chip-label">Filters</span>' +
      (activeCount > 0 ? '<span class="recall-filter-chip-count">' + activeCount + '</span>' : '');
  }

  // Reset link cuma untuk filter PANEL (date/entity/action), TIDAK
  // termasuk search input — konsisten dengan pola Recall.
  if (resetBtn) {
    resetBtn.style.display = activeCount > 0 ? 'inline-flex' : 'none';
  }
}

function toggleActivityFilters() {
  activityFiltersExpanded = !activityFiltersExpanded;
  updateActivityFilterControls();
}

// Period selector di toolbar utama. Validasi whitelist client-side
// (sinkron dengan backend AUDIT_LOG_VALID_PERIODS). Invalid value
// fallback ke default supaya state UI tidak mismatch dropdown.
function changeActivityPeriod(el) {
  var raw = el ? String(el.value || '').trim() : '';
  var next = ACTIVITY_VALID_PERIODS[raw] ? raw : ACTIVITY_DEFAULT_PERIOD;
  if (el && el.value !== next) el.value = next;
  if (next === activityPeriod) return;
  activityPeriod = next;
  activityCurrentPage = 1;
  loadActivity();
}

// Search aktor: CLIENT-SIDE substring di _search_text precomputed.
// Tidak trigger fetch backend → instan. Debounce 220 ms supaya tidak
// rerender setiap keystroke.
function handleActivitySearch() {
  if (activitySearchDebounce) {
    clearTimeout(activitySearchDebounce);
  }
  activitySearchDebounce = setTimeout(function() {
    applyActivitySearchClient();
  }, ACTIVITY_SEARCH_DEBOUNCE_MS);
}

function applyActivitySearchClient() {
  var searchEl = document.getElementById('activitySearchActor');
  var keyword = searchEl ? String(searchEl.value || '').trim().toLowerCase() : '';

  if (!keyword) {
    activityFilteredRows = activityAllRows.slice();
  } else {
    activityFilteredRows = activityAllRows.filter(function(r) {
      return String(r._search_text || '').indexOf(keyword) !== -1;
    });
  }
  activityCurrentPage = 1;
  renderActivityTable();
}

// Filter panel (entity/action) trigger fetch backend karena affect query
// scope. Period dipisah ke toolbar utama (lihat changeActivityPeriod).
// Setelah load, re-apply client-side search filter.
function applyActivityFilters() {
  var entityEl = document.getElementById('activityFilterEntityType');
  var actionEl = document.getElementById('activityFilterAction');

  var entity = entityEl ? String(entityEl.value || '').trim() : '';
  var action = actionEl ? String(actionEl.value || '').trim() : '';

  activityFiltersApplied = {
    entity_types:   entity ? [entity] : [],
    actions:        action ? [action] : []
  };
  activityCurrentPage = 1;
  updateActivityFilterControls();
  loadActivity();
}

function resetActivityFilters() {
  activityFiltersApplied = {};
  activityCurrentPage = 1;

  // Reset hanya filter panel (entity/action). Search input dan Period
  // selector di toolbar utama TIDAK di-reset — Reset link scope cuma
  // untuk filter panel (konsisten dengan pola Recall). Period adalah
  // primary scope, owner ubah manual dari dropdown kalau perlu.
  var ids = ['activityFilterEntityType', 'activityFilterAction'];
  ids.forEach(function(id) {
    var el = document.getElementById(id);
    if (el) el.value = '';
  });

  updateActivityFilterControls();
  loadActivity();
}

/* =========================================================
   DETAIL MODAL + DIFF HIGHLIGHT
   ========================================================= */
function getActivityDetailModalHtml() {
  return '<div id="activityDetailModal" class="modal hidden">' +
    '<div class="modal-box modal-box-sticky detail-modal-box-sticky">' +
      '<div class="detail-modal-header-sticky">' +
        '<h2 class="detail-modal-title-sticky">Detail Aktivitas</h2>' +
        '<button type="button" class="detail-close-btn" onclick="closeActivityDetail()" aria-label="Tutup modal detail aktivitas" title="Tutup">' +
          '<svg viewBox="0 0 24 24" fill="none" stroke-width="2">' +
            '<path d="M6 6l12 12"></path>' +
            '<path d="M18 6l-12 12"></path>' +
          '</svg>' +
        '</button>' +
      '</div>' +
      '<div class="detail-modal-content-scroll">' +
        '<dl class="activity-detail-info">' +
          '<dt>Waktu</dt><dd id="activityDetailWhen">-</dd>' +
          '<dt>Entitas</dt><dd id="activityDetailEntity">-</dd>' +
          '<dt>Aksi</dt><dd id="activityDetailAction">-</dd>' +
          '<dt>Aktor</dt><dd id="activityDetailActor">-</dd>' +
          '<dt>Catatan</dt><dd id="activityDetailNotes" class="activity-notes">-</dd>' +
        '</dl>' +
        '<div id="activityDetailDiff"></div>' +
        '<div class="modal-actions modal-actions-right">' +
          '<button type="button" class="btn btn-secondary" onclick="closeActivityDetail()">Tutup</button>' +
        '</div>' +
      '</div>' +
    '</div>' +
  '</div>';
}

function openActivityDetail(id) {
  var row = (activityAllRows || []).find(function(r) { return Number(r.id) === Number(id); });
  if (!row) {
    showToast('Data tidak ditemukan di halaman ini', 'error');
    return;
  }
  var modal = document.getElementById('activityDetailModal');
  if (!modal) return;

  var whenEl   = document.getElementById('activityDetailWhen');
  var entityEl = document.getElementById('activityDetailEntity');
  var actionEl = document.getElementById('activityDetailAction');
  var actorEl  = document.getElementById('activityDetailActor');
  var notesEl  = document.getElementById('activityDetailNotes');
  var diffEl   = document.getElementById('activityDetailDiff');

  if (whenEl) whenEl.textContent = formatActivityTimestampLong(row.occurred_at);
  if (entityEl) {
    var entityLabel = ACTIVITY_ENTITY_TYPE_LABELS[String(row.entity_type || '')] || String(row.entity_type || '-');
    entityEl.innerHTML =
      '<span class="status-badge default">' + escapeAppHtml(entityLabel) + '</span>' +
      ' <span class="activity-entity-id" style="display:inline;margin-left:8px">' + escapeAppHtml(String(row.entity_id || '')) + '</span>';
  }
  if (actionEl) actionEl.innerHTML = formatActivityAction(row.action);
  if (actorEl) {
    var actorName = String(row.actor_full_name || '').trim();
    var actorUid = String(row.actor_user_id || '-');
    var actorRoles = formatActivityRolesPlain(row.actor_roles);
    actorEl.innerHTML =
      (actorName ? escapeAppHtml(actorName) + ' ' : '') +
      '<span style="color:#94a3b8">' + escapeAppHtml(actorUid) + '</span>' +
      ' <span style="color:#64748b">(' + escapeAppHtml(actorRoles) + ')</span>';
  }
  if (notesEl) notesEl.textContent = row.notes || '-';
  if (diffEl) diffEl.innerHTML = renderActivityDiff(row.old_value, row.new_value);

  modal.style.display = 'flex';
  modal.classList.remove('hidden');
}

function closeActivityDetail() {
  var modal = document.getElementById('activityDetailModal');
  if (modal) {
    modal.classList.add('hidden');
    modal.style.display = 'none';
  }
}

function formatActivityTimestampLong(iso) {
  if (!iso) return '-';
  var d = new Date(iso);
  if (isNaN(d.getTime())) return String(iso);
  var pad = function(n) { return ('0' + n).slice(-2); };
  return pad(d.getDate()) + '-' + pad(d.getMonth() + 1) + '-' + d.getFullYear() + ' ' +
    pad(d.getHours()) + ':' + pad(d.getMinutes()) + ':' + pad(d.getSeconds());
}

function formatActivityRolesPlain(roles) {
  if (!Array.isArray(roles) || !roles.length) return '-';
  return roles.map(function(r) { return String(r || ''); }).join(', ');
}

// Field timestamp yang ditampilkan dalam format readable (DD-MM-YYYY HH:MM:SS)
// di diff table, alih-alih ISO string mentah.
var ACTIVITY_TIMESTAMP_FIELDS = {
  updated_at: true,
  created_at: true,
  occurred_at: true,
  deleted_at: true,
  cancelled_at: true,
  deactivated_at: true,
  completed_at: true
};

function isActivityTimestampField(key) {
  return ACTIVITY_TIMESTAMP_FIELDS[key] === true;
}

function computeActivityDiffStatus(k, oldData, newData, isCreate, isDelete) {
  var hasOld = Object.prototype.hasOwnProperty.call(oldData, k);
  var hasNew = Object.prototype.hasOwnProperty.call(newData, k);
  if (isCreate) return 'created';
  if (isDelete) return 'deleted';
  if (!hasOld && hasNew) return 'added';
  if (hasOld && !hasNew) return 'removed';
  if (hasOld && hasNew) {
    var os = JSON.stringify(oldData[k]);
    var ns = JSON.stringify(newData[k]);
    return (os !== ns) ? 'changed' : 'unchanged';
  }
  return 'unchanged';
}

function renderActivityDiff(oldObj, newObj) {
  var isCreate = (oldObj === null || oldObj === undefined);
  var isDelete = (newObj === null || newObj === undefined);

  var oldData = (oldObj && typeof oldObj === 'object') ? oldObj : {};
  var newData = (newObj && typeof newObj === 'object') ? newObj : {};

  var keySet = {};
  Object.keys(oldData).forEach(function(k) { keySet[k] = true; });
  Object.keys(newData).forEach(function(k) { keySet[k] = true; });
  var allKeys = Object.keys(keySet).sort();

  // Untuk UPDATE: hanya tampilkan field yang berubah (changed/added/removed)
  // supaya owner fokus pada perubahan saja. updated_at otomatis ikut karena
  // selalu berubah saat mutasi.
  // Untuk CREATE/DELETE: tampilkan semua field (snapshot lengkap entry).
  var keys;
  if (isCreate || isDelete) {
    keys = allKeys;
  } else {
    keys = allKeys.filter(function(k) {
      var st = computeActivityDiffStatus(k, oldData, newData, false, false);
      return st === 'changed' || st === 'added' || st === 'removed';
    });
  }

  if (keys.length === 0) {
    if (isCreate || isDelete) {
      return '<div class="activity-diff-empty">Tidak ada data old/new yang tersedia untuk entri ini.</div>';
    }
    return '<div class="activity-diff-empty">Tidak ada field yang berubah pada entri ini.</div>';
  }

  var beforeClass = isCreate ? 'activity-header-color-muted' : 'activity-header-color-before';
  var afterClass  = isDelete ? 'activity-header-color-muted' : 'activity-header-color-after';
  var beforeLabel = isCreate ? '(tidak ada — entry baru)' : 'Sebelum';
  var afterLabel  = isDelete ? '(tidak ada — entry dihapus)' : 'Sesudah';

  var headerHtml =
    '<div class="activity-diff-header">' +
      '<div>Field</div>' +
      '<div class="' + beforeClass + '">' + beforeLabel + '</div>' +
      '<div class="' + afterClass + '">' + afterLabel + '</div>' +
    '</div>';

  var rowsHtml = keys.map(function(k) {
    var hasOld = Object.prototype.hasOwnProperty.call(oldData, k);
    var hasNew = Object.prototype.hasOwnProperty.call(newData, k);
    var oldVal = hasOld ? oldData[k] : undefined;
    var newVal = hasNew ? newData[k] : undefined;

    var status = computeActivityDiffStatus(k, oldData, newData, isCreate, isDelete);

    var oldClass = 'activity-diff-cell-neutral';
    var newClass = 'activity-diff-cell-neutral';
    if (status === 'created' || status === 'added') {
      newClass = 'activity-diff-cell-added';
    } else if (status === 'deleted' || status === 'removed') {
      oldClass = 'activity-diff-cell-removed';
    } else if (status === 'changed') {
      oldClass = 'activity-diff-cell-changed';
      newClass = 'activity-diff-cell-changed';
    }

    return '<div class="activity-diff-row">' +
      '<div class="activity-diff-field">' + escapeAppHtml(k) + '</div>' +
      '<div class="activity-diff-value ' + oldClass + '">' + formatActivityDiffValue(oldVal, hasOld, k) + '</div>' +
      '<div class="activity-diff-value ' + newClass + '">' + formatActivityDiffValue(newVal, hasNew, k) + '</div>' +
    '</div>';
  }).join('');

  return '<div class="activity-diff">' + headerHtml + rowsHtml + '</div>';
}

function formatActivityDiffValue(v, hasIt, fieldKey) {
  if (!hasIt) return '<span class="activity-diff-value-muted">(tidak ada)</span>';
  if (v === null) return '<span class="activity-diff-value-muted">null</span>';
  if (v === undefined) return '<span class="activity-diff-value-muted">undefined</span>';

  // Field timestamp tertentu (updated_at, created_at, dll) ditampilkan dalam
  // format readable DD-MM-YYYY HH:MM:SS — bukan ISO string mentah — supaya
  // owner tidak harus parse manual.
  if (fieldKey && isActivityTimestampField(fieldKey) &&
      (typeof v === 'string' || typeof v === 'number')) {
    var formatted = formatActivityTimestampLong(v);
    if (formatted && formatted !== '-' && formatted !== String(v)) {
      return escapeAppHtml(formatted);
    }
  }

  if (typeof v === 'object') {
    try {
      return escapeAppHtml(JSON.stringify(v, null, 2));
    } catch (e) {
      return escapeAppHtml(String(v));
    }
  }
  if (v === '') return '<span class="activity-diff-value-muted">(kosong)</span>';
  return escapeAppHtml(String(v));
}
