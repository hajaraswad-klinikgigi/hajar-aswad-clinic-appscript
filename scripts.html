<script>
  let currentUser = null;
  let allPatients = [];
  let filteredPatients = [];
  let patientCurrentPage = 1;
  const patientPageSize = 5;
  let patientFormMode = 'create';
  let pendingDeactivatePatientId = null;
  let pendingDeactivatePatientName = '';

  let patientSubmitInFlight = false;

  /**
   * Modal konfirmasi kustom, pengganti window.confirm() agar konsisten dgn UI app.
   * opts: { title, message, confirmText, cancelText, danger }
   * Returns Promise<boolean>.
   */
  function showAppConfirm(opts) {
    opts = opts || {};
    return new Promise(function(resolve) {
      var modal     = document.getElementById('appConfirmModal');
      var titleEl   = document.getElementById('appConfirmTitle');
      var textEl    = document.getElementById('appConfirmText');
      var okBtn     = document.getElementById('appConfirmOkBtn');
      var cancelBtn = document.getElementById('appConfirmCancelBtn');

      if (!modal || !okBtn || !cancelBtn) {
        resolve(window.confirm(opts.message || ''));
        return;
      }

      if (titleEl) titleEl.textContent = opts.title || 'Konfirmasi';
      if (textEl)  textEl.textContent  = opts.message || '';
      okBtn.textContent     = opts.confirmText || 'Ya';
      cancelBtn.textContent = opts.cancelText  || 'Batal';
      okBtn.className       = 'btn ' + (opts.danger ? 'btn-danger' : 'btn-primary');

      function close(result) {
        modal.classList.add('hidden');
        modal.style.display = 'none';
        okBtn.onclick = null;
        cancelBtn.onclick = null;
        resolve(result);
      }
      okBtn.onclick     = function() { close(true); };
      cancelBtn.onclick = function() { close(false); };

      modal.style.display = 'flex';
      modal.classList.remove('hidden');
    });
  }

  function setLoadingState(message) {
    const msg = document.getElementById('message');
    if (msg) {
      msg.textContent = message || 'Memproses...';
    }
  }

  function clearLoadingState() {
    const msg = document.getElementById('message');
    if (msg) {
      msg.textContent = '';
    }
  }

  function toggleSidebar() {
    document.body.classList.toggle('sidebar-open');
  }

  function closeSidebar() {
    document.body.classList.remove('sidebar-open');
  }

  // =========================================================
  // Phase 2b — Login TOTP (Google Authenticator)
  // =========================================================
  // Lihat PHASE_2B_AUTH_DISCUSSION_2026_05_17.md.
  //
  // Login flow:
  //   1. User input email + 6 digit dari Google Authenticator
  //   2. Submit → google.script.run.loginWithTotp(email, code)
  //   3. Backend verify TOTP via HMAC-SHA1 (RFC 6238)
  //   4. Sukses → set currentUser + show dashboard
  //   5. Setelah login, kalau role staff (admin_*) → enable auto-logout 10min

  /**
   * Auto-submit login saat user input 6 digit kode TOTP.
   * Filter karakter non-digit, lalu trigger submitLogin kalau email
   * sudah diisi & kode lengkap. Cegah double-submit pakai flag.
   */
  var loginAutoSubmitInFlight_ = false;
  function loginTotpAutoSubmit_(inputEl) {
    if (!inputEl) return;
    var cleaned = String(inputEl.value || '').replace(/\D/g, '').slice(0, 6);
    if (cleaned !== inputEl.value) inputEl.value = cleaned;
    if (cleaned.length !== 6) return;
    if (loginAutoSubmitInFlight_) return;

    var emailEl = document.getElementById('loginEmail');
    var email = String((emailEl && emailEl.value) || '').trim();
    if (!email) {
      if (emailEl) emailEl.focus();
      return;
    }
    loginAutoSubmitInFlight_ = true;
    submitLogin(null);
  }

  function submitLogin(e) {
    if (e && e.preventDefault) e.preventDefault();
    var email = String(document.getElementById('loginEmail').value || '').trim().toLowerCase();
    var code  = String(document.getElementById('loginTotpCode').value || '').replace(/\D/g, '');

    if (!email || !code) {
      setLoadingState('Email dan kode wajib diisi.');
      return;
    }
    if (code.length !== 6) {
      setLoadingState('Kode harus 6 digit.');
      return;
    }

    var btn = document.getElementById('loginSubmitBtn');
    if (btn) { btn.disabled = true; btn.textContent = 'Memproses...'; }
    setLoadingState('Memverifikasi kode Authenticator...');

    google.script.run
      .withSuccessHandler(function(res) {
        loginAutoSubmitInFlight_ = false;
        if (btn) { btn.disabled = false; btn.textContent = 'Login'; }
        if (!res || !res.success) {
          setLoadingState((res && res.message) || 'Login gagal');
          // Clear field code supaya user input kode baru (TOTP refresh 30 detik).
          var codeEl = document.getElementById('loginTotpCode');
          if (codeEl) { codeEl.value = ''; codeEl.focus(); }
          return;
        }
        clearLoadingState();
        currentUser = res.data;
        showDashboard(res.data);
        navigateToLandingPage_(res.data);
        maybeStartInactivityWatch_();
      })
      .withFailureHandler(function(err) {
        loginAutoSubmitInFlight_ = false;
        if (btn) { btn.disabled = false; btn.textContent = 'Login'; }
        setLoadingState('Error: ' + (err && err.message ? err.message : err));
      })
      .loginWithTotp(email, code);
  }

  // =========================================================
  // Auto-logout role-based (Lapis 3)
  // =========================================================
  // Aktif HANYA untuk staff (role admin_appointment / admin_finance
  // tanpa role full-privileged). Owner / super_admin / doctor tidak
  // di-auto-logout (login persisten sampai manual logout / tutup tab).
  //
  // Konfigurasi: 10 menit timeout, warning di menit 9.
  var INACTIVITY_TIMEOUT_MS = 10 * 60 * 1000;
  var INACTIVITY_WARNING_MS =  9 * 60 * 1000;
  var inactivityTimer_ = null;
  var inactivityWarningTimer_ = null;

  function shouldEnableAutoLogout_(user) {
    var roles = (user && Array.isArray(user.roles)) ? user.roles : [];
    if (!roles.length) return false;
    // Kalau punya role full-privileged → tidak auto-logout.
    if (roles.indexOf('owner') !== -1) return false;
    if (roles.indexOf('super_admin') !== -1) return false;
    if (roles.indexOf('doctor') !== -1) return false;
    // Sisanya = admin_appointment / admin_finance saja → auto-logout aktif.
    return true;
  }

  function maybeStartInactivityWatch_() {
    if (!shouldEnableAutoLogout_(currentUser)) return;
    ['mousemove', 'mousedown', 'keydown', 'touchstart', 'scroll'].forEach(function(ev) {
      document.addEventListener(ev, resetInactivityTimer_, { passive: true });
    });
    resetInactivityTimer_();
  }

  function resetInactivityTimer_() {
    if (inactivityTimer_)        clearTimeout(inactivityTimer_);
    if (inactivityWarningTimer_) clearTimeout(inactivityWarningTimer_);

    inactivityWarningTimer_ = setTimeout(function() {
      if (!currentUser) return;
      try {
        showToast && showToast(
          'Anda akan otomatis logout dalam 1 menit karena tidak aktif. ' +
          'Gerakkan mouse atau klik halaman untuk lanjut.',
          'warning'
        );
      } catch (e) {}
    }, INACTIVITY_WARNING_MS);

    inactivityTimer_ = setTimeout(function() {
      if (!currentUser) return;
      try { showToast && showToast('Anda otomatis di-logout karena tidak aktif 10 menit.', 'info'); } catch (e) {}
      logoutLocal();
    }, INACTIVITY_TIMEOUT_MS);
  }

  function showDashboard(user) {
    closeSidebar();

    document.getElementById('loginView').style.display = 'none';
    document.getElementById('dashboardView').style.display = 'block';

    const fullName = String((user && user.full_name) || '').trim();
    const role = String((user && user.role) || '').toLowerCase();
    const roles = Array.isArray(user && user.roles) ? user.roles : [];

    const welcome = fullName || 'Pengguna';

    document.getElementById('welcomeText').innerText = welcome;

    const subtitleEl = document.getElementById('topbarSubtitle');
    if (subtitleEl) {
      // Tampil email sebagai subtitle supaya user awareness siapa yg login.
      var email = String((user && user.email) || (user && user.username) || '').trim();
      subtitleEl.innerText = email || 'Selamat datang kembali';
    }

    // Set avatar initial (max 2 huruf dari nama).
    var avatarEl = document.getElementById('topbarIdentityAvatar');
    if (avatarEl) {
      var initials = String(fullName || welcome)
        .replace(/^(dr|drg|drs|ir|s\.h|s\.e|s\.tr\.keb)\.?\s+/i, '') // strip gelar depan
        .split(/[\s.,]+/)
        .filter(Boolean)
        .slice(0, 2)
        .map(function(s) { return s.charAt(0).toUpperCase(); })
        .join('') || '?';
      avatarEl.textContent = initials;
    }

    // Role badge: tampil role utama (kalau ada roles[], pakai yang pertama).
    var roleDisplay = roles.length ? roles[0] : (role || '-');
    document.getElementById('roleText').innerText = roleDisplay;

    applySidebarRoleVisibility_(user);
  }

  function getCurrentUserRole() {
    return String((currentUser && currentUser.role) || '').toLowerCase();
  }

  function getCurrentSessionToken() {
    return String((currentUser && currentUser.session_token) || '').trim();
  }

  function getCurrentAuthContext() {
    return {
      session_token: getCurrentSessionToken()
    };
  }

  function attachAuthContext(payload) {
    return Object.assign({}, payload || {}, getCurrentAuthContext());
  }

  function isOwner() {
    return getCurrentUserRole() === 'owner';
  }

  function isAdmin() {
    return getCurrentUserRole() === 'admin';
  }

  /* =========================================================
     PHASE 2C — ROLE-BASED UI HELPER (matrix role rangkap)
     ========================================================= */

  function getCurrentUserRoles() {
    return (currentUser && Array.isArray(currentUser.roles)) ? currentUser.roles : [];
  }

  function hasAppRole(role) {
    return getCurrentUserRoles().indexOf(String(role || '')) !== -1;
  }

  function hasAnyAppRole(roles) {
    var list = getCurrentUserRoles();
    if (!Array.isArray(roles)) return false;
    for (var i = 0; i < roles.length; i++) {
      if (list.indexOf(roles[i]) !== -1) return true;
    }
    return false;
  }

  function isFullyPrivileged() {
    return hasAnyAppRole(['owner', 'super_admin']);
  }

  // Conditional button visibility per matrix §UI Guard.
  // Backend tetap enforce via requireRole — ini hanya UX.
  function canConfirmDoctorFee() {
    return isFullyPrivileged() || hasAppRole('admin_finance');
  }

  function canDeleteExpense() {
    return isFullyPrivileged();
  }

  function canUploadPatientPhoto() {
    return isFullyPrivileged() || hasAppRole('admin_appointment');
  }

  function canManageAppointments() {
    return isFullyPrivileged() || hasAppRole('admin_appointment');
  }

  function canManageServiceCatalog() {
    return isFullyPrivileged();
  }

  function canManageDoctorCompensation() {
    return isFullyPrivileged();
  }

  // Data visibility per role (matrix §UI Guard / Data Hiding).
  // Legacy fallback: kalau roles[] empty (akun bootstrap), tampilkan semua.
  function canSeeProfit() {
    var roles = getCurrentUserRoles();
    if (roles.length === 0) return true;
    return isFullyPrivileged();
  }

  function canSeePatientClinical() {
    var roles = getCurrentUserRoles();
    if (roles.length === 0) return true;
    if (isFullyPrivileged()) return true;
    return hasAnyAppRole(['admin_appointment', 'doctor']);
  }

  function canSeeTreatmentPrice() {
    var roles = getCurrentUserRoles();
    if (roles.length === 0) return true;
    if (isFullyPrivileged()) return true;
    return hasAnyAppRole(['admin_finance', 'admin_appointment']);
  }

  // Apply sidebar visibility per role sesuai matrix §UI Guard.
  // Backend tetap enforce via requireRole — ini hanya UX.
  function applySidebarRoleVisibility_(user) {
    var roles = (user && Array.isArray(user.roles)) ? user.roles : [];
    var allMenuIds = [
      'menuDashboard', 'menuPatients', 'menuAppointments',
      'menuRecall', 'menuFinance', 'menuActivity', 'menuSettings'
    ];

    // Legacy fallback: kalau user belum punya roles[] (akun bootstrap pre-migrate),
    // tampilkan semua menu. Backend tetap reject per endpoint.
    if (roles.length === 0) {
      allMenuIds.forEach(function(id) {
        var btn = document.getElementById(id);
        if (btn) btn.classList.remove('sidebar-menu-hidden');
      });
      return;
    }

    var isFullyPriv = roles.indexOf('owner') !== -1 || roles.indexOf('super_admin') !== -1;

    // Per matrix: menu allowed untuk role non-fully-privileged
    var menuAllowedRoles = {
      menuDashboard:    [],  // owner-only via fully_privileged
      menuPatients:     ['admin_appointment', 'admin_finance'],
      menuAppointments: ['admin_appointment', 'doctor'],
      menuRecall:       ['admin_appointment'],
      menuFinance:      ['admin_finance'],
      menuActivity:     ['admin_appointment', 'admin_finance'],
      menuSettings:     []   // owner-only via fully_privileged
    };

    allMenuIds.forEach(function(menuId) {
      var btn = document.getElementById(menuId);
      if (!btn) return;

      var allowed = isFullyPriv || (menuAllowedRoles[menuId] || []).some(function(r) {
        return roles.indexOf(r) !== -1;
      });

      if (allowed) {
        btn.classList.remove('sidebar-menu-hidden');
      } else {
        btn.classList.add('sidebar-menu-hidden');
      }
    });
  }

  // Landing page setelah login sesuai matrix Q16:
  // owner/super_admin → Dashboard, admin_finance → Finance,
  // admin_appointment → Appointment, doctor → Appointment.
  // Priority untuk role rangkap: owner > admin_fin > admin_appt > doctor.
  function navigateToLandingPage_(user) {
    var roles = (user && Array.isArray(user.roles)) ? user.roles : [];

    if (roles.indexOf('owner') !== -1 || roles.indexOf('super_admin') !== -1) {
      showDashboardPage();
      return;
    }
    if (roles.indexOf('admin_finance') !== -1) {
      showFinancePage();
      return;
    }
    if (roles.indexOf('admin_appointment') !== -1 || roles.indexOf('doctor') !== -1) {
      showAppointmentsPage();
      return;
    }

    // Legacy fallback (akun pre-migrate) → Dashboard.
    showDashboardPage();
  }

  function logoutLocal() {
    const sessionToken = getCurrentSessionToken();

    if (sessionToken) {
      google.script.run.logoutAuthSession(sessionToken);
    }
    currentUser = null;
    allPatients = [];
    filteredPatients = [];
    patientCurrentPage = 1;
    patientFormMode = 'create';
    pendingDeactivatePatientId = null;
    pendingDeactivatePatientName = '';

    // Reset state modul lain supaya tidak leak ke sesi user berikutnya.
    // Manual register karena window.location.reload() bikin blank putih
    // di Apps Script iframe (token sandbox 1-time expired).
    [
      'resetAppointmentsState'
      // Followup: tambah resetter untuk recall, finance, patient detail,
      // settings, owner-report saat modul-modul itu nambah state lokal.
    ].forEach(function(fnName) {
      if (typeof window[fnName] === 'function') {
        try { window[fnName](); } catch (e) {}
      }
    });

    if (inactivityTimer_)        { clearTimeout(inactivityTimer_);        inactivityTimer_ = null; }
    if (inactivityWarningTimer_) { clearTimeout(inactivityWarningTimer_); inactivityWarningTimer_ = null; }

    closeSidebar();

    document.getElementById('dashboardView').style.display = 'none';
    document.getElementById('loginView').style.display = 'flex';
    var msgEl = document.getElementById('message');
    if (msgEl) msgEl.innerText = '';
    var contentEl = document.getElementById('contentArea');
    if (contentEl) contentEl.innerHTML = '';

    // Reset form login supaya user input fresh.
    var emailEl = document.getElementById('loginEmail');
    var codeEl  = document.getElementById('loginTotpCode');
    if (emailEl) emailEl.value = '';
    if (codeEl)  codeEl.value  = '';
  }

  function showToast(message, type) {
    const container = document.getElementById('toastContainer');
    if (!container) return;

    if (container.children.length >= 3) {
      container.removeChild(container.firstChild);
    }

    const toast = document.createElement('div');
    toast.className = 'toast ' + (type || 'info');
    toast.textContent = message;

    container.appendChild(toast);

    setTimeout(function() {
      if (toast.parentNode) {
        toast.remove();
      }
    }, 3000);
  }

  /* =========================================================
    APP SHARED UTILITY HELPERS
    Formatter dan escaping umum lintas modul
    ========================================================= */

  function formatAppRupiah(value) {
    const num = Number(value || 0);
    const safeNum = isNaN(num) ? 0 : num;

    return 'Rp ' + safeNum.toLocaleString('id-ID');
  }

  function formatAppDateDmy(value) {
    const s = String(value || '').trim();

    if (!s) return '-';

    if (/^\d{4}-\d{2}-\d{2}([T\s]|$)/.test(s)) {
      const parts = s.slice(0, 10).split('-');
      return parts[2] + '-' + parts[1] + '-' + parts[0];
    }

    return s;
  }

  function escapeAppHtml(value) {
    return String(value || '')
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#039;');
  }

  function setModalProcessingState(modalId, isLoading, options) {
    const modal = document.getElementById(modalId);
    if (!modal) return;

    const opts = options || {};
    const controls = modal.querySelectorAll('button, input, select, textarea');

    controls.forEach(function(el) {
      if (isLoading) {
        if (!el.hasAttribute('data-prev-disabled')) {
          el.setAttribute('data-prev-disabled', el.disabled ? '1' : '0');
        }
        el.disabled = true;
      } else {
        const prev = el.getAttribute('data-prev-disabled');
        if (prev !== null) {
          el.disabled = prev === '1';
          el.removeAttribute('data-prev-disabled');
        } else {
          el.disabled = false;
        }
      }
    });

    const primaryBtn = opts.primaryButtonId
      ? document.getElementById(opts.primaryButtonId)
      : (opts.primarySelector ? modal.querySelector(opts.primarySelector) : null);

    if (primaryBtn) {
      if (isLoading) {
        if (!primaryBtn.hasAttribute('data-original-text')) {
          primaryBtn.setAttribute('data-original-text', primaryBtn.textContent);
        }
        primaryBtn.textContent = opts.loadingText || 'Memproses...';
      } else {
        primaryBtn.textContent =
          opts.idleText ||
          primaryBtn.getAttribute('data-original-text') ||
          primaryBtn.textContent;

        primaryBtn.removeAttribute('data-original-text');
      }
    }

    if (isLoading) {
      modal.classList.add('modal-is-processing');
    } else {
      modal.classList.remove('modal-is-processing');
    }
  }

  function clearPatientErrors() {
    const fieldIds = [
      'patient_full_name',
      'patient_gender',
      'patient_birth_date',
      'patient_phone',
      'patient_email',
      'patient_guardian_name',
      'patient_guardian_relationship',
      'patient_guardian_phone',
      'patient_guardian_email',
      'patient_address',
      'patient_allergy_notes',
      'patient_medical_notes'
    ];

    fieldIds.forEach(function(id) {
      const el = document.getElementById(id);
      if (el) el.classList.remove('input-error');

      const err = document.getElementById('error_' + id);
      if (err) err.textContent = '';
    });
  }

  function applyPatientErrors(errors) {
    if (!errors) return;

    const map = {
      full_name: 'patient_full_name',
      gender: 'patient_gender',
      birth_date: 'patient_birth_date',
      phone: 'patient_phone',
      email: 'patient_email',
      guardian_name: 'patient_guardian_name',
      guardian_relationship: 'patient_guardian_relationship',
      guardian_phone: 'patient_guardian_phone',
      guardian_email: 'patient_guardian_email',
      address: 'patient_address',
      allergy_notes: 'patient_allergy_notes',
      medical_notes: 'patient_medical_notes'
    };

    Object.keys(errors).forEach(function(key) {
      const fieldId = map[key];
      if (!fieldId) return;

      const input = document.getElementById(fieldId);
      const errorEl = document.getElementById('error_' + fieldId);

      if (input) input.classList.add('input-error');
      if (errorEl) errorEl.textContent = errors[key];
    });
  }

  function closePatientModal() {
    patientSubmitInFlight = false;

    setModalProcessingState('patientModal', false, {
      primaryButtonId: 'patientSubmitBtn',
      idleText: patientFormMode === 'edit' ? 'Update' : 'Simpan'
    });

    const modal = document.getElementById('patientModal');
    if (modal) {
      modal.classList.add('hidden');
      modal.style.display = 'none';
    }

    clearPatientErrors();
    setPatientGuardianSectionExpanded(false);
  }

  function submitPatient(e) {
    e.preventDefault();

    if (patientSubmitInFlight) return;

    clearPatientErrors();

    const payload = {
      patient_id: document.getElementById('patient_id_hidden').value,
      full_name: document.getElementById('patient_full_name').value.trim(),
      gender: document.getElementById('patient_gender').value,
      birth_date: document.getElementById('patient_birth_date').value.trim(),
      phone: document.getElementById('patient_phone').value.trim(),
      email: document.getElementById('patient_email').value.trim(),

      guardian_name: document.getElementById('patient_guardian_name').value.trim(),
      guardian_relationship: document.getElementById('patient_guardian_relationship').value.trim(),
      guardian_phone: document.getElementById('patient_guardian_phone').value.trim(),
      guardian_email: document.getElementById('patient_guardian_email').value.trim(),

      address: document.getElementById('patient_address').value.trim(),
      allergy_notes: document.getElementById('patient_allergy_notes').value.trim(),
      medical_notes: document.getElementById('patient_medical_notes').value.trim()
    };

    const capturedMode = patientFormMode;
    const action = capturedMode === 'edit' ? 'updatePatient' : 'createPatient';
    const successMessage = capturedMode === 'edit'
      ? 'Data pasien berhasil diperbarui'
      : 'Pasien berhasil ditambahkan';

    patientSubmitInFlight = true;

    setModalProcessingState('patientModal', true, {
      primaryButtonId: 'patientSubmitBtn',
      loadingText: capturedMode === 'edit' ? 'Updating...' : 'Menyimpan...'
    });

    google.script.run
      .withSuccessHandler(function(res) {
        patientSubmitInFlight = false;

        if (!res || !res.success) {
          setModalProcessingState('patientModal', false, {
            primaryButtonId: 'patientSubmitBtn',
            idleText: capturedMode === 'edit' ? 'Update' : 'Simpan'
          });

          applyPatientErrors(res && res.errors ? res.errors : null);
          showToast((res && res.message) || 'Gagal menyimpan pasien', 'error');
          return;
        }

        clearPatientDetailFrontendCache(payload.patient_id);

        closePatientModal();
        patientFormMode = 'create';

        clearPatientForm();
        clearPatientErrors();

        // Partial refresh — patch allPatients tanpa reload server
        var saved = res.data;
        if (saved && typeof renderPatientsTable === 'function') {
          var keyword = ((document.getElementById('patientSearchInput') || {}).value || '').trim().toLowerCase();
          saved._search_text = [
            saved.patient_code || '', saved.full_name || '', saved.phone || '',
            saved.email || '', saved.guardian_name || '', saved.guardian_relationship || '',
            saved.guardian_phone || '', saved.guardian_email || '', saved.address || ''
          ].join(' ').toLowerCase();

          if (capturedMode === 'edit') {
            var idx = (allPatients || []).findIndex(function(p) { return p.patient_id === saved.patient_id; });
            if (idx !== -1) {
              allPatients[idx] = saved;
            } else {
              allPatients = [saved].concat(allPatients || []);
            }
          } else {
            allPatients = [saved].concat(allPatients || []);
            patientCurrentPage = 1;
          }

          filteredPatients = keyword
            ? (allPatients || []).filter(function(p) { return String(p._search_text||'').includes(keyword); })
            : (allPatients || []).slice();

          renderPatientsTable();
        } else if (typeof loadPatients === 'function') {
          loadPatients();
        }

        showToast(successMessage, 'success');

        // Auto-prompt buat appointment hanya saat pasien baru ditambah (bukan edit).
        if (capturedMode !== 'edit' && saved && saved.patient_id &&
            typeof showAppointmentsPage === 'function' &&
            typeof openCreateAppointmentModal === 'function') {
          var pName = saved.full_name || 'pasien baru';
          showAppConfirm({
            title:       'Pasien Tersimpan',
            message:     'Tambahkan appointment untuk ' + pName + ' sekarang?',
            confirmText: 'Ya, Tambah Appointment',
            cancelText:  'Nanti Saja'
          }).then(function(ok) {
            if (!ok) return;
            showAppointmentsPage();
            setTimeout(function() {
              openCreateAppointmentModal({
                patient_id:   saved.patient_id,
                full_name:    saved.full_name,
                patient_code: saved.patient_code,
                phone:        saved.phone
              });
            }, 0);
          });
        }
      })
      .withFailureHandler(function(err) {
        patientSubmitInFlight = false;

        setModalProcessingState('patientModal', false, {
          primaryButtonId: 'patientSubmitBtn',
          idleText: patientFormMode === 'edit' ? 'Update' : 'Simpan'
        });

        showToast('Error: ' + (err && err.message ? err.message : err), 'error');
      })[action](attachAuthContext(payload));
  }

  function clearPatientForm() {
    document.getElementById('patient_id_hidden').value = '';
    document.getElementById('patient_full_name').value = '';
    document.getElementById('patient_gender').value = '';
    document.getElementById('patient_birth_date').value = '';
    document.getElementById('patient_phone').value = '';
    document.getElementById('patient_email').value = '';
    document.getElementById('patient_guardian_name').value = '';
    document.getElementById('patient_guardian_relationship').value = '';

  function formatDateForInput(value) {
    if (!value) return '';
    const s = String(value);
    if (/^\d{4}-\d{2}-\d{2}$/.test(s)) return s;
    if (/^\d{4}-\d{2}-\d{2}\s/.test(s)) return s.slice(0, 10);
    return s;
  }

  function getTodayYmd() {
    const now = new Date();
    const year = now.getFullYear();
    const month = String(now.getMonth() + 1).padStart(2, '0');
    const day = String(now.getDate()).padStart(2, '0');
    return year + '-' + month + '-' + day;
  }

  function formatBirthDateInput(input) {
    let value = String(input.value || '').replace(/\D/g, '').slice(0, 8);

    if (value.length >= 5) {
      input.value = value.slice(0, 2) + '-' + value.slice(2, 4) + '-' + value.slice(4);
    } else if (value.length >= 3) {
      input.value = value.slice(0, 2) + '-' + value.slice(2);
    } else {
      input.value = value;
    }

    if (input && input.id === 'patient_birth_date') {
      if (isPatientMinorFromForm()) {
        setPatientGuardianSectionExpanded(true);
      } else {
        updatePatientGuardianRuleText();
      }
    }
  }

  function formatPatientNameInput(input) {
    let value = String(input.value || '');

    // hanya izinkan huruf, spasi, titik, apostrof
    value = value.replace(/[^A-Za-zÀ-ÿ.\s']/g, '');

    // rapikan spasi
    value = value.replace(/\s+/g, ' ').trimStart();

    // title case
    value = value.split(' ').map(function(word) {
      if (!word) return '';
      return word.charAt(0).toUpperCase() + word.slice(1).toLowerCase();
    }).join(' ');

    input.value = value;
  }

  function convertYmdToDmy(value) {
    if (!value) return '';

    const s = String(value).trim();
    const match = s.match(/^(\d{4})-(\d{2})-(\d{2})/);

    if (!match) return s;

    return match[3] + '-' + match[2] + '-' + match[1];
  }

  function getPatientAgeFromBirthDateInput(value) {
  const s = String(value || '').trim();
  const match = s.match(/^(\d{2})-(\d{2})-(\d{4})$/);

  if (!match) return null;

  const day = Number(match[1]);
  const month = Number(match[2]);
  const year = Number(match[3]);

  const birth = new Date(year, month - 1, day);

  if (
    birth.getFullYear() !== year ||
    birth.getMonth() !== month - 1 ||
    birth.getDate() !== day
  ) {
    return null;
  }

  const today = new Date();

  let age = today.getFullYear() - year;
  const monthDiff = today.getMonth() - (month - 1);

  if (monthDiff < 0 || (monthDiff === 0 && today.getDate() < day)) {
    age--;
  }

  return age;
}

function isPatientMinorFromForm() {
  const birthInput = document.getElementById('patient_birth_date');
  const age = getPatientAgeFromBirthDateInput(birthInput ? birthInput.value : '');
  return age !== null && age < 17;
}

function hasGuardianDataInPatientForm() {
  const ids = [
    'patient_guardian_name',
    'patient_guardian_relationship',
    'patient_guardian_phone',
    'patient_guardian_email'
  ];

  return ids.some(function(id) {
    const el = document.getElementById(id);
    return !!(el && String(el.value || '').trim());
  });
}

function updatePatientGuardianRuleText() {
  const wrap = document.getElementById('patientGuardianSectionWrap');
  const text = document.getElementById('patientGuardianRuleText');

  if (!wrap || !text) return;

  const isOpen = wrap.style.display !== 'none';

  if (!isOpen) {
    text.style.display = 'none';
    text.textContent = '';
    return;
  }

  if (isPatientMinorFromForm()) {
    text.style.display = 'block';
    text.textContent = 'Untuk pasien usia di bawah 17 tahun, Nama Wali, Hubungan Wali, No HP Wali, dan Email Wali wajib diisi.';
    return;
  }

  text.style.display = 'block';
  text.textContent = 'Untuk pasien usia 17 tahun ke atas, data wali opsional.';
}

function setPatientGuardianSectionExpanded(isExpanded) {
  const wrap = document.getElementById('patientGuardianSectionWrap');
  const icon = document.getElementById('patientGuardianToggleIcon');

  if (wrap) {
    wrap.style.display = isExpanded ? 'block' : 'none';
  }

  if (icon) {
    icon.textContent = isExpanded ? '▲' : '▼';
  }

  updatePatientGuardianRuleText();
}

function togglePatientGuardianSection() {
  const wrap = document.getElementById('patientGuardianSectionWrap');
  if (!wrap) return;

  const isOpen = wrap.style.display !== 'none';
  setPatientGuardianSectionExpanded(!isOpen);
}

  function setActiveMenu(menuId) {
    const menus = document.querySelectorAll('.sidebar-menu');
    menus.forEach(function(btn) {
      btn.classList.remove('active');
    });

    const active = document.getElementById(menuId);
    if (active) {
      active.classList.add('active');
    }
  }

</script>
