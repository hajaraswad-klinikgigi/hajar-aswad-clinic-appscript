<style>
  /* =========================================================
     1. FINANCE PAGE SHELL & HEADER
     Struktur utama halaman Finance
     Header periode mengikuti Dashboard sebagai acuan
     ========================================================= */
  .finance-shell {
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  /* =========================================================
     TAB NAVIGATION — Billing & Piutang | Laporan
     ========================================================= */

    gap: 0;
    border-bottom: 2px solid #e2e8f0;
    margin-bottom: 4px;
  }

  .finance-tab-btn {
    padding: 10px 22px;
    border: none;
    border-bottom: 3px solid transparent;
    margin-bottom: -2px;
    background: none;
    font-size: 14px;
    font-weight: 600;
    color: #6b7280;
    cursor: pointer;
    transition: color .15s, border-color .15s;
  }

  .finance-tab-btn:hover { color: #0f172a; }

  .finance-tab-btn.active {
    color: #0f766e;
    border-bottom-color: #0f766e;
  }

  /* Sub-tab (Harian/Bulanan/Tahunan) — lebih kecil, tanpa garis bawah tebal */

    border-bottom: 1px solid #e2e8f0;
    margin-bottom: 0;
  }

  .finance-tab-nav-sub .finance-tab-btn {
    padding: 8px 16px;
    font-size: 13px;
  }

    align-items: center;
    justify-content: space-between;
    gap: 12px;
    flex-wrap: wrap;
    margin-bottom: 16px;

    gap: 8px;
    align-items: flex-end;
    flex-wrap: wrap;
  }

    align-items: end;

    flex-wrap: wrap;
  }

    font-weight: 700;
    letter-spacing: .08em;
    text-transform: uppercase;
    color: #6b7280;
    margin-bottom: 6px;
  }

  .finance-title {
    margin: 0 0 4px 0;
    font-size: 32px;
    font-weight: 900;
    line-height: 1.1;
    letter-spacing: -0.03em;
    color: #0f172a;
  }

  .finance-subtitle {
    color: #64748b;
    font-size: 14px;
  }

  }

  .finance-period-filter-label {

    font-size: 12px;
    font-weight: 700;
    color: #6b7280;
    margin-bottom: 6px;
  }

  .finance-period-select {

    max-width: 100%;
    padding: 10px 12px;
    border-radius: 14px;
    border: 1px solid #dbe3ee;

    font-weight: 600;

  }

  .finance-period-info {
    color: #6b7280;
    font-size: 14px;
  }

  /* =========================================================
     2. FINANCE KPI CARDS
     Ringkasan billing, kas masuk, piutang, diskon
     ========================================================= */

    display: grid;
    grid-template-columns: repeat(4, minmax(0, 1fr));
    gap: 14px;
  }

  .finance-kpi-card {
    background: linear-gradient(180deg, #ffffff 0%, #fbfdff 100%);
    border-radius: 18px;
    padding: 18px;
    box-shadow: 0 10px 26px rgba(15, 23, 42, 0.05);
    border: 1px solid #eef2f7;
  }

  .finance-kpi-label {
    font-size: 13px;
    color: #6b7280;
    margin-bottom: 10px;
  }

  .finance-kpi-value {
    font-size: 24px;
    line-height: 1.15;
    font-weight: 800;
    color: #0f172a;
    word-break: break-word;
  }

  .finance-kpi-neutral {
    background: linear-gradient(180deg, #ffffff 0%, #fbfdff 100%);
  }

  .finance-kpi-primary {
    background: linear-gradient(180deg, #f0fdfa 0%, #ecfeff 100%);
  }

  .finance-kpi-primary .finance-kpi-value {
    color: #0f766e;
  }

  .finance-kpi-success {
    background: linear-gradient(180deg, #f0fdf4 0%, #f7fee7 100%);
  }

  .finance-kpi-success .finance-kpi-value {
    color: #166534;
  }

  .finance-kpi-danger {
    background: linear-gradient(180deg, #fff7ed 0%, #fef2f2 100%);
  }

  .finance-kpi-danger .finance-kpi-value {
    color: #b91c1c;
  }

  /* =========================================================
     3. FINANCE FEEDBACK SUMMARY
     Ringkasan kepuasan layanan di halaman Finance
     ========================================================= */
  .finance-feedback-card {
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  .finance-feedback-summary-grid {
    display: grid;
    grid-template-columns: repeat(6, minmax(0, 1fr));
    gap: 12px;
  }

  .finance-feedback-summary-card {
    border-radius: 16px;
    padding: 14px;
    border: 1px solid #e5e7eb;
    background: linear-gradient(180deg, #ffffff 0%, #f8fafc 100%);
  }

  .finance-feedback-summary-label {
    font-size: 12px;
    color: #64748b;
    font-weight: 700;
    margin-bottom: 8px;
  }

  .finance-feedback-summary-value {
    font-size: 20px;
    font-weight: 900;
    color: #0f172a;
    line-height: 1.2;
    word-break: break-word;
  }

  .finance-feedback-primary {
    background: linear-gradient(180deg, #f0fdfa 0%, #ecfeff 100%);
  }

  .finance-feedback-primary .finance-feedback-summary-value {
    color: #0f766e;
  }

  .finance-feedback-success {
    background: linear-gradient(180deg, #f0fdf4 0%, #f7fee7 100%);
  }

  .finance-feedback-success .finance-feedback-summary-value {
    color: #166534;
  }

  .finance-feedback-danger {
    background: linear-gradient(180deg, #fff7ed 0%, #fef2f2 100%);
  }

  .finance-feedback-danger .finance-feedback-summary-value {
    color: #b91c1c;
  }

  .finance-feedback-neutral {
    background: linear-gradient(180deg, #ffffff 0%, #f8fafc 100%);
  }

  .finance-feedback-latest-empty {
    padding: 12px;
    border: 1px dashed #dbe3ee;
    border-radius: 14px;
    color: #64748b;
    background: #f8fafc;
    font-size: 13px;
  }

  .finance-feedback-latest-list {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .finance-feedback-latest-item {
    padding: 12px 0;
    border-bottom: 1px solid #f1f5f9;
  }

  .finance-feedback-latest-item:last-child {
    border-bottom: none;
  }

  .finance-feedback-latest-title {
    font-size: 15px;
    font-weight: 800;
    color: #0f172a;
    margin-bottom: 4px;
  }

  .finance-feedback-latest-sub {
    font-size: 12px;
    color: #64748b;
    line-height: 1.4;
  }

  .finance-feedback-latest-comment {
    margin-top: 8px;
    padding: 10px 12px;
    border-radius: 12px;
    background: #f8fafc;
    color: #334155;
    font-size: 13px;
    line-height: 1.5;
  }

    color: #64748b;
    font-weight: 700;

  }

  .finance-receivable-summary-value {
    font-size: 18px;
    font-weight: 900;
    color: #0f172a;
    line-height: 1.2;
    word-break: break-word;
  }

  .finance-receivable-summary-sub {
    margin-top: 6px;
    font-size: 12px;
    color: #64748b;
  }

  .finance-receivable-danger {
    background: linear-gradient(180deg, #fff7ed 0%, #fef2f2 100%);
  }

  .finance-receivable-danger .finance-receivable-summary-value {
    color: #b91c1c;
  }

  .finance-receivable-primary {
    background: linear-gradient(180deg, #f0fdfa 0%, #ecfeff 100%);
  }

  .finance-receivable-primary .finance-receivable-summary-value {

  }

  .finance-receivable-success {

  .finance-receivable-success .finance-receivable-summary-value {

  .finance-receivable-table td:nth-child(4) {
    width: 17%;

  .finance-receivable-table th:nth-child(5),
  .finance-receivable-table td:nth-child(5) {

    padding-top: 18px;

  .finance-filter-wrap {

    letter-spacing: -0.02em;
  }

  .finance-section-subtitle {
    color: #64748b;
    font-size: 14px;
  }

     ========================================================= */

    table-layout: fixed;
  }

  .finance-table th,
  .finance-table td {

  }

    width: 20%;
  }

  .finance-table th:nth-child(2),
  .finance-table td:nth-child(2) {
    width: 22%;
  }

  .finance-table th:nth-child(3),
  .finance-table td:nth-child(3) {
    width: 14%;
  }

  .finance-table th:nth-child(4),
  .finance-table td:nth-child(4) {
    width: 20%;
  }

  .finance-table th:nth-child(5),
  .finance-table td:nth-child(5) {
    width: 16%;
  }

  .finance-table th:nth-child(6),
  .finance-table td:nth-child(6) {

  }

  .finance-invoice-main,
  .finance-patient-main {
    font-weight: 800;
    color: #0f172a;
    line-height: 1.4;
  }

  .finance-invoice-sub {
    margin-top: 4px;
    font-size: 12px;
    color: #64748b;
    line-height: 1.4;
  }

  .finance-paid-note {
    font-size: 13px;
    color: #166534;
    font-weight: 700;
    margin-bottom: 4px;
  }

  .finance-outstanding-note {
    font-size: 13px;
    color: #b91c1c;
    font-weight: 700;
  }

  /* =========================================================
     7. FINANCE DETAIL MODAL
     Detail billing, actions, invoice digital, feedback
     ========================================================= */
  .finance-detail-modal-box {
    width: 94%;
    max-width: 980px;
  }

  .finance-detail-header-card {
    display: flex;
    justify-content: space-between;

    gap: 8px;
    flex-wrap: wrap;
    justify-content: flex-end;
  }

  .finance-detail-grid {

    grid-template-columns: repeat(4, minmax(0, 1fr));
    gap: 12px;
    margin-bottom: 16px;
  }

  .finance-detail-box {
    border: 1px solid #e5e7eb;
    border-radius: 16px;
    padding: 14px;
    background: #fff;
  }

  .finance-detail-value {
    font-size: 15px;
    font-weight: 700;
    color: #0f172a;
    line-height: 1.4;
    word-break: break-word;
  }

  .finance-detail-actions {
    display: flex;
    justify-content: flex-end;
    gap: 10px;
    flex-wrap: wrap;
    margin-bottom: 18px;
  }

  .finance-detail-actions .btn {
    width: auto;
    min-width: 150px;
  }

  .finance-detail-section {
    margin-top: 18px;
  }

  .finance-detail-section h3 {

    font-size: 13px;
    line-height: 1.5;
  }

  .finance-detail-table {
    min-width: 620px;
  }

  /* =========================================================
     8. FINANCE TOTAL STRIP & MINI LIST

     ========================================================= */

    display: grid;
    grid-template-columns: repeat(5, minmax(0, 1fr));
    gap: 12px;
    margin-bottom: 16px;
  }

  .finance-total-strip > div {

  .finance-total-label {

    font-weight: 700;

  }

  .finance-total-value {

    font-weight: 900;
    color: #0f172a;
    word-break: break-word;
  }

  .finance-total-value.primary {

  }

  .finance-total-value.success {
    color: #166534;
  }

  .finance-total-value.danger {

  .finance-mini-title {

    color: #0f172a;
    margin-bottom: 4px;
  }

  .finance-mini-sub {

    line-height: 1.4;
  }

  .finance-mini-value {

    font-weight: 900;

  }

  .finance-mini-value.success {
    color: #166534;
  }

  .finance-mini-value.danger {
    color: #b91c1c;
  }

     ========================================================= */

    width: 620px;
    max-width: 100%;
  }

    color: #475569;
    background: #f8fafc;

    border-color: #fed7aa;
  }

  .finance-modal-note.invoice-email-unknown {
    color: #b91c1c;
    background: #fef2f2;
    border-color: #fee2e2;
  }
